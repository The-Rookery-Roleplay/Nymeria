 building_type_river_gate_01:0 "La Porte de la Rivière"
 building_type_river_gate_01_desc:0 "La Porte de la Rivière se dresse près du centre du mur sud-est et relie la place du Poissonnier aux quais sur la Néra. La rue de l'Acier débute à la place du marché près de la Porte de la Rivière, et la Ruelle de la Rivière s'étend de la Porte de la Rivière à la porte du Roi. Le marché aux poissons se trouve à l'extérieur de la porte, emplissant l'air des cris des marchands et des effluves salins du fleuve."
 building_river_gate_01:0 "$building_type_river_gate_01$"
 building_river_gate_01_desc:0 "$building_type_river_gate_01_desc$"

 building_type_agot_hellgate_hall_01:0 "Château de la Porte des Enfers"
 building_type_agot_hellgate_hall_01_desc:0 "Siège ancestral de la Maison Dryland, c'est depuis cette redoutable forteresse qu'elle régna en tant que Rois du Soufre, dominant les terres désolées des dunes profondes."
 building_agot_ruins_hellgate_hall_01:0 "Folie de Lucifer"
 building_agot_ruins_hellgate_hall_01_desc:0 "De vieilles ruines brisées sont tout ce qui demeure du Château de la Porte des Enfers, jadis la plus puissante des forteresses qui élisaient domicile dans les dunes profondes de Dorne. Le Château de la Porte des Enfers et la Maison Dryland furent abattus lors des Guerres d'Unification Dorniennes sous Nymeria et la Maison Martell. Aujourd'hui, les ruines témoignent du sort réservé à ceux qui défient le Soleil et la Lance, comme le fit le dernier Roi du Soufre."
 building_agot_hellgate_hall_ruins_02:0 "Une Cité Restaurée"
 building_agot_hellgate_hall_ruins_02_desc:0 "Trop longtemps l'antique siège du Soufre est demeuré silencieux.\n\nBien que les pics au-dessus murmurent encore les horreurs infligées à ces terres par les Martell il y a de cela des lustres, le long chemin de la restauration de cette jadis magnifique prouesse de l'humanité a commencé, pierre par pierre."
 building_agot_ruins_hellgate_hall_03:0 "Grandeur et Grâce"
 building_agot_ruins_hellgate_hall_03_desc:0 "Bien que l'œuvre progresse lentement, la montagne du Château de la Porte des Enfers est reconquise.\n\nDominant la cité en contrebas, les pentes supérieures du Château de la Porte des Enfers arborent désormais palais de plaisance, temples et autres indispensables de la haute société.\n\nBien qu'édifiées dans les empreintes des ruines déjà taillées dans la montagne, ces nouvelles constructions s'inspirent de l'architecture rhoynienne de Lancehélion."
 building_agot_ruins_hellgate_hall_04:0 "La Tour Dorée"
 building_agot_ruins_hellgate_hall_04_desc:0 "Bien que terriblement coûteuse, vous avez achevé la restauration du sommet du Château de la Porte des Enfers.\n\nVotre nouveau Donjon rivalise avec tous ceux du royaume et le Château de la Porte des Enfers se dresse une fois encore, fier et inébranlable, dominant toutes les terres de Dorne depuis ses hauteurs majestueuses."

 building_type_bloodstone_special_01:0 "Donjon de Peyresang"
 building_type_bloodstone_special_01_desc:0 "Donjon de Peyresang"
 building_bloodstone_special_01:0 "Donjon de Peyresang"
 building_bloodstone_special_01_desc:0 "Peyresang, la plus vaste des Degrés de Pierre, a toujours été un refuge pour les pirates et corsaires qui sillonnent ces eaux treacherous. En conséquence, un donjon fut érigé pour défendre les Seigneurs Pirates contre les flottes ennemies."
 building_bloodstone_special_02:0 "Château de Peyresang"
 building_bloodstone_special_02_desc:0 "Édifié par le Roi des Degrés de Pierre et de la mer Étroite, ce château fut construit lors de la conversion des Repaires de Pirates de Peyresang en gouvernements féodaux, marquant une nouvelle ère de légitimité."
 building_bloodstone_special_03:0 "Salle des Dragons de Peyresang"
 building_bloodstone_special_03_desc:0 "Originellement bâtie par Daemon Targaryen, Roi des Degrés de Pierre et de la mer Étroite, le donjon arbore les mêmes styles architecturaux valyriens que l'on observe à Peyredragon, quoique moins solide en raison de la connaissance de la maçonnerie valyrienne perdue dans les brumes du temps.\n\nBien que bien plus modeste que Peyredragon, Peyresang fut clairement construite avec l'aide du feu de dragon, et de nombreux éléments du château sont manifestement orientés vers les dragons."
 building_bloodstone_special_04:0 "Château de la Salle des Dragons de Peyresang"
 building_bloodstone_special_04_desc:0 "Originellement bâtie par Daemon Targaryen, Roi des Degrés de Pierre et de la mer Étroite, le donjon arbore les mêmes styles architecturaux valyriens que l'on observe à Peyredragon, quoique moins solide en raison de la connaissance de la maçonnerie valyrienne perdue dans les brumes du temps.\n\nBien que bien plus modeste que Peyredragon, Peyresang fut clairement construite avec l'aide du feu de dragon, et de nombreux éléments du château sont manifestement orientés vers les dragons, y compris les murailles modelées d'après Peyredragon même.\n\nAu prix de grands coûts et d'investissements temporels considérables, Peyresang est devenue un carrefour commercial de la mer Étroite entre Westeros et Essos, le Roi des Degrés de Pierre prélevant un péage sur tout trafic transitant grâce à une expansion portuaire massive."

 building_agot_warg_king_03:0 "Le Port du Roi-Loup-garou"
 building_agot_warg_king_03_desc:0 "Le port qui fut jadis incendié par la Maison Stark après que Brandon "le Constructeur de Navires" eut disparu en naviguant vers l'Ouest a été restauré dans sa gloire d'antan, ses quais résonnant une fois encore du fracas des vagues et des cris des mouettes."
 building_agot_warg_king_04:0 "La Forteresse du Roi-Loup-garou"
 building_agot_warg_king_04_desc:0 "Reconstruite à partir des ruines, le Château du Roi-Loup-garou est redevenu une forteresse redoutable. Là où ne se dressaient que ruines s'élèvent désormais un donjon imposant et une cité environnante prospère, témoins de la renaissance d'un pouvoir oublié."
