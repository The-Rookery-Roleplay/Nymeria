l_french:
 #event for vassal choice
 amsb_harrenhal.0001.t:0 "Construire le Plus Vaste Château de Westeros"
 amsb_harrenhal.0001.desc:0 "Je me tiens devant [councillor.GetName], plume en main, [councillor.GetSheHe] notant tout ce que je désire pour mon nouveau donjon. Cela faisait quelques jours que nous procédions ainsi, [councillor.GetHerHim] me rejoignant dans les chambres du conseil et moi livrant chaque détail qui me venait à l'esprit pour ce qui deviendrait le plus grandiose château de tout Westeros.\n\n\"Je le veux doté de cinq tours, chacune plus imposante que la précédente, si hautes que même les nuages ne sauraient leur échapper !\" déclarai-je. \"Je veux que les murs-rideaux soient plus élevés que [GetBuilding('casterly_rock_01').GetName] même, avec les tours s'élançant plus haut encore !\"\n\nIl m'arriva parfois de penser que [councillor.GetNameNoTooltip] me croyait sans doute fou, un projet de cette envergure nécessiterait vraisemblablement dix années ou plus, avec un coût en or et en labeur dépassant tout ce qui avait été vu depuis l'Âge des Héros... mais j'ai fait mon choix et ma volonté s'accomplira...\n\n#Bold NOTE : Ce projet prendra de nombreuses années à achever, une fois terminé un événement se déclenchera qui octroiera un Château de niveau 5 et le bâtiment spécial approprié#!"
 amsb_harrenhal.0001.a:0 "Nous briserons le sol demain..."
 amsb_harrenhal.0001.b:0 "Il est temps de rassembler une force de travail..."

 amsb_harrenhal.9998.t:0 "Le Puissant Harrenhal"
 amsb_harrenhal.9998.desc:0 "Après ce qui a semblé une éternité, [GetBuilding('harrenhal_01').GetName] est enfin achevé. C'est un spectacle sans égal qui n'a pas honoré Westeros depuis l'Âge des Héros : de massifs murs-rideaux noirs s'élevant si haut dans le ciel que quiconque les contemplerait depuis le sol en aurait le vertige, et au-dessus même de ces murailles surgissaient les sommets de cinq tours de pierre noire, leurs toitures perçant les nuages comme les doigts d'un dieu géant. C'était un château tel que Westeros n'en avait jamais connu et il demeure un rappel de la puissance des [ROOT.Char.GetCulture.GetName].\n\nDe nombreux Riverains ont peut-être péri durant la construction, mais leur sacrifice à [ROOT.Char.GetFaith.HighGodName] était nécessaire. Cependant, seul un fou croirait que cela m'a fait aimer de la population locale.\n\nTandis que je me dresse devant ces murailles massives, je ne peux m'empêcher de réfléchir au voyage qu'il a fallu pour parvenir ici, tout le sang, les sacrifices et le temps que ce projet a exigés. Je dois maintenant prendre ma place entre ses murs pour m'assurer que mon héritage et celui de la Maison [ROOT.Char.GetDynasty.GetName] ne seront jamais oubliés..."
 amsb_harrenhal.9998.a:0 "[GetBuilding('harrenhal_01').GetName] est enfin achevé"
 amsb_harrenhal.9998.b:0 "Je ferai de [GetTitleByKey('c_harrenhal').GetNameNoTier] la nouvelle capitale du royaume"

 amsb_harrenhal.9997.t:0 "Le Château Noir"
 amsb_harrenhal.9997.desc:0 "Après ce qui a semblé une éternité, [GetBuilding('generic_harrenhal_01').GetName] est enfin achevé. C'est un spectacle sans égal qui n'a pas honoré Westeros depuis l'Âge des Héros : de massifs murs-rideaux noirs s'élevant si haut dans le ciel que quiconque les contemplerait depuis le sol en aurait le vertige, et au-dessus même de ces murailles surgissaient les sommets de cinq tours de pierre noire, leurs toitures perçant les nuages comme les doigts d'un dieu géant.\n\nMe dressant devant sa puissance maintenant, je sais qu'il n'y aura plus jamais de question quant à la force et au pouvoir du peuple [ROOT.Char.GetCulture.GetName]. Je ne peux m'empêcher de réfléchir au voyage qu'il a fallu pour parvenir ici, tout l'or, les ressources et le temps que ce projet a exigés pour élever ce magnifique donjon jusqu'aux cieux mêmes. Ce château est véritablement un témoignage à [ROOT.Char.GetFaith.HighGodName] et à [ROOT.Char.GetFaith.HighGodNamePossessive] pouvoir et influence sur ce monde. Je dois maintenant prendre ma place entre ses murs pour m'assurer que mon héritage et celui de la Maison [ROOT.Char.GetDynasty.GetName] ne seront jamais oubliés..."
 amsb_harrenhal.9997.a:0 "[GetBuilding('generic_harrenhal_01').GetName] est enfin achevé"
 amsb_harrenhal.9997.b:0 "Je ferai de [GetTitleByKey('c_harrenhal').GetNameNoTier] la nouvelle capitale du royaume"
