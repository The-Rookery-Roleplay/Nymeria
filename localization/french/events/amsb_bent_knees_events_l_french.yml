 #Vassal Refuses
 amsb_bent_knees.0004.t:0 "Le Vassal Refuse le Décret"
 amsb_bent_knees.0004.desc:0 "Je fixe le parchemin du corbeau avec une incrédulité totale. Le message de [bent_knees.GetName] se froisse aisément en une boule de papier serrée dans ma paume tandis que la colère monte en moi.\n\n\"Je ne tolérerai pas ce manque de respect !\" criai-je à personne en particulier, sachant qu'il n'y avait pas grand-chose que je puisse faire sans drastiquement envenimer la situation.\n\nMais peut-être est-ce ce qui est nécessaire... peut-être faut-il faire un exemple pour que les seigneurs restants du royaume apprennent leur place..."
 amsb_bent_knees.0004.a:0 "C'est inacceptable !"
