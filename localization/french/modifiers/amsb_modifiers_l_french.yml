 harrenhal_construction:0 "Construction d'un Puissant Donjon"

 harrenhal_constructed:0 "A Construit Durlieu"
 harrenhal_constructed_desc:0 "Cette personne a érigé Durlieu en usant de la main-d'œuvre serve des Conflans, monument à la fois de sa puissance et de sa cruauté."
 godsfort_constructed:0 "A Construit le Château Noir"
 godsfort_constructed_desc:0 "Cette personne a érigé le Château Noir, démontrant la véritable puissance des Conflans par cette prouesse architecturale."

 harrenhal_restoration_1:0 "A Reconstruit la Tour de l'Horreur"
 harrenhal_restoration_1_desc:0 "Cette personne a entrepris de restaurer le Château de Durlieu dans son état d'antan. Cela pourrait ne pas plaire à ceux qui furent exploités lors de sa construction originelle."
 harrenhal_restoration_2:0 "A Reconstruit la Tour Plaintive"
 harrenhal_restoration_2_desc:0 "Cette personne a entrepris de restaurer le Château de Durlieu dans son état d'antan. Cela pourrait ne pas plaire à ceux qui furent exploités lors de sa construction originelle."
