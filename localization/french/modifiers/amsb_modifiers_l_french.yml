 harrenhal_restoration_4_desc:0 "Cette personne a entrepris de restaurer le Château de Durlieu dans son état d'antan. Cela pourrait ne pas plaire à ceux qui furent exploités lors de sa construction originelle."
 harrenhal_restoration_5:0 "A Reconstruit la Tour du Bûcher-du-Roi"
 harrenhal_restoration_5_desc:0 "Cette personne a entrepris de restaurer le Château de Durlieu dans son état d'antan. Cela pourrait ne pas plaire à ceux qui furent exploités lors de sa construction originelle."

 harrenhal_restored:0 "A Restauré Durlieu"
 harrenhal_restored_desc:0 "Cette personne a restauré le Château de Durlieu dans son état d'antan, redonnant à cette merveille maudite sa grandeur première. Cela pourrait ne pas plaire à ceux qui furent exploités lors de sa construction originelle."

