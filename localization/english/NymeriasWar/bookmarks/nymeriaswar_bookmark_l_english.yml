nymeria_bookmark_7299_1_desc:0 "Princess Nymeria leads the Rhoynar across the seas in search of a new home. Fleeing the destruction of the Rhoyne and the doom brought by Valyria, she sails with ten thousand ships and a people desperate to survive.\n\nHer fleet is vast, her warriors hardened by loss and hunger for a land to call their own. Soldiers, sailors, and survivors alike look to their princess, not just for leadership, but for a horizon worth sailing toward.\n\nThe seas are wide, and the world is cruel. But Nymeria will not stop until her people have a home worth fighting for."

