l_english:

 nymeria_rhoynar_dominance_modifier:0 "Dominion of the Rhoynar"
 nymeria_rhoynar_dominance_modifier_desc:0 "Dorne has felt the bite of Rhoynish spears. Adored by some and feared by all, none of Nymeria's vassals dares raise a banner against her."

 nymeria_conqueror_duel_modifier:0 "The Conqueror's Resolve"
 nymeria_conqueror_duel_modifier_desc:0 "Blade in hand and her people at her back, Nymeria fights as one born to it, every stroke sure and swift."
