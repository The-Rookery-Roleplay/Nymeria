l_english:

 building_nym_new_ny_sar_1:0 "New Ny Sar"
 building_type_nym_new_ny_sar_1:0 "Rhoynish Quarter"
 building_nym_new_ny_sar_1_desc:0 "Where a Dornish lord's hall once stood, the Rhoynar raise their own quarter, workshops, drilling yards and watchful streets named for the lost city of #bold Ny Sar#!. It eases the burden of keeping the spears fed and helps the new seat settle under Rhoynish rule."
