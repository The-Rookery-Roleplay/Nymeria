l_english:

 nickname_wyl_200:0 "the Cruel"
 nickname_wyl_200_desc:0 "The lapdog of House Yronwood and the terror of Dorne. Where other men kill out of duty or coin, Wyllas Wyl kills out of pleasure."
 
 
 nickname_tyrell_200:0 "the Hand of the Reach"
 nickname_tyrell_200_desc:0 "Having served as Hand during the long and feeble rule of the Greybeard, Osmund Tyrell became the steady hand guiding the Reach through mounting strife. Among many Reach lords it is often said that, without him, the rule of House Gardener, and perhaps the Reach itself, would have long since succumbed to civil war."
 nickname_hightower_200:0 "the Witless"
 nickname_hightower_200_desc:0 "Lord Steffon Hightower is widely known across the Reach for his dull mind and poor judgment. Once a house of great prestige, the Hightowers have become a laughing stock among the lords of the Reach under his inept rule."