 ### TRAITS TRACKS THAT REQUIRE CUSTOM LOC AFTER DESC ###
 trait_track_seasoned_rover_desc: "#help You gain experience in this track by winning battles.#!\n\nThe farther the road winds, the sharper the blade \n\n[command_modifier_i|E]#medium Uncontrolled Territory #![advantage|E]: @advantage_icon!#P +3#!\n[command_modifier_i|E]#medium Controlled Territory #![advantage|E]: @advantage_icon!#N -1#!"
 trait_track_resolute_localist_desc: "#help You gain experience in this track by winning battles.#!\n\nThe soil itself is oath enough, what is rooted here will not be surrendered.\n\n[command_modifier_i|E]#medium Controlled Territory #![advantage|E]: @advantage_icon!#P +3#!\n[command_modifier_i|E]#medium Uncontrolled Territory #![advantage|E]: @advantage_icon!#N -1#!"
 trait_track_relentless_pursuer_desc: "#help You gain experience in this track by winning battles.#!\n\nHe rides not to conquer, but to deny escape — a storm that does not pass.\n\n[command_modifier_i|E][army|E] #medium Movement Speed Per Battle Won: #!@movement_speed_icon!#P +2%#! #weak (4 months)#!\n[command_modifier_i|E]#medium Pursuit Efficiency Per Battle Won: #!@pursuit_icon!#P +5%#! #weak (4 months)#!"
 trait_track_bannerlord_desc: "#help You gain experience in this track by winning battles.#!\n\nAt dawn’s first light, every breeze stirs a banner, every heartbeat drums for war.\n\n[command_modifier_i|E][army|E] #medium Movement Speed After a War is Declared: #!@movement_speed_icon!#P  +5%#! #weak (1 year)#!\n[command_modifier_i|E]#medium Enemy [casualties|E] After a War is Declared: #P  +5%#! #weak (1 year)#!\n[command_modifier_i|E]#medium Attacker [advantage|E] After a War is Declared: #!@advantage_icon!#P +2#! #weak (1 year)#!"
 trait_track_military_savior_desc: "#help You gain experience in this track by winning battles.#!\n\nA commander is never late, nor is he early, he arrives precisely when he means to...\n\n[command_modifier_i|E]#medium Allied Hard Casualties When Joining a Battle: #P -15%#! #weak (10 days)#!\n[command_modifier_i|E]#medium Army Screen When Joining a Battle: #!@screen_icon!#P +30%#! #weak (10 days)#!\n[command_modifier_i|E]#medium [advantage|E] When Joining a Battle: #!@advantage_icon!#P +4#! #weak (10 days)#!"
 trait_track_skirmishers_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nHit-and-run. Again. And again. And again.\n\n[command_modifier_i|E]#medium Pursuit Efficiency Per [skirmishers|E] [regiment|E] in Army: #!@pursuit_icon!#P +1%#!\n[command_modifier_i|E]#medium Screen Per [skirmishers|E] [regiment|E] in Army: #!@screen_icon!#P +1%#!"
 trait_track_archers_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nThe bow speaks in silence; its answers arrive swift, unseen, and final.\n\n[command_modifier_i|E]#medium Army [damage|E] Per [archers|E] [regiment|E] in Army: #!@damage_icon!#P +1%#!"
