 trait_track_heavy_cav_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nClad in iron and fury, the cavalry sweeps across the plains.\n\n[command_modifier_i|E]#medium Army [advantage|E] in #![AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)1' ), 'HEAVY_CAV_LEVEL_1')][AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)2' ), 'HEAVY_CAV_LEVEL_2')][AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)3' ), 'HEAVY_CAV_LEVEL_3')]#medium ([terrain|E]) Per [heavy_cavalry|E] [regiment|E] in Army: #!@advantage_icon!#P +1#!"
 trait_track_light_cav_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nA blur of speed and sting, always just beyond reach.\n\n[command_modifier_i|E]#medium [raid|E] Speed Per [light_cavalry|E] [regiment|E] in Army: #!@raid_icon!#P +2%#!\n[command_modifier_i|E]#medium [army|E] Movement Speed Per [light_cavalry|E] [regiment|E] in Army: #!@movement_speed_icon!#P +1%#!"
 trait_track_heavy_infantry_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nIron advances without haste. Slow and steady wins the battle.\n\n[command_modifier_i|E]#medium Army [toughness|E] Per [heavy_infantry|E] [regiment|E] in Army: #!@toughness_icon!#P +1%#!"
 trait_track_archer_cav_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nMobility is the best of armours, range the best of shields.\n\n[command_modifier_i|E]#medium [men_at_arms_counter|E] Efficiency Per [archer_cavalry|E] [regiment|E] in Army: #!#P +1%#!"
 trait_track_pikemen_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nThe front becomes a field of spears, and no one gets through.\n\n[command_modifier_i|E]#medium [men_at_arms_counter|E] Resistance Per [spearmen|E] [regiment|E] in Army: #!#P +1%#!"
 trait_track_levies_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nAmong the common ranks, every voice is a vow, every hand a weapon raised.\n\n[command_modifier_i|E]#medium Army [damage|E] if there is NO [men_at_arms|E] [regiment|E] in Army: #!@damage_icon!#P +5%#!\n[command_modifier_i|E]#medium Army [toughness|E] if there is NO [men_at_arms|E] [regiment|E] in Army: #!@toughness_icon!#P +10%#!\n[command_modifier_i|E]#medium Army [screen|E] if there is NO [men_at_arms|E] [regiment|E] in Army: #!@screen_icon!#P +10%#!"
 trait_track_knights_specialist_desc: "#help You gain experience in this track by winning battles.#!\n\nSteel shines brighter when borne with honor.\n\n[AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)1' ), 'KNIGHTS_LEVEL_1')][AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)2' ), 'KNIGHTS_LEVEL_2')][AddLocalizationIf( EqualTo_int32( TraitLevelTrackEntry.GetLevel, '(int32)3' ), 'KNIGHTS_LEVEL_3')]"

