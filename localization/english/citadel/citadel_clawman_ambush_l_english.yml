 citadel_ambush_events.0001.title:0 "Eyes in the Thicket"
 citadel_ambush_events.0001.desc:0 "Crackclaw Point swallows armies. My men curse as the path narrows again, pinched between black pines, dripping bogs and hills riddled with caves. The locals never showed themselves at the border, and some of the men joked that the famous clawmen were nothing but fishwives' tales.\n\nThe joking stopped a moment ago. The man walking point is on his back with a throwing spear through his chest, and the brush on both sides of the trail rings with the sound of axes being drawn. They were never going to meet us in the field. They were waiting for us to come into the Claw, where every cave, creek and crab-pot is theirs...\n\nThe clawmen are upon us!"
 citadel_ambush_events.0001.attack:0 "Damn!"
