l_english:


 ################################
 # Winged Knight Maintenance Events
 # 1000 - 1999
 # by Badger
 ################################


 agot_winged_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winged_knight)]"
 agot_winged_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_winged_knight.1001.desc.intro:0 "[dead_winged_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winged_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winged_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winged_knight)] [dead_winged_knight.GetDeathReason] in [dead_winged_knight.GetHerHis] [dead_winged_knight.GetAge][dead_winged_knight.Custom('GetAgeOrdinal')] year."
 agot_winged_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winged_knight.1001.desc.talented:0 "\n\n[dead_winged_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_winged_knight.GetHerHim] with a blade in hand described [dead_winged_knight.GetHerHim] as having fought like the [dead_winged_knight.GetFaith.WarGodName] incarnate. [dead_winged_knight.GetHerHis|U] steel now rests alongside [dead_winged_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_winged_knight.1001.desc.suitable:0 "\n\n[dead_winged_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_winged_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_winged_knight.GetHerselfHimself] with aplomb in the service of [dead_winged_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_winged_knight.GetHerHis] skill at arms."
 agot_winged_knight.1001.desc.passing:0 "\n\n[dead_winged_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_winged_knight.GetSheHe] was the fiercest of warriors."
 agot_winged_knight.1001.desc.unsuitable:0 "\n\n[dead_winged_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_winged_knight.1001.desc.end:0 "\n\nWith [dead_winged_knight.GetHerHis] departure to [dead_winged_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_winged_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_winged_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_winged_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_winged_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_winged_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_winged_knight.1001.c:0 "There are more pressing matters at hand."
 agot_winged_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."

 agot_winged_knight.1002.t:0 "Bestowing the Mantle"
 agot_winged_knight.1002.desc.intro:0 "[dead_winged_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winged_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winged_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winged_knight)] [dead_winged_knight.GetDeathReason] in [dead_winged_knight.GetHerHis] [dead_winged_knight.GetAge][dead_winged_knight.Custom('GetAgeOrdinal')] year."
 agot_winged_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winged_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winged_knight_candidate_1)] is the certain choice!"
 agot_winged_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winged_knight_candidate_2)] has the stature of a warrior!"
 agot_winged_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winged_knight_candidate_3)] is built for the position!"
 agot_winged_knight.1002.d:0 "Bah, none of these will do."
 agot_winged_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to your Winged Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_winged_knight.1002.e:0 "I will need to look elsewhere."
 agot_winged_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to your Winged Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips

 agot_winged_knight.1003.t:0 "Bestowing the Mantle"
 agot_winged_knight.1003.desc.intro:0 "[dead_winged_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winged_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winged_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winged_knight)] [dead_winged_knight.GetDeathReason]."
 agot_winged_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winged_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."

 agot_winged_knight.1005.opening:0 "[winged_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_winged_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_winged_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_winged_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_winged_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_winged_knight.1005.a:0 "You shall come to the capital to take your vows!"

 agot_winged_knight.1007.opening:0 "[winged_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_winged_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_winged_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_winged_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_winged_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_winged_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_winged_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_winged_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_winged_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_winged_knight.1007.a.tt:0 "You will send for more knights."
 agot_winged_knight.1007.b:0 "[winged_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"

 agot_winged_knight.1008.t:0 "Vows Bestowed"
 agot_winged_knight.1008.desc:0 "[winged_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [winged_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [winged_knight_candidate.GetHerHis] mind or hold [winged_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [winged_knight_candidate.GetSheHe|U] rises, pledging to me with all [winged_knight_candidate.GetHerHis] strength to give [winged_knight_candidate.GetHerHis] life to protect me."
 agot_winged_knight.1008.a:0 "Rise, Ser [winged_knight_candidate.GetFirstNameNoTooltip]."

 agot_winged_knight.1009.t:0 "[winged_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_winged_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', winged_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [winged_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_winged_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""

 agot_winged_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', winged_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [winged_knight_candidate.GetFullName]."

 agot_winged_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_winged_knight.1009.a.glad:0 "Indeed, protecting me is an honor."

 agot_winged_knight.1010.t:0 "A Brotherhood Bereft"
 agot_winged_knight.1010.desc.intro:0 "With the passing of [dead_winged_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_winged_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_winged_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(winged_knight_successor)] would seem the best [winged_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_winged_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_winged_knight.1010.a:0 "[AGOTGetName(winged_knight_successor)] is the natural successor to the office."
 agot_winged_knight.1010.b:0 "[AGOTGetName(winged_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.1010.c:0 "[AGOTGetName(winged_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.1010.d:0 "[AGOTGetName(winged_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_winged_knight.1010.f:0 "There's... there's no one left."

 agot_winged_knight.1011.a:0 "[AGOTGetName(winged_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.1011.b:0 "[AGOTGetName(winged_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.1011.c:0 "[AGOTGetName(winged_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"

 winged_knight_other_selections_available_tt:0 "I shall consider my other guards"


 ################################
 # Winged Knight Councillor Events
 # 2000 - 2999
 ################################

 agot_winged_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_winged_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_winged_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_winged_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_winged_knight.2001.a: "Protect the designated target."
 agot_winged_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_winged_knight.2001.c: "Actually, never mind."

 agot_winged_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_winged_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[winged_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_winged_knight.2002.a:0 "[winged_knight.GetName], return your sworn brother to me!"
 agot_winged_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_winged_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_winged_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."

 agot_winged_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_winged_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_winged_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_winged_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_winged_knight.GetSheHe] finds [fleeing_winged_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_winged_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_winged_knight'))], and you belong here."
 agot_winged_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_winged_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_winged_knight.2003.d:0 "I'm sorry [fleeing_winged_knight.GetFirstName], but I cannot harbor a fugitive."

 ################################
 # Winged Knight Flavour Events
 # 3000 - 3999
 # by Badger
 ################################

 agot_winged_knight.3001.t:0 "A Child's Dream"
 agot_winged_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_winged_knight.3001.a:0 "By all means, little one."
 agot_winged_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."

 agot_winged_knight.3002.t:0 "A Beacon of Chivalry"
 agot_winged_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_winged_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_winged_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_winged_knight.GetHerHis] affect and re-enact [gallant_winged_knight.GetHerHis] exploits in [gallant_winged_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_winged_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_winged_knight.GetHerHis] deeds, and the [gallant_winged_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_winged_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_winged_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_winged_knight.3002.a:0 "I commend you, Ser [gallant_winged_knight.GetFirstNameNoTooltip]."
 agot_winged_knight.3002.b:0 "I would rather talk about my favorite topic: myself."

 agot_winged_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_winged_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_winged_knight.GetName] has been discovered in [lusty_winged_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_winged_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_winged_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_winged_knight.3003.a:0 "Throw [lusty_winged_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_winged_knight.3003.b:0 "Mutilate [lusty_winged_knight.GetHerHim], and send [lusty_winged_knight.GetHerHim] to join the Night's Watch."
 agot_winged_knight.3003.c:0 "Strip [lusty_winged_knight.GetHerHim] of [lusty_winged_knight.GetHerHis] white cloak."
 agot_winged_knight.3003.d:0 "Everyone deserves their vices..."
 agot_winged_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."

 agot_winged_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_winged_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_winged_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_winged_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_winged_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_winged_knight.GetName] marches [marching_winged_knight.GetHerHis] way to my side to being the morning's watch."
 agot_winged_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_winged_knight.3004.b:0 "[marching_winged_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_winged_knight.3004.c:0 "Send the child to the Maester."
 agot_winged_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_winged_knight.3004.toast:0 "Maester Unsuccessful"
 agot_winged_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."

 agot_winged_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_winged_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_winged_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_winged_knight.3005.agot_winged_knight.tt:0 "[essosi_warrior.GetName] will join your Winged Knights "
 agot_winged_knight.3005.b:0 "Perhaps you would take another position?"
 agot_winged_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_winged_knight.3005.c:0 "I have no need for more courtiers."

 agot_winged_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_winged_knight.3006.desc:0 "[friendly_winged_knight.GetFullName] is an outgoing sort of [friendly_winged_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_winged_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [winged_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_winged_knight.3006.a:0 "Let their friendship lead them to greater valours!"

 agot_winged_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_winged_knight.3007.desc:0 "[improved_winged_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_winged_knight.GetHerHis] vows have led to this improvement."

 agot_winged_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_winged_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_winged_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_winged_knight.3008.agot_winged_knight.tt:0 "[candidate.GetName] will join your Winged Knights "
 agot_winged_knight.3008.b:0 "Perhaps you would take another position?"
 agot_winged_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_winged_knight.3008.c:0 "I am not so desperate that your like would guard me."

 agot_winged_knight.3010.t:0 "The Sweat of [strong_winged_knight.GetHerHis] Brow"
 agot_winged_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_winged_knight.GetFullName] has taken to spending all [strong_winged_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_winged_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_winged_knight.GetHerHis] form, as [strong_winged_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_winged_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_winged_knight.GetFirstNameNoTooltip] is at work."
 agot_winged_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_winged_knight.Custom('SisterBrother')]!"

 agot_winged_knight.3011.t:0 "A Challenger Approaches"
 agot_winged_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_winged_knight.Custom('InsultAdjective')] [unworthy_winged_knight.Custom('InsultNoun')] [unworthy_winged_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_winged_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_winged_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_winged_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_winged_knight.3011.a:0 "Then let the better man guard my door."
 agot_winged_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_winged_knight.GetTitledFirstName]"
 agot_winged_knight.3011.a.unworthy_winged_knight.toast:0 "[unworthy_winged_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_winged_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_winged_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_winged_knight.GetHerHis] keep."
 agot_winged_knight.3011.c:0 "Nobody questions my appointments. Guards!"

 agot_winged_knight.3012.t:0 "A Broken Dream"
 agot_winged_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_winged_knight.Custom('GetDaughterSon')] in the courtyard. [failed_winged_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_winged_knight.GetSheHe] began [failed_winged_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_winged_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_winged_knight.3012.a:0 "It is time to move on from this."
 agot_winged_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_winged_knight.3012.c:0 "[failed_winged_knight.GetSheHe|U]'ll get better!"


 agot_winged_knight.3013.t:0 "Some Drink to Remember"
 agot_winged_knight.3013.desc:0 "[drunken_winged_knight.GetFullName] is known to spend all [drunken_winged_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_winged_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_winged_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_winged_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_winged_knight.3013.a:0 "A night in the cells will sober [drunken_winged_knight.GetHerHim] up."
 agot_winged_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_winged_knight.GetHerHim] be."
 agot_winged_knight.3013.c:0 "[drunken_winged_knight.GetFullName] is a [drunken_winged_knight.GetWomanMan] after my own heart!"


 agot_winged_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winged_knight.GetFullName] spends much of [lifestyle_winged_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_winged_knight.GetHerHis] brow as [lifestyle_winged_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_winged_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_winged_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_winged_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_winged_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_winged_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_winged_knight.GetFirstNameNoTooltip]?"


 agot_winged_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winged_knight.GetFullName] spends much of [lifestyle_winged_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_winged_knight.GetHerHim] through [lifestyle_winged_knight.GetHerHis] prestigious station.\n\n[lifestyle_winged_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_winged_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_winged_knight.GetHerHim] to return to from [lifestyle_winged_knight.GetHerHis] excursions with [lifestyle_winged_knight.GetHerHis] boots mucked and [lifestyle_winged_knight.GetHerHis] entourage carrying [lifestyle_winged_knight.GetHerHis] latest trophy. [lifestyle_winged_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_winged_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_winged_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_winged_knight.GetFirstNameNoTooltip]!"

 agot_winged_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winged_knight.GetFullName] spends much of [lifestyle_winged_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_winged_knight.GetHerHim] through [lifestyle_winged_knight.GetHerHis] prestigious station.\n\n[lifestyle_winged_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_winged_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_winged_knight.GetHerHim] to return to from [lifestyle_winged_knight.GetHerHis] excursions with [lifestyle_winged_knight.GetHerHis] boots mucked and [lifestyle_winged_knight.GetHerHis] entourage carrying [lifestyle_winged_knight.GetHerHis] latest trophy. [lifestyle_winged_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_winged_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_winged_knight.3016.a:0 "A truly noble pursuit, [lifestyle_winged_knight.GetFullNameNoTooltip]!"

 agot_winged_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_winged_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_winged_knight.GetFullName] has been found outside of a local brothel. [eunuch_winged_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_winged_knight.GetHerHis] own cock stuffed into [eunuch_winged_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_winged_knight.GetHerHis] lessers. Nude and without [eunuch_winged_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_winged_knight.GetFirstName] was well known, but not particularly well liked."
 agot_winged_knight.3017.a:0 "[eunuch_winged_knight.GetFirstNameNoTooltip] you fool!"

 agot_winged_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_winged_knight.9100.a:0 "Let the judgement begin."

 agot_winged_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_winged_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.9101.a:0 "My will shall be done."
 agot_winged_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_winged_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_winged_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."



 ################################
 # Knight of the Greenhand Maintenance Events
 # 1000 - 1999
 # by Badger
 ################################


 agot_green_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_green_knight)]"
 agot_green_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_green_knight.1001.desc.intro:0 "[dead_green_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_green_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_green_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_green_knight)] [dead_green_knight.GetDeathReason] in [dead_green_knight.GetHerHis] [dead_green_knight.GetAge][dead_green_knight.Custom('GetAgeOrdinal')] year."
 agot_green_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_green_knight.1001.desc.talented:0 "\n\n[dead_green_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_green_knight.GetHerHim] with a blade in hand described [dead_green_knight.GetHerHim] as having fought like the [dead_green_knight.GetFaith.WarGodName] incarnate. [dead_green_knight.GetHerHis|U] steel now rests alongside [dead_green_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_green_knight.1001.desc.suitable:0 "\n\n[dead_green_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_green_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_green_knight.GetHerselfHimself] with aplomb in the service of [dead_green_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_green_knight.GetHerHis] skill at arms."
 agot_green_knight.1001.desc.passing:0 "\n\n[dead_green_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_green_knight.GetSheHe] was the fiercest of warriors."
 agot_green_knight.1001.desc.unsuitable:0 "\n\n[dead_green_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_green_knight.1001.desc.end:0 "\n\nWith [dead_green_knight.GetHerHis] departure to [dead_green_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_green_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_green_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_green_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_green_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_green_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_green_knight.1001.c:0 "There are more pressing matters at hand."
 agot_green_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."

 agot_green_knight.1002.t:0 "Bestowing the Mantle"
 agot_green_knight.1002.desc.intro:0 "[dead_green_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_green_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_green_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_green_knight)] [dead_green_knight.GetDeathReason] in [dead_green_knight.GetHerHis] [dead_green_knight.GetAge][dead_green_knight.Custom('GetAgeOrdinal')] year."
 agot_green_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_green_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(green_knight_candidate_1)] is the certain choice!"
 agot_green_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(green_knight_candidate_2)] has the stature of a warrior!"
 agot_green_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(green_knight_candidate_3)] is built for the position!"
 agot_green_knight.1002.d:0 "Bah, none of these will do."
 agot_green_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to the Order of the Greenhand" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_green_knight.1002.e:0 "I will need to look elsewhere."
 agot_green_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to the Order of the Greenhand" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips

 agot_green_knight.1003.t:0 "Bestowing the Mantle"
 agot_green_knight.1003.desc.intro:0 "[dead_green_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_green_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_green_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_green_knight)] [dead_green_knight.GetDeathReason]."
 agot_green_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_green_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."

 agot_green_knight.1005.opening:0 "[green_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_green_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_green_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_green_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_green_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_green_knight.1005.a:0 "You shall come to the capital to take your vows!"

 agot_green_knight.1007.opening:0 "[green_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_green_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_green_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_green_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_green_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_green_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_green_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_green_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_green_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_green_knight.1007.a.tt:0 "You will send for more knights."
 agot_green_knight.1007.b:0 "[green_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"

 agot_green_knight.1008.t:0 "Vows Bestowed"
 agot_green_knight.1008.desc:0 "[green_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [green_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [green_knight_candidate.GetHerHis] mind or hold [green_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [green_knight_candidate.GetSheHe|U] rises, pledging to me with all [green_knight_candidate.GetHerHis] strength to give [green_knight_candidate.GetHerHis] life to protect me."
 agot_green_knight.1008.a:0 "Rise, Ser [green_knight_candidate.GetFirstNameNoTooltip]."

 agot_green_knight.1009.t:0 "[green_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_green_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', green_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [green_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_green_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""

 agot_green_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', green_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [green_knight_candidate.GetFullName]."

 agot_green_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_green_knight.1009.a.glad:0 "Indeed, protecting me is an honor."

 agot_green_knight.1010.t:0 "A Brotherhood Bereft"
 agot_green_knight.1010.desc.intro:0 "With the passing of [dead_green_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_green_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_green_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(green_knight_successor)] would seem the best [green_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_green_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_green_knight.1010.a:0 "[AGOTGetName(green_knight_successor)] is the natural successor to the office."
 agot_green_knight.1010.b:0 "[AGOTGetName(green_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.1010.c:0 "[AGOTGetName(green_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.1010.d:0 "[AGOTGetName(green_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_green_knight.1010.f:0 "There's... there's no one left."

 agot_green_knight.1011.a:0 "[AGOTGetName(green_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.1011.b:0 "[AGOTGetName(green_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.1011.c:0 "[AGOTGetName(green_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"

 green_knight_other_selections_available_tt:0 "I shall consider my other guards"


 ################################
 # Knight of the Greenhand Councillor Events
 # 2000 - 2999
 ################################

 agot_green_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_green_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_green_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_green_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_green_knight.2001.a: "Protect the designated target."
 agot_green_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_green_knight.2001.c: "Actually, never mind."

 agot_green_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_green_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[green_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_green_knight.2002.a:0 "[green_knight.GetName], return your sworn brother to me!"
 agot_green_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_green_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_green_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."

 agot_green_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_green_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_green_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_green_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_green_knight.GetSheHe] finds [fleeing_green_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_green_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_green_knight'))], and you belong here."
 agot_green_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_green_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_green_knight.2003.d:0 "I'm sorry [fleeing_green_knight.GetFirstName], but I cannot harbor a fugitive."

 ################################
 # Knight of the Greenhand Flavour Events
 # 3000 - 3999
 # by Badger
 ################################

 agot_green_knight.3001.t:0 "A Child's Dream"
 agot_green_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_green_knight.3001.a:0 "By all means, little one."
 agot_green_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."

 agot_green_knight.3002.t:0 "A Beacon of Chivalry"
 agot_green_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_green_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_green_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_green_knight.GetHerHis] affect and re-enact [gallant_green_knight.GetHerHis] exploits in [gallant_green_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_green_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_green_knight.GetHerHis] deeds, and the [gallant_green_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_green_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_green_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_green_knight.3002.a:0 "I commend you, Ser [gallant_green_knight.GetFirstNameNoTooltip]."
 agot_green_knight.3002.b:0 "I would rather talk about my favorite topic: myself."

 agot_green_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_green_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_green_knight.GetName] has been discovered in [lusty_green_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_green_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_green_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_green_knight.3003.a:0 "Throw [lusty_green_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_green_knight.3003.b:0 "Mutilate [lusty_green_knight.GetHerHim], and send [lusty_green_knight.GetHerHim] to join the Night's Watch."
 agot_green_knight.3003.c:0 "Strip [lusty_green_knight.GetHerHim] of [lusty_green_knight.GetHerHis] white cloak."
 agot_green_knight.3003.d:0 "Everyone deserves their vices..."
 agot_green_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."

 agot_green_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_green_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_green_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_green_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_green_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_green_knight.GetName] marches [marching_green_knight.GetHerHis] way to my side to being the morning's watch."
 agot_green_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_green_knight.3004.b:0 "[marching_green_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_green_knight.3004.c:0 "Send the child to the Maester."
 agot_green_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_green_knight.3004.toast:0 "Maester Unsuccessful"
 agot_green_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."

 agot_green_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_green_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_green_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_green_knight.3005.agot_green_knight.tt:0 "[essosi_warrior.GetName] will join your Order of the Greenhand "
 agot_green_knight.3005.b:0 "Perhaps you would take another position?"
 agot_green_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_green_knight.3005.c:0 "I have no need for more courtiers."

 agot_green_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_green_knight.3006.desc:0 "[friendly_green_knight.GetFullName] is an outgoing sort of [friendly_green_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_green_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [green_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_green_knight.3006.a:0 "Let their friendship lead them to greater valours!"

 agot_green_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_green_knight.3007.desc:0 "[improved_green_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_green_knight.GetHerHis] vows have led to this improvement."

 agot_green_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_green_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_green_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_green_knight.3008.agot_green_knight.tt:0 "[candidate.GetName] will join your Order of the Greenhand "
 agot_green_knight.3008.b:0 "Perhaps you would take another position?"
 agot_green_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_green_knight.3008.c:0 "I am not so desperate that your like would guard me."

 agot_green_knight.3010.t:0 "The Sweat of [strong_green_knight.GetHerHis] Brow"
 agot_green_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_green_knight.GetFullName] has taken to spending all [strong_green_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_green_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_green_knight.GetHerHis] form, as [strong_green_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_green_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_green_knight.GetFirstNameNoTooltip] is at work."
 agot_green_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_green_knight.Custom('SisterBrother')]!"

 agot_green_knight.3011.t:0 "A Challenger Approaches"
 agot_green_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_green_knight.Custom('InsultAdjective')] [unworthy_green_knight.Custom('InsultNoun')] [unworthy_green_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_green_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_green_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_green_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_green_knight.3011.a:0 "Then let the better man guard my door."
 agot_green_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_green_knight.GetTitledFirstName]"
 agot_green_knight.3011.a.unworthy_green_knight.toast:0 "[unworthy_green_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_green_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_green_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_green_knight.GetHerHis] keep."
 agot_green_knight.3011.c:0 "Nobody questions my appointments. Guards!"

 agot_green_knight.3012.t:0 "A Broken Dream"
 agot_green_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_green_knight.Custom('GetDaughterSon')] in the courtyard. [failed_green_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_green_knight.GetSheHe] began [failed_green_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_green_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_green_knight.3012.a:0 "It is time to move on from this."
 agot_green_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_green_knight.3012.c:0 "[failed_green_knight.GetSheHe|U]'ll get better!"


 agot_green_knight.3013.t:0 "Some Drink to Remember"
 agot_green_knight.3013.desc:0 "[drunken_green_knight.GetFullName] is known to spend all [drunken_green_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_green_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_green_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_green_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_green_knight.3013.a:0 "A night in the cells will sober [drunken_green_knight.GetHerHim] up."
 agot_green_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_green_knight.GetHerHim] be."
 agot_green_knight.3013.c:0 "[drunken_green_knight.GetFullName] is a [drunken_green_knight.GetWomanMan] after my own heart!"


 agot_green_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_green_knight.GetFullName] spends much of [lifestyle_green_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_green_knight.GetHerHis] brow as [lifestyle_green_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_green_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_green_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_green_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_green_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_green_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_green_knight.GetFirstNameNoTooltip]?"


 agot_green_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_green_knight.GetFullName] spends much of [lifestyle_green_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_green_knight.GetHerHim] through [lifestyle_green_knight.GetHerHis] prestigious station.\n\n[lifestyle_green_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_green_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_green_knight.GetHerHim] to return to from [lifestyle_green_knight.GetHerHis] excursions with [lifestyle_green_knight.GetHerHis] boots mucked and [lifestyle_green_knight.GetHerHis] entourage carrying [lifestyle_green_knight.GetHerHis] latest trophy. [lifestyle_green_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_green_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_green_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_green_knight.GetFirstNameNoTooltip]!"

 agot_green_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_green_knight.GetFullName] spends much of [lifestyle_green_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_green_knight.GetHerHim] through [lifestyle_green_knight.GetHerHis] prestigious station.\n\n[lifestyle_green_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_green_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_green_knight.GetHerHim] to return to from [lifestyle_green_knight.GetHerHis] excursions with [lifestyle_green_knight.GetHerHis] boots mucked and [lifestyle_green_knight.GetHerHis] entourage carrying [lifestyle_green_knight.GetHerHis] latest trophy. [lifestyle_green_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_green_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_green_knight.3016.a:0 "A truly noble pursuit, [lifestyle_green_knight.GetFullNameNoTooltip]!"

 agot_green_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_green_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_green_knight.GetFullName] has been found outside of a local brothel. [eunuch_green_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_green_knight.GetHerHis] own cock stuffed into [eunuch_green_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_green_knight.GetHerHis] lessers. Nude and without [eunuch_green_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_green_knight.GetFirstName] was well known, but not particularly well liked."
 agot_green_knight.3017.a:0 "[eunuch_green_knight.GetFirstNameNoTooltip] you fool!"

 agot_green_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_green_knight.9100.a:0 "Let the judgement begin."

 agot_green_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_green_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.9101.a:0 "My will shall be done."
 agot_green_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_green_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_green_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_sun_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_sun_knight)]"
 agot_sun_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_sun_knight.1001.desc.intro:0 "[dead_sun_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_sun_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_sun_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_sun_knight)] [dead_sun_knight.GetDeathReason] in [dead_sun_knight.GetHerHis] [dead_sun_knight.GetAge][dead_sun_knight.Custom('GetAgeOrdinal')] year."
 agot_sun_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_sun_knight.1001.desc.talented:0 "\n\n[dead_sun_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_sun_knight.GetHerHim] with a blade in hand described [dead_sun_knight.GetHerHim] as having fought like the [dead_sun_knight.GetFaith.WarGodName] incarnate. [dead_sun_knight.GetHerHis|U] steel now rests alongside [dead_sun_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_sun_knight.1001.desc.suitable:0 "\n\n[dead_sun_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_sun_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_sun_knight.GetHerselfHimself] with aplomb in the service of [dead_sun_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_sun_knight.GetHerHis] skill at arms."
 agot_sun_knight.1001.desc.passing:0 "\n\n[dead_sun_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_sun_knight.GetSheHe] was the fiercest of warriors."
 agot_sun_knight.1001.desc.unsuitable:0 "\n\n[dead_sun_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_sun_knight.1001.desc.end:0 "\n\nWith [dead_sun_knight.GetHerHis] departure to [dead_sun_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_sun_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_sun_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_sun_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_sun_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_sun_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_sun_knight.1001.c:0 "There are more pressing matters at hand."
 agot_sun_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_sun_knight.1002.t:0 "Bestowing the Mantle"
 agot_sun_knight.1002.desc.intro:0 "[dead_sun_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_sun_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_sun_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_sun_knight)] [dead_sun_knight.GetDeathReason] in [dead_sun_knight.GetHerHis] [dead_sun_knight.GetAge][dead_sun_knight.Custom('GetAgeOrdinal')] year."
 agot_sun_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_sun_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(sun_knight_candidate_1)] is the certain choice!"
 agot_sun_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(sun_knight_candidate_2)] has the stature of a warrior!"
 agot_sun_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(sun_knight_candidate_3)] is built for the position!"
 agot_sun_knight.1002.d:0 "Bah, none of these will do."
 agot_sun_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to your Sun Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_sun_knight.1002.e:0 "I will need to look elsewhere."
 agot_sun_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to your Sun Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_sun_knight.1003.t:0 "Bestowing the Mantle"
 agot_sun_knight.1003.desc.intro:0 "[dead_sun_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_sun_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_sun_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_sun_knight)] [dead_sun_knight.GetDeathReason]."
 agot_sun_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_sun_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1005.opening:0 "[sun_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_sun_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_sun_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_sun_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_sun_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_sun_knight.1005.a:0 "You shall come to the capital to take your vows!"
 agot_sun_knight.1007.opening:0 "[sun_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_sun_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_sun_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_sun_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_sun_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_sun_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_sun_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_sun_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_sun_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_sun_knight.1007.a.tt:0 "You will send for more knights."
 agot_sun_knight.1007.b:0 "[sun_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_sun_knight.1008.t:0 "Vows Bestowed"
 agot_sun_knight.1008.desc:0 "[sun_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [sun_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [sun_knight_candidate.GetHerHis] mind or hold [sun_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [sun_knight_candidate.GetSheHe|U] rises, pledging to me with all [sun_knight_candidate.GetHerHis] strength to give [sun_knight_candidate.GetHerHis] life to protect me."
 agot_sun_knight.1008.a:0 "Rise, Ser [sun_knight_candidate.GetFirstNameNoTooltip]."
 agot_sun_knight.1009.t:0 "[sun_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_sun_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', sun_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [sun_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_sun_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_sun_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', sun_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [sun_knight_candidate.GetFullName]."
 agot_sun_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_sun_knight.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_sun_knight.1010.t:0 "A Brotherhood Bereft"
 agot_sun_knight.1010.desc.intro:0 "With the passing of [dead_sun_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_sun_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_sun_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(sun_knight_successor)] would seem the best [sun_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_sun_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_sun_knight.1010.a:0 "[AGOTGetName(sun_knight_successor)] is the natural successor to the office."
 agot_sun_knight.1010.b:0 "[AGOTGetName(sun_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1010.c:0 "[AGOTGetName(sun_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1010.d:0 "[AGOTGetName(sun_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_sun_knight.1010.f:0 "There's... there's no one left."
 agot_sun_knight.1011.a:0 "[AGOTGetName(sun_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.1011.b:0 "[AGOTGetName(sun_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.1011.c:0 "[AGOTGetName(sun_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 sun_knight_other_selections_available_tt:0 "I shall consider my other guards"
 agot_sun_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_sun_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_sun_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_sun_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_sun_knight.2001.a: "Protect the designated target."
 agot_sun_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_sun_knight.2001.c: "Actually, never mind."
 agot_sun_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_sun_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[sun_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_sun_knight.2002.a:0 "[sun_knight.GetName], return your sworn brother to me!"
 agot_sun_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_sun_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_sun_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_sun_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_sun_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_sun_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_sun_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_sun_knight.GetSheHe] finds [fleeing_sun_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_sun_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_sun_knight'))], and you belong here."
 agot_sun_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_sun_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_sun_knight.2003.d:0 "I'm sorry [fleeing_sun_knight.GetFirstName], but I cannot harbor a fugitive."
 agot_sun_knight.3001.t:0 "A Child's Dream"
 agot_sun_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_sun_knight.3001.a:0 "By all means, little one."
 agot_sun_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_sun_knight.3002.t:0 "A Beacon of Chivalry"
 agot_sun_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_sun_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_sun_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_sun_knight.GetHerHis] affect and re-enact [gallant_sun_knight.GetHerHis] exploits in [gallant_sun_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_sun_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_sun_knight.GetHerHis] deeds, and the [gallant_sun_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_sun_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_sun_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_sun_knight.3002.a:0 "I commend you, Ser [gallant_sun_knight.GetFirstNameNoTooltip]."
 agot_sun_knight.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_sun_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_sun_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_sun_knight.GetName] has been discovered in [lusty_sun_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_sun_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_sun_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_sun_knight.3003.a:0 "Throw [lusty_sun_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_sun_knight.3003.b:0 "Mutilate [lusty_sun_knight.GetHerHim], and send [lusty_sun_knight.GetHerHim] to join the Night's Watch."
 agot_sun_knight.3003.c:0 "Strip [lusty_sun_knight.GetHerHim] of [lusty_sun_knight.GetHerHis] white cloak."
 agot_sun_knight.3003.d:0 "Everyone deserves their vices..."
 agot_sun_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_sun_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_sun_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_sun_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_sun_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_sun_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_sun_knight.GetName] marches [marching_sun_knight.GetHerHis] way to my side to being the morning's watch."
 agot_sun_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_sun_knight.3004.b:0 "[marching_sun_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_sun_knight.3004.c:0 "Send the child to the Maester."
 agot_sun_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_sun_knight.3004.toast:0 "Maester Unsuccessful"
 agot_sun_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_sun_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_sun_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_sun_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_sun_knight.3005.agot_sun_knight.tt:0 "[essosi_warrior.GetName] will join your Sun Knights "
 agot_sun_knight.3005.b:0 "Perhaps you would take another position?"
 agot_sun_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_sun_knight.3005.c:0 "I have no need for more courtiers."
 agot_sun_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_sun_knight.3006.desc:0 "[friendly_sun_knight.GetFullName] is an outgoing sort of [friendly_sun_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_sun_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [sun_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_sun_knight.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_sun_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_sun_knight.3007.desc:0 "[improved_sun_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_sun_knight.GetHerHis] vows have led to this improvement."
 agot_sun_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_sun_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_sun_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_sun_knight.3008.agot_sun_knight.tt:0 "[candidate.GetName] will join your Sun Knights "
 agot_sun_knight.3008.b:0 "Perhaps you would take another position?"
 agot_sun_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_sun_knight.3008.c:0 "I am not so desperate that your like would guard me."
 agot_sun_knight.3010.t:0 "The Sweat of [strong_sun_knight.GetHerHis] Brow"
 agot_sun_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_sun_knight.GetFullName] has taken to spending all [strong_sun_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_sun_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_sun_knight.GetHerHis] form, as [strong_sun_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_sun_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_sun_knight.GetFirstNameNoTooltip] is at work."
 agot_sun_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_sun_knight.Custom('SisterBrother')]!"
 agot_sun_knight.3011.t:0 "A Challenger Approaches"
 agot_sun_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_sun_knight.Custom('InsultAdjective')] [unworthy_sun_knight.Custom('InsultNoun')] [unworthy_sun_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_sun_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_sun_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_sun_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_sun_knight.3011.a:0 "Then let the better man guard my door."
 agot_sun_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_sun_knight.GetTitledFirstName]"
 agot_sun_knight.3011.a.unworthy_sun_knight.toast:0 "[unworthy_sun_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_sun_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_sun_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_sun_knight.GetHerHis] keep."
 agot_sun_knight.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_sun_knight.3012.t:0 "A Broken Dream"
 agot_sun_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_sun_knight.Custom('GetDaughterSon')] in the courtyard. [failed_sun_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_sun_knight.GetSheHe] began [failed_sun_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_sun_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_sun_knight.3012.a:0 "It is time to move on from this."
 agot_sun_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_sun_knight.3012.c:0 "[failed_sun_knight.GetSheHe|U]'ll get better!"
 agot_sun_knight.3013.t:0 "Some Drink to Remember"
 agot_sun_knight.3013.desc:0 "[drunken_sun_knight.GetFullName] is known to spend all [drunken_sun_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_sun_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_sun_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_sun_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_sun_knight.3013.a:0 "A night in the cells will sober [drunken_sun_knight.GetHerHim] up."
 agot_sun_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_sun_knight.GetHerHim] be."
 agot_sun_knight.3013.c:0 "[drunken_sun_knight.GetFullName] is a [drunken_sun_knight.GetWomanMan] after my own heart!"
 agot_sun_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_sun_knight.GetFullName] spends much of [lifestyle_sun_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_sun_knight.GetHerHis] brow as [lifestyle_sun_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_sun_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_sun_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_sun_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_sun_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_sun_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_sun_knight.GetFirstNameNoTooltip]?"
 agot_sun_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_sun_knight.GetFullName] spends much of [lifestyle_sun_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_sun_knight.GetHerHim] through [lifestyle_sun_knight.GetHerHis] prestigious station.\n\n[lifestyle_sun_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_sun_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_sun_knight.GetHerHim] to return to from [lifestyle_sun_knight.GetHerHis] excursions with [lifestyle_sun_knight.GetHerHis] boots mucked and [lifestyle_sun_knight.GetHerHis] entourage carrying [lifestyle_sun_knight.GetHerHis] latest trophy. [lifestyle_sun_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_sun_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_sun_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_sun_knight.GetFirstNameNoTooltip]!"
 agot_sun_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_sun_knight.GetFullName] spends much of [lifestyle_sun_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_sun_knight.GetHerHim] through [lifestyle_sun_knight.GetHerHis] prestigious station.\n\n[lifestyle_sun_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_sun_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_sun_knight.GetHerHim] to return to from [lifestyle_sun_knight.GetHerHis] excursions with [lifestyle_sun_knight.GetHerHis] boots mucked and [lifestyle_sun_knight.GetHerHis] entourage carrying [lifestyle_sun_knight.GetHerHis] latest trophy. [lifestyle_sun_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_sun_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_sun_knight.3016.a:0 "A truly noble pursuit, [lifestyle_sun_knight.GetFullNameNoTooltip]!"
 agot_sun_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_sun_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_sun_knight.GetFullName] has been found outside of a local brothel. [eunuch_sun_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_sun_knight.GetHerHis] own cock stuffed into [eunuch_sun_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_sun_knight.GetHerHis] lessers. Nude and without [eunuch_sun_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_sun_knight.GetFirstName] was well known, but not particularly well liked."
 agot_sun_knight.3017.a:0 "[eunuch_sun_knight.GetFirstNameNoTooltip] you fool!"
 agot_sun_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_sun_knight.9100.a:0 "Let the judgement begin."
 agot_sun_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_sun_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.9101.a:0 "My will shall be done."
 agot_sun_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_sun_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_sun_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_storm_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_storm_knight)]"
 agot_storm_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_storm_knight.1001.desc.intro:0 "[dead_storm_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_storm_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_storm_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_storm_knight)] [dead_storm_knight.GetDeathReason] in [dead_storm_knight.GetHerHis] [dead_storm_knight.GetAge][dead_storm_knight.Custom('GetAgeOrdinal')] year."
 agot_storm_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_storm_knight.1001.desc.talented:0 "\n\n[dead_storm_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_storm_knight.GetHerHim] with a blade in hand described [dead_storm_knight.GetHerHim] as having fought like the [dead_storm_knight.GetFaith.WarGodName] incarnate. [dead_storm_knight.GetHerHis|U] steel now rests alongside [dead_storm_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_storm_knight.1001.desc.suitable:0 "\n\n[dead_storm_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_storm_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_storm_knight.GetHerselfHimself] with aplomb in the service of [dead_storm_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_storm_knight.GetHerHis] skill at arms."
 agot_storm_knight.1001.desc.passing:0 "\n\n[dead_storm_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_storm_knight.GetSheHe] was the fiercest of warriors."
 agot_storm_knight.1001.desc.unsuitable:0 "\n\n[dead_storm_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_storm_knight.1001.desc.end:0 "\n\nWith [dead_storm_knight.GetHerHis] departure to [dead_storm_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_storm_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_storm_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_storm_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_storm_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_storm_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_storm_knight.1001.c:0 "There are more pressing matters at hand."
 agot_storm_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_storm_knight.1002.t:0 "Bestowing the Mantle"
 agot_storm_knight.1002.desc.intro:0 "[dead_storm_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_storm_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_storm_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_storm_knight)] [dead_storm_knight.GetDeathReason] in [dead_storm_knight.GetHerHis] [dead_storm_knight.GetAge][dead_storm_knight.Custom('GetAgeOrdinal')] year."
 agot_storm_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_storm_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(storm_knight_candidate_1)] is the certain choice!"
 agot_storm_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(storm_knight_candidate_2)] has the stature of a warrior!"
 agot_storm_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(storm_knight_candidate_3)] is built for the position!"
 agot_storm_knight.1002.d:0 "Bah, none of these will do."
 agot_storm_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to your Storm Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_storm_knight.1002.e:0 "I will need to look elsewhere."
 agot_storm_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to your Storm Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_storm_knight.1003.t:0 "Bestowing the Mantle"
 agot_storm_knight.1003.desc.intro:0 "[dead_storm_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_storm_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_storm_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_storm_knight)] [dead_storm_knight.GetDeathReason]."
 agot_storm_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_storm_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1005.opening:0 "[storm_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_storm_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_storm_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_storm_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_storm_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_storm_knight.1005.a:0 "You shall come to the capital to take your vows!"
 agot_storm_knight.1007.opening:0 "[storm_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_storm_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_storm_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_storm_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_storm_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_storm_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_storm_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_storm_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_storm_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_storm_knight.1007.a.tt:0 "You will send for more knights."
 agot_storm_knight.1007.b:0 "[storm_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_storm_knight.1008.t:0 "Vows Bestowed"
 agot_storm_knight.1008.desc:0 "[storm_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [storm_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [storm_knight_candidate.GetHerHis] mind or hold [storm_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [storm_knight_candidate.GetSheHe|U] rises, pledging to me with all [storm_knight_candidate.GetHerHis] strength to give [storm_knight_candidate.GetHerHis] life to protect me."
 agot_storm_knight.1008.a:0 "Rise, Ser [storm_knight_candidate.GetFirstNameNoTooltip]."
 agot_storm_knight.1009.t:0 "[storm_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_storm_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', storm_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [storm_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_storm_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_storm_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', storm_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [storm_knight_candidate.GetFullName]."
 agot_storm_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_storm_knight.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_storm_knight.1010.t:0 "A Brotherhood Bereft"
 agot_storm_knight.1010.desc.intro:0 "With the passing of [dead_storm_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_storm_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_storm_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(storm_knight_successor)] would seem the best [storm_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_storm_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_storm_knight.1010.a:0 "[AGOTGetName(storm_knight_successor)] is the natural successor to the office."
 agot_storm_knight.1010.b:0 "[AGOTGetName(storm_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1010.c:0 "[AGOTGetName(storm_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1010.d:0 "[AGOTGetName(storm_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_storm_knight.1010.f:0 "There's... there's no one left."
 agot_storm_knight.1011.a:0 "[AGOTGetName(storm_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.1011.b:0 "[AGOTGetName(storm_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.1011.c:0 "[AGOTGetName(storm_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 storm_knight_other_selections_available_tt:0 "I shall consider my other guards"
 agot_storm_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_storm_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_storm_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_storm_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_storm_knight.2001.a: "Protect the designated target."
 agot_storm_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_storm_knight.2001.c: "Actually, never mind."
 agot_storm_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_storm_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[storm_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_storm_knight.2002.a:0 "[storm_knight.GetName], return your sworn brother to me!"
 agot_storm_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_storm_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_storm_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_storm_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_storm_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_storm_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_storm_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_storm_knight.GetSheHe] finds [fleeing_storm_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_storm_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_storm_knight'))], and you belong here."
 agot_storm_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_storm_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_storm_knight.2003.d:0 "I'm sorry [fleeing_storm_knight.GetFirstName], but I cannot harbor a fugitive."
 agot_storm_knight.3001.t:0 "A Child's Dream"
 agot_storm_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_storm_knight.3001.a:0 "By all means, little one."
 agot_storm_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_storm_knight.3002.t:0 "A Beacon of Chivalry"
 agot_storm_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_storm_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_storm_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_storm_knight.GetHerHis] affect and re-enact [gallant_storm_knight.GetHerHis] exploits in [gallant_storm_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_storm_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_storm_knight.GetHerHis] deeds, and the [gallant_storm_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_storm_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_storm_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_storm_knight.3002.a:0 "I commend you, Ser [gallant_storm_knight.GetFirstNameNoTooltip]."
 agot_storm_knight.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_storm_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_storm_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_storm_knight.GetName] has been discovered in [lusty_storm_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_storm_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_storm_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_storm_knight.3003.a:0 "Throw [lusty_storm_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_storm_knight.3003.b:0 "Mutilate [lusty_storm_knight.GetHerHim], and send [lusty_storm_knight.GetHerHim] to join the Night's Watch."
 agot_storm_knight.3003.c:0 "Strip [lusty_storm_knight.GetHerHim] of [lusty_storm_knight.GetHerHis] white cloak."
 agot_storm_knight.3003.d:0 "Everyone deserves their vices..."
 agot_storm_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_storm_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_storm_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_storm_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_storm_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_storm_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_storm_knight.GetName] marches [marching_storm_knight.GetHerHis] way to my side to being the morning's watch."
 agot_storm_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_storm_knight.3004.b:0 "[marching_storm_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_storm_knight.3004.c:0 "Send the child to the Maester."
 agot_storm_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_storm_knight.3004.toast:0 "Maester Unsuccessful"
 agot_storm_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_storm_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_storm_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_storm_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_storm_knight.3005.agot_storm_knight.tt:0 "[essosi_warrior.GetName] will join your Storm Knights "
 agot_storm_knight.3005.b:0 "Perhaps you would take another position?"
 agot_storm_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_storm_knight.3005.c:0 "I have no need for more courtiers."
 agot_storm_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_storm_knight.3006.desc:0 "[friendly_storm_knight.GetFullName] is an outgoing sort of [friendly_storm_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_storm_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [storm_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_storm_knight.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_storm_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_storm_knight.3007.desc:0 "[improved_storm_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_storm_knight.GetHerHis] vows have led to this improvement."
 agot_storm_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_storm_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_storm_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_storm_knight.3008.agot_storm_knight.tt:0 "[candidate.GetName] will join your Storm Knights "
 agot_storm_knight.3008.b:0 "Perhaps you would take another position?"
 agot_storm_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_storm_knight.3008.c:0 "I am not so desperate that your like would guard me."
 agot_storm_knight.3010.t:0 "The Sweat of [strong_storm_knight.GetHerHis] Brow"
 agot_storm_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_storm_knight.GetFullName] has taken to spending all [strong_storm_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_storm_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_storm_knight.GetHerHis] form, as [strong_storm_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_storm_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_storm_knight.GetFirstNameNoTooltip] is at work."
 agot_storm_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_storm_knight.Custom('SisterBrother')]!"
 agot_storm_knight.3011.t:0 "A Challenger Approaches"
 agot_storm_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_storm_knight.Custom('InsultAdjective')] [unworthy_storm_knight.Custom('InsultNoun')] [unworthy_storm_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_storm_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_storm_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_storm_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_storm_knight.3011.a:0 "Then let the better man guard my door."
 agot_storm_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_storm_knight.GetTitledFirstName]"
 agot_storm_knight.3011.a.unworthy_storm_knight.toast:0 "[unworthy_storm_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_storm_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_storm_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_storm_knight.GetHerHis] keep."
 agot_storm_knight.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_storm_knight.3012.t:0 "A Broken Dream"
 agot_storm_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_storm_knight.Custom('GetDaughterSon')] in the courtyard. [failed_storm_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_storm_knight.GetSheHe] began [failed_storm_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_storm_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_storm_knight.3012.a:0 "It is time to move on from this."
 agot_storm_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_storm_knight.3012.c:0 "[failed_storm_knight.GetSheHe|U]'ll get better!"
 agot_storm_knight.3013.t:0 "Some Drink to Remember"
 agot_storm_knight.3013.desc:0 "[drunken_storm_knight.GetFullName] is known to spend all [drunken_storm_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_storm_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_storm_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_storm_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_storm_knight.3013.a:0 "A night in the cells will sober [drunken_storm_knight.GetHerHim] up."
 agot_storm_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_storm_knight.GetHerHim] be."
 agot_storm_knight.3013.c:0 "[drunken_storm_knight.GetFullName] is a [drunken_storm_knight.GetWomanMan] after my own heart!"
 agot_storm_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_storm_knight.GetFullName] spends much of [lifestyle_storm_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_storm_knight.GetHerHis] brow as [lifestyle_storm_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_storm_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_storm_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_storm_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_storm_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_storm_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_storm_knight.GetFirstNameNoTooltip]?"
 agot_storm_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_storm_knight.GetFullName] spends much of [lifestyle_storm_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_storm_knight.GetHerHim] through [lifestyle_storm_knight.GetHerHis] prestigious station.\n\n[lifestyle_storm_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_storm_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_storm_knight.GetHerHim] to return to from [lifestyle_storm_knight.GetHerHis] excursions with [lifestyle_storm_knight.GetHerHis] boots mucked and [lifestyle_storm_knight.GetHerHis] entourage carrying [lifestyle_storm_knight.GetHerHis] latest trophy. [lifestyle_storm_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_storm_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_storm_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_storm_knight.GetFirstNameNoTooltip]!"
 agot_storm_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_storm_knight.GetFullName] spends much of [lifestyle_storm_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_storm_knight.GetHerHim] through [lifestyle_storm_knight.GetHerHis] prestigious station.\n\n[lifestyle_storm_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_storm_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_storm_knight.GetHerHim] to return to from [lifestyle_storm_knight.GetHerHis] excursions with [lifestyle_storm_knight.GetHerHis] boots mucked and [lifestyle_storm_knight.GetHerHis] entourage carrying [lifestyle_storm_knight.GetHerHis] latest trophy. [lifestyle_storm_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_storm_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_storm_knight.3016.a:0 "A truly noble pursuit, [lifestyle_storm_knight.GetFullNameNoTooltip]!"
 agot_storm_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_storm_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_storm_knight.GetFullName] has been found outside of a local brothel. [eunuch_storm_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_storm_knight.GetHerHis] own cock stuffed into [eunuch_storm_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_storm_knight.GetHerHis] lessers. Nude and without [eunuch_storm_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_storm_knight.GetFirstName] was well known, but not particularly well liked."
 agot_storm_knight.3017.a:0 "[eunuch_storm_knight.GetFirstNameNoTooltip] you fool!"
 agot_storm_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_storm_knight.9100.a:0 "Let the judgement begin."
 agot_storm_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_storm_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.9101.a:0 "My will shall be done."
 agot_storm_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_storm_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_storm_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_loyal_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_loyal_knight)]"
 agot_loyal_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_loyal_knight.1001.desc.intro:0 "[dead_loyal_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_loyal_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_loyal_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_loyal_knight)] [dead_loyal_knight.GetDeathReason] in [dead_loyal_knight.GetHerHis] [dead_loyal_knight.GetAge][dead_loyal_knight.Custom('GetAgeOrdinal')] year."
 agot_loyal_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_loyal_knight.1001.desc.talented:0 "\n\n[dead_loyal_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_loyal_knight.GetHerHim] with a blade in hand described [dead_loyal_knight.GetHerHim] as having fought like the [dead_loyal_knight.GetFaith.WarGodName] incarnate. [dead_loyal_knight.GetHerHis|U] steel now rests alongside [dead_loyal_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_loyal_knight.1001.desc.suitable:0 "\n\n[dead_loyal_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_loyal_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_loyal_knight.GetHerselfHimself] with aplomb in the service of [dead_loyal_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_loyal_knight.GetHerHis] skill at arms."
 agot_loyal_knight.1001.desc.passing:0 "\n\n[dead_loyal_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_loyal_knight.GetSheHe] was the fiercest of warriors."
 agot_loyal_knight.1001.desc.unsuitable:0 "\n\n[dead_loyal_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_loyal_knight.1001.desc.end:0 "\n\nWith [dead_loyal_knight.GetHerHis] departure to [dead_loyal_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_loyal_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_loyal_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_loyal_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_loyal_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_loyal_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_loyal_knight.1001.c:0 "There are more pressing matters at hand."
 agot_loyal_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_loyal_knight.1002.t:0 "Bestowing the Mantle"
 agot_loyal_knight.1002.desc.intro:0 "[dead_loyal_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_loyal_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_loyal_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_loyal_knight)] [dead_loyal_knight.GetDeathReason] in [dead_loyal_knight.GetHerHis] [dead_loyal_knight.GetAge][dead_loyal_knight.Custom('GetAgeOrdinal')] year."
 agot_loyal_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_loyal_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(loyal_knight_candidate_1)] is the certain choice!"
 agot_loyal_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(loyal_knight_candidate_2)] has the stature of a warrior!"
 agot_loyal_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(loyal_knight_candidate_3)] is built for the position!"
 agot_loyal_knight.1002.d:0 "Bah, none of these will do."
 agot_loyal_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to the Guardians of the Trident" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_loyal_knight.1002.e:0 "I will need to look elsewhere."
 agot_loyal_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to the Guardians of the Trident" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_loyal_knight.1003.t:0 "Bestowing the Mantle"
 agot_loyal_knight.1003.desc.intro:0 "[dead_loyal_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_loyal_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_loyal_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_loyal_knight)] [dead_loyal_knight.GetDeathReason]."
 agot_loyal_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_loyal_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1005.opening:0 "[loyal_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_loyal_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_loyal_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_loyal_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_loyal_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_loyal_knight.1005.a:0 "You shall come to the capital to take your vows!"
 agot_loyal_knight.1007.opening:0 "[loyal_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_loyal_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_loyal_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_loyal_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_loyal_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_loyal_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_loyal_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_loyal_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_loyal_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_loyal_knight.1007.a.tt:0 "You will send for more knights."
 agot_loyal_knight.1007.b:0 "[loyal_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_loyal_knight.1008.t:0 "Vows Bestowed"
 agot_loyal_knight.1008.desc:0 "[loyal_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [loyal_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [loyal_knight_candidate.GetHerHis] mind or hold [loyal_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [loyal_knight_candidate.GetSheHe|U] rises, pledging to me with all [loyal_knight_candidate.GetHerHis] strength to give [loyal_knight_candidate.GetHerHis] life to protect me."
 agot_loyal_knight.1008.a:0 "Rise, Ser [loyal_knight_candidate.GetFirstNameNoTooltip]."
 agot_loyal_knight.1009.t:0 "[loyal_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_loyal_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', loyal_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [loyal_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_loyal_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_loyal_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', loyal_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [loyal_knight_candidate.GetFullName]."
 agot_loyal_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_loyal_knight.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_loyal_knight.1010.t:0 "A Brotherhood Bereft"
 agot_loyal_knight.1010.desc.intro:0 "With the passing of [dead_loyal_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_loyal_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_loyal_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(loyal_knight_successor)] would seem the best [loyal_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_loyal_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_loyal_knight.1010.a:0 "[AGOTGetName(loyal_knight_successor)] is the natural successor to the office."
 agot_loyal_knight.1010.b:0 "[AGOTGetName(loyal_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1010.c:0 "[AGOTGetName(loyal_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1010.d:0 "[AGOTGetName(loyal_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_loyal_knight.1010.f:0 "There's... there's no one left."
 agot_loyal_knight.1011.a:0 "[AGOTGetName(loyal_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.1011.b:0 "[AGOTGetName(loyal_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.1011.c:0 "[AGOTGetName(loyal_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 loyal_knight_other_selections_available_tt:0 "I shall consider my other guards"
 agot_loyal_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_loyal_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_loyal_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_loyal_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_loyal_knight.2001.a: "Protect the designated target."
 agot_loyal_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_loyal_knight.2001.c: "Actually, never mind."
 agot_loyal_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_loyal_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[loyal_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_loyal_knight.2002.a:0 "[loyal_knight.GetName], return your sworn brother to me!"
 agot_loyal_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_loyal_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_loyal_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_loyal_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_loyal_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_loyal_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_loyal_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_loyal_knight.GetSheHe] finds [fleeing_loyal_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_loyal_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_loyal_knight'))], and you belong here."
 agot_loyal_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_loyal_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_loyal_knight.2003.d:0 "I'm sorry [fleeing_loyal_knight.GetFirstName], but I cannot harbor a fugitive."
 agot_loyal_knight.3001.t:0 "A Child's Dream"
 agot_loyal_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_loyal_knight.3001.a:0 "By all means, little one."
 agot_loyal_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_loyal_knight.3002.t:0 "A Beacon of Chivalry"
 agot_loyal_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_loyal_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_loyal_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_loyal_knight.GetHerHis] affect and re-enact [gallant_loyal_knight.GetHerHis] exploits in [gallant_loyal_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_loyal_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_loyal_knight.GetHerHis] deeds, and the [gallant_loyal_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_loyal_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_loyal_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_loyal_knight.3002.a:0 "I commend you, Ser [gallant_loyal_knight.GetFirstNameNoTooltip]."
 agot_loyal_knight.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_loyal_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_loyal_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_loyal_knight.GetName] has been discovered in [lusty_loyal_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_loyal_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_loyal_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_loyal_knight.3003.a:0 "Throw [lusty_loyal_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_loyal_knight.3003.b:0 "Mutilate [lusty_loyal_knight.GetHerHim], and send [lusty_loyal_knight.GetHerHim] to join the Night's Watch."
 agot_loyal_knight.3003.c:0 "Strip [lusty_loyal_knight.GetHerHim] of [lusty_loyal_knight.GetHerHis] white cloak."
 agot_loyal_knight.3003.d:0 "Everyone deserves their vices..."
 agot_loyal_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_loyal_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_loyal_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_loyal_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_loyal_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_loyal_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_loyal_knight.GetName] marches [marching_loyal_knight.GetHerHis] way to my side to being the morning's watch."
 agot_loyal_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_loyal_knight.3004.b:0 "[marching_loyal_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_loyal_knight.3004.c:0 "Send the child to the Maester."
 agot_loyal_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_loyal_knight.3004.toast:0 "Maester Unsuccessful"
 agot_loyal_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_loyal_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_loyal_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_loyal_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_loyal_knight.3005.agot_loyal_knight.tt:0 "[essosi_warrior.GetName] will join your Guardians of the Trident "
 agot_loyal_knight.3005.b:0 "Perhaps you would take another position?"
 agot_loyal_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_loyal_knight.3005.c:0 "I have no need for more courtiers."
 agot_loyal_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_loyal_knight.3006.desc:0 "[friendly_loyal_knight.GetFullName] is an outgoing sort of [friendly_loyal_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_loyal_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [loyal_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_loyal_knight.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_loyal_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_loyal_knight.3007.desc:0 "[improved_loyal_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_loyal_knight.GetHerHis] vows have led to this improvement."
 agot_loyal_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_loyal_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_loyal_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_loyal_knight.3008.agot_loyal_knight.tt:0 "[candidate.GetName] will join your Guardians of the Trident "
 agot_loyal_knight.3008.b:0 "Perhaps you would take another position?"
 agot_loyal_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_loyal_knight.3008.c:0 "I am not so desperate that your like would guard me."
 agot_loyal_knight.3010.t:0 "The Sweat of [strong_loyal_knight.GetHerHis] Brow"
 agot_loyal_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_loyal_knight.GetFullName] has taken to spending all [strong_loyal_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_loyal_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_loyal_knight.GetHerHis] form, as [strong_loyal_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_loyal_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_loyal_knight.GetFirstNameNoTooltip] is at work."
 agot_loyal_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_loyal_knight.Custom('SisterBrother')]!"
 agot_loyal_knight.3011.t:0 "A Challenger Approaches"
 agot_loyal_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_loyal_knight.Custom('InsultAdjective')] [unworthy_loyal_knight.Custom('InsultNoun')] [unworthy_loyal_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_loyal_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_loyal_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_loyal_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_loyal_knight.3011.a:0 "Then let the better man guard my door."
 agot_loyal_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_loyal_knight.GetTitledFirstName]"
 agot_loyal_knight.3011.a.unworthy_loyal_knight.toast:0 "[unworthy_loyal_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_loyal_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_loyal_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_loyal_knight.GetHerHis] keep."
 agot_loyal_knight.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_loyal_knight.3012.t:0 "A Broken Dream"
 agot_loyal_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_loyal_knight.Custom('GetDaughterSon')] in the courtyard. [failed_loyal_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_loyal_knight.GetSheHe] began [failed_loyal_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_loyal_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_loyal_knight.3012.a:0 "It is time to move on from this."
 agot_loyal_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_loyal_knight.3012.c:0 "[failed_loyal_knight.GetSheHe|U]'ll get better!"
 agot_loyal_knight.3013.t:0 "Some Drink to Remember"
 agot_loyal_knight.3013.desc:0 "[drunken_loyal_knight.GetFullName] is known to spend all [drunken_loyal_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_loyal_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_loyal_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_loyal_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_loyal_knight.3013.a:0 "A night in the cells will sober [drunken_loyal_knight.GetHerHim] up."
 agot_loyal_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_loyal_knight.GetHerHim] be."
 agot_loyal_knight.3013.c:0 "[drunken_loyal_knight.GetFullName] is a [drunken_loyal_knight.GetWomanMan] after my own heart!"
 agot_loyal_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_loyal_knight.GetFullName] spends much of [lifestyle_loyal_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_loyal_knight.GetHerHis] brow as [lifestyle_loyal_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_loyal_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_loyal_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_loyal_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_loyal_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_loyal_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_loyal_knight.GetFirstNameNoTooltip]?"
 agot_loyal_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_loyal_knight.GetFullName] spends much of [lifestyle_loyal_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_loyal_knight.GetHerHim] through [lifestyle_loyal_knight.GetHerHis] prestigious station.\n\n[lifestyle_loyal_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_loyal_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_loyal_knight.GetHerHim] to return to from [lifestyle_loyal_knight.GetHerHis] excursions with [lifestyle_loyal_knight.GetHerHis] boots mucked and [lifestyle_loyal_knight.GetHerHis] entourage carrying [lifestyle_loyal_knight.GetHerHis] latest trophy. [lifestyle_loyal_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_loyal_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_loyal_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_loyal_knight.GetFirstNameNoTooltip]!"
 agot_loyal_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_loyal_knight.GetFullName] spends much of [lifestyle_loyal_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_loyal_knight.GetHerHim] through [lifestyle_loyal_knight.GetHerHis] prestigious station.\n\n[lifestyle_loyal_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_loyal_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_loyal_knight.GetHerHim] to return to from [lifestyle_loyal_knight.GetHerHis] excursions with [lifestyle_loyal_knight.GetHerHis] boots mucked and [lifestyle_loyal_knight.GetHerHis] entourage carrying [lifestyle_loyal_knight.GetHerHis] latest trophy. [lifestyle_loyal_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_loyal_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_loyal_knight.3016.a:0 "A truly noble pursuit, [lifestyle_loyal_knight.GetFullNameNoTooltip]!"
 agot_loyal_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_loyal_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_loyal_knight.GetFullName] has been found outside of a local brothel. [eunuch_loyal_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_loyal_knight.GetHerHis] own cock stuffed into [eunuch_loyal_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_loyal_knight.GetHerHis] lessers. Nude and without [eunuch_loyal_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_loyal_knight.GetFirstName] was well known, but not particularly well liked."
 agot_loyal_knight.3017.a:0 "[eunuch_loyal_knight.GetFirstNameNoTooltip] you fool!"
 agot_loyal_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_loyal_knight.9100.a:0 "Let the judgement begin."
 agot_loyal_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_loyal_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.9101.a:0 "My will shall be done."
 agot_loyal_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_loyal_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_loyal_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_golden_knight.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_golden_knight)]"
 agot_golden_knight.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_golden_knight.1001.desc.intro:0 "[dead_golden_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_golden_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_golden_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_golden_knight)] [dead_golden_knight.GetDeathReason] in [dead_golden_knight.GetHerHis] [dead_golden_knight.GetAge][dead_golden_knight.Custom('GetAgeOrdinal')] year."
 agot_golden_knight.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_golden_knight.1001.desc.talented:0 "\n\n[dead_golden_knight.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_golden_knight.GetHerHim] with a blade in hand described [dead_golden_knight.GetHerHim] as having fought like the [dead_golden_knight.GetFaith.WarGodName] incarnate. [dead_golden_knight.GetHerHis|U] steel now rests alongside [dead_golden_knight.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_golden_knight.1001.desc.suitable:0 "\n\n[dead_golden_knight.GetFirstNameNicknamedNoTooltip] was a skilled [dead_golden_knight.Custom('KnightCultureNoTooltip')] who acquitted [dead_golden_knight.GetHerselfHimself] with aplomb in the service of [dead_golden_knight.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_golden_knight.GetHerHis] skill at arms."
 agot_golden_knight.1001.desc.passing:0 "\n\n[dead_golden_knight.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_golden_knight.GetSheHe] was the fiercest of warriors."
 agot_golden_knight.1001.desc.unsuitable:0 "\n\n[dead_golden_knight.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_golden_knight.1001.desc.end:0 "\n\nWith [dead_golden_knight.GetHerHis] departure to [dead_golden_knight.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_golden_knight.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_golden_knight.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_golden_knight.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_golden_knight.1001.b:0 "Send me the scions of the great lords!"
 agot_golden_knight.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_golden_knight.1001.c:0 "There are more pressing matters at hand."
 agot_golden_knight.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_golden_knight.1002.t:0 "Bestowing the Mantle"
 agot_golden_knight.1002.desc.intro:0 "[dead_golden_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_golden_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_golden_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_golden_knight)] [dead_golden_knight.GetDeathReason] in [dead_golden_knight.GetHerHis] [dead_golden_knight.GetAge][dead_golden_knight.Custom('GetAgeOrdinal')] year."
 agot_golden_knight.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_golden_knight.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(golden_knight_candidate_1)] is the certain choice!"
 agot_golden_knight.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(golden_knight_candidate_2)] has the stature of a warrior!"
 agot_golden_knight.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(golden_knight_candidate_3)] is built for the position!"
 agot_golden_knight.1002.d:0 "Bah, none of these will do."
 agot_golden_knight.1002.d.tt:0 "Interact with characters in your realm to assign them to your Golden Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_golden_knight.1002.e:0 "I will need to look elsewhere."
 agot_golden_knight.1002.e.tt:0 "Interact with characters in your realm to assign them to your Golden Knight" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_golden_knight.1003.t:0 "Bestowing the Mantle"
 agot_golden_knight.1003.desc.intro:0 "[dead_golden_knight.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_golden_knight.GetHerHis] solemn oath and has departed this world under the mantle of [dead_golden_knight.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_golden_knight)] [dead_golden_knight.GetDeathReason]."
 agot_golden_knight.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_golden_knight.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1005.opening:0 "[golden_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_golden_knight.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_golden_knight.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_golden_knight.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_golden_knight.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_golden_knight.1005.a:0 "You shall come to the capital to take your vows!"
 agot_golden_knight.1007.opening:0 "[golden_knight_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_golden_knight.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_golden_knight.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_golden_knight.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_golden_knight.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_golden_knight.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_golden_knight.1007.reject:0 "My House is in greater need of me than your court."
 agot_golden_knight.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_golden_knight.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_golden_knight.1007.a.tt:0 "You will send for more knights."
 agot_golden_knight.1007.b:0 "[golden_knight_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_golden_knight.1008.t:0 "Vows Bestowed"
 agot_golden_knight.1008.desc:0 "[golden_knight_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [golden_knight_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [golden_knight_candidate.GetHerHis] mind or hold [golden_knight_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [golden_knight_candidate.GetSheHe|U] rises, pledging to me with all [golden_knight_candidate.GetHerHis] strength to give [golden_knight_candidate.GetHerHis] life to protect me."
 agot_golden_knight.1008.a:0 "Rise, Ser [golden_knight_candidate.GetFirstNameNoTooltip]."
 agot_golden_knight.1009.t:0 "[golden_knight_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_golden_knight.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', golden_knight_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [golden_knight_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_golden_knight.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_golden_knight.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', golden_knight_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [golden_knight_candidate.GetFullName]."
 agot_golden_knight.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_golden_knight.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_golden_knight.1010.t:0 "A Brotherhood Bereft"
 agot_golden_knight.1010.desc.intro:0 "With the passing of [dead_golden_knight.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_golden_knight.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_golden_knight.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(golden_knight_successor)] would seem the best [golden_knight_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_golden_knight.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_golden_knight.1010.a:0 "[AGOTGetName(golden_knight_successor)] is the natural successor to the office."
 agot_golden_knight.1010.b:0 "[AGOTGetName(golden_knight_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1010.c:0 "[AGOTGetName(golden_knight_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1010.d:0 "[AGOTGetName(golden_knight_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_golden_knight.1010.f:0 "There's... there's no one left."
 agot_golden_knight.1011.a:0 "[AGOTGetName(golden_knight_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.1011.b:0 "[AGOTGetName(golden_knight_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.1011.c:0 "[AGOTGetName(golden_knight_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 golden_knight_other_selections_available_tt:0 "I shall consider my other guards"
 agot_golden_knight.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_golden_knight.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_golden_knight.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_golden_knight.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_golden_knight.2001.a: "Protect the designated target."
 agot_golden_knight.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_golden_knight.2001.c: "Actually, never mind."
 agot_golden_knight.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_golden_knight.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[golden_knight.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_golden_knight.2002.a:0 "[golden_knight.GetName], return your sworn brother to me!"
 agot_golden_knight.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_golden_knight.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_golden_knight.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_golden_knight.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_golden_knight.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_golden_knight'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_golden_knight.GetFirstName] arrested on some trumped up charge and now [fleeing_golden_knight.GetSheHe] finds [fleeing_golden_knight.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_golden_knight.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_golden_knight'))], and you belong here."
 agot_golden_knight.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_golden_knight.2003.c:0 "You must flee across the Narrow Sea!"
 agot_golden_knight.2003.d:0 "I'm sorry [fleeing_golden_knight.GetFirstName], but I cannot harbor a fugitive."
 agot_golden_knight.3001.t:0 "A Child's Dream"
 agot_golden_knight.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_golden_knight.3001.a:0 "By all means, little one."
 agot_golden_knight.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_golden_knight.3002.t:0 "A Beacon of Chivalry"
 agot_golden_knight.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_golden_knight.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_golden_knight.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_golden_knight.GetHerHis] affect and re-enact [gallant_golden_knight.GetHerHis] exploits in [gallant_golden_knight.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_golden_knight.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_golden_knight.GetHerHis] deeds, and the [gallant_golden_knight.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_golden_knight.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_golden_knight.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_golden_knight.3002.a:0 "I commend you, Ser [gallant_golden_knight.GetFirstNameNoTooltip]."
 agot_golden_knight.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_golden_knight.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_golden_knight.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_golden_knight.GetName] has been discovered in [lusty_golden_knight.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_golden_knight.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_golden_knight.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_golden_knight.3003.a:0 "Throw [lusty_golden_knight.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_golden_knight.3003.b:0 "Mutilate [lusty_golden_knight.GetHerHim], and send [lusty_golden_knight.GetHerHim] to join the Night's Watch."
 agot_golden_knight.3003.c:0 "Strip [lusty_golden_knight.GetHerHim] of [lusty_golden_knight.GetHerHis] white cloak."
 agot_golden_knight.3003.d:0 "Everyone deserves their vices..."
 agot_golden_knight.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_golden_knight.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_golden_knight.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_golden_knight.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_golden_knight.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_golden_knight.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_golden_knight.GetName] marches [marching_golden_knight.GetHerHis] way to my side to being the morning's watch."
 agot_golden_knight.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_golden_knight.3004.b:0 "[marching_golden_knight.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_golden_knight.3004.c:0 "Send the child to the Maester."
 agot_golden_knight.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_golden_knight.3004.toast:0 "Maester Unsuccessful"
 agot_golden_knight.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_golden_knight.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_golden_knight.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_golden_knight.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_golden_knight.3005.agot_golden_knight.tt:0 "[essosi_warrior.GetName] will join your Golden Knights "
 agot_golden_knight.3005.b:0 "Perhaps you would take another position?"
 agot_golden_knight.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_golden_knight.3005.c:0 "I have no need for more courtiers."
 agot_golden_knight.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_golden_knight.3006.desc:0 "[friendly_golden_knight.GetFullName] is an outgoing sort of [friendly_golden_knight.GetWomanMan]; always keen to start a conversation, or insert [friendly_golden_knight.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [golden_knight_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_golden_knight.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_golden_knight.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_golden_knight.3007.desc:0 "[improved_golden_knight.GetNamePossessive] hours sparring in the yard and commitment to [improved_golden_knight.GetHerHis] vows have led to this improvement."
 agot_golden_knight.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_golden_knight.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_golden_knight.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_golden_knight.3008.agot_golden_knight.tt:0 "[candidate.GetName] will join your Golden Knights "
 agot_golden_knight.3008.b:0 "Perhaps you would take another position?"
 agot_golden_knight.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_golden_knight.3008.c:0 "I am not so desperate that your like would guard me."
 agot_golden_knight.3010.t:0 "The Sweat of [strong_golden_knight.GetHerHis] Brow"
 agot_golden_knight.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_golden_knight.GetFullName] has taken to spending all [strong_golden_knight.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_golden_knight.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_golden_knight.GetHerHis] form, as [strong_golden_knight.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_golden_knight.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_golden_knight.GetFirstNameNoTooltip] is at work."
 agot_golden_knight.3010.a:0 "Perhaps you could model for a portrait, [strong_golden_knight.Custom('SisterBrother')]!"
 agot_golden_knight.3011.t:0 "A Challenger Approaches"
 agot_golden_knight.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_golden_knight.Custom('InsultAdjective')] [unworthy_golden_knight.Custom('InsultNoun')] [unworthy_golden_knight.GetFullName] has no business sullying your side!"\n\n[unworthy_golden_knight.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_golden_knight.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_golden_knight.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_golden_knight.3011.a:0 "Then let the better man guard my door."
 agot_golden_knight.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_golden_knight.GetTitledFirstName]"
 agot_golden_knight.3011.a.unworthy_golden_knight.toast:0 "[unworthy_golden_knight.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_golden_knight.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_golden_knight.GetTitledFirstNameNoTooltip] has more than earned [unworthy_golden_knight.GetHerHis] keep."
 agot_golden_knight.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_golden_knight.3012.t:0 "A Broken Dream"
 agot_golden_knight.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_golden_knight.Custom('GetDaughterSon')] in the courtyard. [failed_golden_knight.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_golden_knight.GetSheHe] began [failed_golden_knight.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_golden_knight.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_golden_knight.3012.a:0 "It is time to move on from this."
 agot_golden_knight.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_golden_knight.3012.c:0 "[failed_golden_knight.GetSheHe|U]'ll get better!"
 agot_golden_knight.3013.t:0 "Some Drink to Remember"
 agot_golden_knight.3013.desc:0 "[drunken_golden_knight.GetFullName] is known to spend all [drunken_golden_knight.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_golden_knight.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_golden_knight.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_golden_knight.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_golden_knight.3013.a:0 "A night in the cells will sober [drunken_golden_knight.GetHerHim] up."
 agot_golden_knight.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_golden_knight.GetHerHim] be."
 agot_golden_knight.3013.c:0 "[drunken_golden_knight.GetFullName] is a [drunken_golden_knight.GetWomanMan] after my own heart!"
 agot_golden_knight.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_golden_knight.GetFullName] spends much of [lifestyle_golden_knight.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_golden_knight.GetHerHis] brow as [lifestyle_golden_knight.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_golden_knight.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_golden_knight.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_golden_knight.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_golden_knight.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_golden_knight.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_golden_knight.GetFirstNameNoTooltip]?"
 agot_golden_knight.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_golden_knight.GetFullName] spends much of [lifestyle_golden_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_golden_knight.GetHerHim] through [lifestyle_golden_knight.GetHerHis] prestigious station.\n\n[lifestyle_golden_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_golden_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_golden_knight.GetHerHim] to return to from [lifestyle_golden_knight.GetHerHis] excursions with [lifestyle_golden_knight.GetHerHis] boots mucked and [lifestyle_golden_knight.GetHerHis] entourage carrying [lifestyle_golden_knight.GetHerHis] latest trophy. [lifestyle_golden_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_golden_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_golden_knight.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_golden_knight.GetFirstNameNoTooltip]!"
 agot_golden_knight.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_golden_knight.GetFullName] spends much of [lifestyle_golden_knight.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_golden_knight.GetHerHim] through [lifestyle_golden_knight.GetHerHis] prestigious station.\n\n[lifestyle_golden_knight.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_golden_knight.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_golden_knight.GetHerHim] to return to from [lifestyle_golden_knight.GetHerHis] excursions with [lifestyle_golden_knight.GetHerHis] boots mucked and [lifestyle_golden_knight.GetHerHis] entourage carrying [lifestyle_golden_knight.GetHerHis] latest trophy. [lifestyle_golden_knight.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_golden_knight.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_golden_knight.3016.a:0 "A truly noble pursuit, [lifestyle_golden_knight.GetFullNameNoTooltip]!"
 agot_golden_knight.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_golden_knight.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_golden_knight.GetFullName] has been found outside of a local brothel. [eunuch_golden_knight.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_golden_knight.GetHerHis] own cock stuffed into [eunuch_golden_knight.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_golden_knight.GetHerHis] lessers. Nude and without [eunuch_golden_knight.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_golden_knight.GetFirstName] was well known, but not particularly well liked."
 agot_golden_knight.3017.a:0 "[eunuch_golden_knight.GetFirstNameNoTooltip] you fool!"
 agot_golden_knight.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_golden_knight.9100.a:0 "Let the judgement begin."
 agot_golden_knight.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_golden_knight.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.9101.a:0 "My will shall be done."
 agot_golden_knight.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_golden_knight.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_golden_knight.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_saltguard.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_saltguard)]"
 agot_saltguard.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_saltguard.1001.desc.intro:0 "[dead_saltguard.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_saltguard.GetHerHis] solemn oath and has departed this world under the mantle of [dead_saltguard.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_saltguard)] [dead_saltguard.GetDeathReason] in [dead_saltguard.GetHerHis] [dead_saltguard.GetAge][dead_saltguard.Custom('GetAgeOrdinal')] year."
 agot_saltguard.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_saltguard.1001.desc.talented:0 "\n\n[dead_saltguard.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_saltguard.GetHerHim] with a blade in hand described [dead_saltguard.GetHerHim] as having fought like the [dead_saltguard.GetFaith.WarGodName] incarnate. [dead_saltguard.GetHerHis|U] steel now rests alongside [dead_saltguard.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_saltguard.1001.desc.suitable:0 "\n\n[dead_saltguard.GetFirstNameNicknamedNoTooltip] was a skilled [dead_saltguard.Custom('KnightCultureNoTooltip')] who acquitted [dead_saltguard.GetHerselfHimself] with aplomb in the service of [dead_saltguard.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_saltguard.GetHerHis] skill at arms."
 agot_saltguard.1001.desc.passing:0 "\n\n[dead_saltguard.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_saltguard.GetSheHe] was the fiercest of warriors."
 agot_saltguard.1001.desc.unsuitable:0 "\n\n[dead_saltguard.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_saltguard.1001.desc.end:0 "\n\nWith [dead_saltguard.GetHerHis] departure to [dead_saltguard.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_saltguard.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_saltguard.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_saltguard.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_saltguard.1001.b:0 "Send me the scions of the great lords!"
 agot_saltguard.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_saltguard.1001.c:0 "There are more pressing matters at hand."
 agot_saltguard.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_saltguard.1002.t:0 "Bestowing the Mantle"
 agot_saltguard.1002.desc.intro:0 "[dead_saltguard.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_saltguard.GetHerHis] solemn oath and has departed this world under the mantle of [dead_saltguard.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_saltguard)] [dead_saltguard.GetDeathReason] in [dead_saltguard.GetHerHis] [dead_saltguard.GetAge][dead_saltguard.Custom('GetAgeOrdinal')] year."
 agot_saltguard.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_saltguard.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(saltguard_candidate_1)] is the certain choice!"
 agot_saltguard.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(saltguard_candidate_2)] has the stature of a warrior!"
 agot_saltguard.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(saltguard_candidate_3)] is built for the position!"
 agot_saltguard.1002.d:0 "Bah, none of these will do."
 agot_saltguard.1002.d.tt:0 "Interact with characters in your realm to assign them to your Saltguard" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_saltguard.1002.e:0 "I will need to look elsewhere."
 agot_saltguard.1002.e.tt:0 "Interact with characters in your realm to assign them to your Saltguard" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_saltguard.1003.t:0 "Bestowing the Mantle"
 agot_saltguard.1003.desc.intro:0 "[dead_saltguard.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_saltguard.GetHerHis] solemn oath and has departed this world under the mantle of [dead_saltguard.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_saltguard)] [dead_saltguard.GetDeathReason]."
 agot_saltguard.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_saltguard.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1005.opening:0 "[saltguard_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_saltguard.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_saltguard.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_saltguard.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_saltguard.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_saltguard.1005.a:0 "You shall come to the capital to take your vows!"
 agot_saltguard.1007.opening:0 "[saltguard_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_saltguard.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_saltguard.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_saltguard.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_saltguard.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_saltguard.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_saltguard.1007.reject:0 "My House is in greater need of me than your court."
 agot_saltguard.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_saltguard.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_saltguard.1007.a.tt:0 "You will send for more knights."
 agot_saltguard.1007.b:0 "[saltguard_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_saltguard.1008.t:0 "Vows Bestowed"
 agot_saltguard.1008.desc:0 "[saltguard_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [saltguard_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [saltguard_candidate.GetHerHis] mind or hold [saltguard_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [saltguard_candidate.GetSheHe|U] rises, pledging to me with all [saltguard_candidate.GetHerHis] strength to give [saltguard_candidate.GetHerHis] life to protect me."
 agot_saltguard.1008.a:0 "Rise, Ser [saltguard_candidate.GetFirstNameNoTooltip]."
 agot_saltguard.1009.t:0 "[saltguard_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_saltguard.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', saltguard_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [saltguard_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_saltguard.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_saltguard.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', saltguard_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [saltguard_candidate.GetFullName]."
 agot_saltguard.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_saltguard.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_saltguard.1010.t:0 "A Brotherhood Bereft"
 agot_saltguard.1010.desc.intro:0 "With the passing of [dead_saltguard.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_saltguard.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_saltguard.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(saltguard_successor)] would seem the best [saltguard_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_saltguard.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_saltguard.1010.a:0 "[AGOTGetName(saltguard_successor)] is the natural successor to the office."
 agot_saltguard.1010.b:0 "[AGOTGetName(saltguard_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1010.c:0 "[AGOTGetName(saltguard_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1010.d:0 "[AGOTGetName(saltguard_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_saltguard.1010.f:0 "There's... there's no one left."
 agot_saltguard.1011.a:0 "[AGOTGetName(saltguard_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.1011.b:0 "[AGOTGetName(saltguard_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.1011.c:0 "[AGOTGetName(saltguard_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 saltguard_other_selections_available_tt:0 "I shall consider my other guards"
 agot_saltguard.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_saltguard.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_saltguard.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_saltguard.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_saltguard.2001.a: "Protect the designated target."
 agot_saltguard.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_saltguard.2001.c: "Actually, never mind."
 agot_saltguard.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_saltguard.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[saltguard.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_saltguard.2002.a:0 "[saltguard.GetName], return your sworn brother to me!"
 agot_saltguard.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_saltguard.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_saltguard.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_saltguard.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_saltguard.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_saltguard'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_saltguard.GetFirstName] arrested on some trumped up charge and now [fleeing_saltguard.GetSheHe] finds [fleeing_saltguard.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_saltguard.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_saltguard'))], and you belong here."
 agot_saltguard.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_saltguard.2003.c:0 "You must flee across the Narrow Sea!"
 agot_saltguard.2003.d:0 "I'm sorry [fleeing_saltguard.GetFirstName], but I cannot harbor a fugitive."
 agot_saltguard.3001.t:0 "A Child's Dream"
 agot_saltguard.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_saltguard.3001.a:0 "By all means, little one."
 agot_saltguard.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_saltguard.3002.t:0 "A Beacon of Chivalry"
 agot_saltguard.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_saltguard.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_saltguard.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_saltguard.GetHerHis] affect and re-enact [gallant_saltguard.GetHerHis] exploits in [gallant_saltguard.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_saltguard.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_saltguard.GetHerHis] deeds, and the [gallant_saltguard.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_saltguard.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_saltguard.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_saltguard.3002.a:0 "I commend you, Ser [gallant_saltguard.GetFirstNameNoTooltip]."
 agot_saltguard.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_saltguard.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_saltguard.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_saltguard.GetName] has been discovered in [lusty_saltguard.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_saltguard.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_saltguard.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_saltguard.3003.a:0 "Throw [lusty_saltguard.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_saltguard.3003.b:0 "Mutilate [lusty_saltguard.GetHerHim], and send [lusty_saltguard.GetHerHim] to join the Night's Watch."
 agot_saltguard.3003.c:0 "Strip [lusty_saltguard.GetHerHim] of [lusty_saltguard.GetHerHis] white cloak."
 agot_saltguard.3003.d:0 "Everyone deserves their vices..."
 agot_saltguard.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_saltguard.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_saltguard.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_saltguard.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_saltguard.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_saltguard.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_saltguard.GetName] marches [marching_saltguard.GetHerHis] way to my side to being the morning's watch."
 agot_saltguard.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_saltguard.3004.b:0 "[marching_saltguard.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_saltguard.3004.c:0 "Send the child to the Maester."
 agot_saltguard.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_saltguard.3004.toast:0 "Maester Unsuccessful"
 agot_saltguard.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_saltguard.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_saltguard.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_saltguard.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_saltguard.3005.agot_saltguard.tt:0 "[essosi_warrior.GetName] will join your Saltguards "
 agot_saltguard.3005.b:0 "Perhaps you would take another position?"
 agot_saltguard.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_saltguard.3005.c:0 "I have no need for more courtiers."
 agot_saltguard.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_saltguard.3006.desc:0 "[friendly_saltguard.GetFullName] is an outgoing sort of [friendly_saltguard.GetWomanMan]; always keen to start a conversation, or insert [friendly_saltguard.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [saltguard_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_saltguard.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_saltguard.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_saltguard.3007.desc:0 "[improved_saltguard.GetNamePossessive] hours sparring in the yard and commitment to [improved_saltguard.GetHerHis] vows have led to this improvement."
 agot_saltguard.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_saltguard.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_saltguard.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_saltguard.3008.agot_saltguard.tt:0 "[candidate.GetName] will join your Saltguards "
 agot_saltguard.3008.b:0 "Perhaps you would take another position?"
 agot_saltguard.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_saltguard.3008.c:0 "I am not so desperate that your like would guard me."
 agot_saltguard.3010.t:0 "The Sweat of [strong_saltguard.GetHerHis] Brow"
 agot_saltguard.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_saltguard.GetFullName] has taken to spending all [strong_saltguard.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_saltguard.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_saltguard.GetHerHis] form, as [strong_saltguard.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_saltguard.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_saltguard.GetFirstNameNoTooltip] is at work."
 agot_saltguard.3010.a:0 "Perhaps you could model for a portrait, [strong_saltguard.Custom('SisterBrother')]!"
 agot_saltguard.3011.t:0 "A Challenger Approaches"
 agot_saltguard.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_saltguard.Custom('InsultAdjective')] [unworthy_saltguard.Custom('InsultNoun')] [unworthy_saltguard.GetFullName] has no business sullying your side!"\n\n[unworthy_saltguard.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_saltguard.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_saltguard.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_saltguard.3011.a:0 "Then let the better man guard my door."
 agot_saltguard.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_saltguard.GetTitledFirstName]"
 agot_saltguard.3011.a.unworthy_saltguard.toast:0 "[unworthy_saltguard.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_saltguard.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_saltguard.GetTitledFirstNameNoTooltip] has more than earned [unworthy_saltguard.GetHerHis] keep."
 agot_saltguard.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_saltguard.3012.t:0 "A Broken Dream"
 agot_saltguard.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_saltguard.Custom('GetDaughterSon')] in the courtyard. [failed_saltguard.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_saltguard.GetSheHe] began [failed_saltguard.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_saltguard.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_saltguard.3012.a:0 "It is time to move on from this."
 agot_saltguard.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_saltguard.3012.c:0 "[failed_saltguard.GetSheHe|U]'ll get better!"
 agot_saltguard.3013.t:0 "Some Drink to Remember"
 agot_saltguard.3013.desc:0 "[drunken_saltguard.GetFullName] is known to spend all [drunken_saltguard.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_saltguard.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_saltguard.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_saltguard.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_saltguard.3013.a:0 "A night in the cells will sober [drunken_saltguard.GetHerHim] up."
 agot_saltguard.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_saltguard.GetHerHim] be."
 agot_saltguard.3013.c:0 "[drunken_saltguard.GetFullName] is a [drunken_saltguard.GetWomanMan] after my own heart!"
 agot_saltguard.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_saltguard.GetFullName] spends much of [lifestyle_saltguard.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_saltguard.GetHerHis] brow as [lifestyle_saltguard.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_saltguard.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_saltguard.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_saltguard.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_saltguard.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_saltguard.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_saltguard.GetFirstNameNoTooltip]?"
 agot_saltguard.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_saltguard.GetFullName] spends much of [lifestyle_saltguard.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_saltguard.GetHerHim] through [lifestyle_saltguard.GetHerHis] prestigious station.\n\n[lifestyle_saltguard.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_saltguard.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_saltguard.GetHerHim] to return to from [lifestyle_saltguard.GetHerHis] excursions with [lifestyle_saltguard.GetHerHis] boots mucked and [lifestyle_saltguard.GetHerHis] entourage carrying [lifestyle_saltguard.GetHerHis] latest trophy. [lifestyle_saltguard.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_saltguard.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_saltguard.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_saltguard.GetFirstNameNoTooltip]!"
 agot_saltguard.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_saltguard.GetFullName] spends much of [lifestyle_saltguard.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_saltguard.GetHerHim] through [lifestyle_saltguard.GetHerHis] prestigious station.\n\n[lifestyle_saltguard.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_saltguard.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_saltguard.GetHerHim] to return to from [lifestyle_saltguard.GetHerHis] excursions with [lifestyle_saltguard.GetHerHis] boots mucked and [lifestyle_saltguard.GetHerHis] entourage carrying [lifestyle_saltguard.GetHerHis] latest trophy. [lifestyle_saltguard.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_saltguard.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_saltguard.3016.a:0 "A truly noble pursuit, [lifestyle_saltguard.GetFullNameNoTooltip]!"
 agot_saltguard.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_saltguard.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_saltguard.GetFullName] has been found outside of a local brothel. [eunuch_saltguard.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_saltguard.GetHerHis] own cock stuffed into [eunuch_saltguard.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_saltguard.GetHerHis] lessers. Nude and without [eunuch_saltguard.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_saltguard.GetFirstName] was well known, but not particularly well liked."
 agot_saltguard.3017.a:0 "[eunuch_saltguard.GetFirstNameNoTooltip] you fool!"
 agot_saltguard.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_saltguard.9100.a:0 "Let the judgement begin."
 agot_saltguard.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_saltguard.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.9101.a:0 "My will shall be done."
 agot_saltguard.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_saltguard.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_saltguard.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."

 agot_winter_wolf.1001.t:0 "An Oath Fulfilled: [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winter_wolf)]"
 agot_winter_wolf.1001.fallback.t:0 "An Oath Broken: [AGOTGetTitledFirstNameNicknamedNoTooltip(removed_kg)]"
 agot_winter_wolf.1001.desc.intro:0 "[dead_winter_wolf.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winter_wolf.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winter_wolf.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winter_wolf)] [dead_winter_wolf.GetDeathReason] in [dead_winter_wolf.GetHerHis] [dead_winter_wolf.GetAge][dead_winter_wolf.Custom('GetAgeOrdinal')] year."
 agot_winter_wolf.1001.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winter_wolf.1001.desc.talented:0 "\n\n[dead_winter_wolf.GetSheHe|U] was a warrior of incredible renown. Those who had the fortune to see [dead_winter_wolf.GetHerHim] with a blade in hand described [dead_winter_wolf.GetHerHim] as having fought like the [dead_winter_wolf.GetFaith.WarGodName] incarnate. [dead_winter_wolf.GetHerHis|U] steel now rests alongside [dead_winter_wolf.GetHerHim], but it will echo in the minds of young warriors across the realm for centuries!"
 agot_winter_wolf.1001.desc.suitable:0 "\n\n[dead_winter_wolf.GetFirstNameNicknamedNoTooltip] was a skilled [dead_winter_wolf.Custom('KnightCultureNoTooltip')] who acquitted [dead_winter_wolf.GetHerselfHimself] with aplomb in the service of [dead_winter_wolf.GetHerHis] liege, [king.GetTitledFirstNameRegnal], being well regarded for [dead_winter_wolf.GetHerHis] skill at arms."
 agot_winter_wolf.1001.desc.passing:0 "\n\n[dead_winter_wolf.GetSheHe|U] was a stout and reliable warrior, though none would say [dead_winter_wolf.GetSheHe] was the fiercest of warriors."
 agot_winter_wolf.1001.desc.unsuitable:0 "\n\n[dead_winter_wolf.GetFirstNameNicknamedPossessiveNoTooltip] place within the guard was questionable, though bound by an oath it was immutable."
 agot_winter_wolf.1001.desc.end:0 "\n\nWith [dead_winter_wolf.GetHerHis] departure to [dead_winter_wolf.GetFaith.PositiveAfterLife], the duty now falls to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_winter_wolf.1001.fallback.desc.end:0 "\n\nWith [removed_kg.GetHerHis] departure, the duty now falls to me to fill the vacancy amongst the renowned ranks of the white cloaks."
 agot_winter_wolf.1001.a:0 "Bring me the greatest knights in all the realm!"
 agot_winter_wolf.1001.a.tt:0 "Potential candidates will be brought to you."
 agot_winter_wolf.1001.b:0 "Send me the scions of the great lords!"
 agot_winter_wolf.1001.b.tt:0 "Great lords will send candidates, but may resent rejection."
 agot_winter_wolf.1001.c:0 "There are more pressing matters at hand."
 agot_winter_wolf.1001.c.tt:0 "Interact with characters in your realm to invite them to your personal guard."
 agot_winter_wolf.1002.t:0 "Bestowing the Mantle"
 agot_winter_wolf.1002.desc.intro:0 "[dead_winter_wolf.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winter_wolf.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winter_wolf.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winter_wolf)] [dead_winter_wolf.GetDeathReason] in [dead_winter_wolf.GetHerHis] [dead_winter_wolf.GetAge][dead_winter_wolf.Custom('GetAgeOrdinal')] year."
 agot_winter_wolf.1002.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winter_wolf.1002.desc.end:0 "\n\n[AGOTGetTitledFirstNameNicknamed(lord_commander)] has brought before me the greatest knights in all the realm, from whom I may select the newest member of the [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1002.a:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winter_wolf_candidate_1)] is the certain choice!"
 agot_winter_wolf.1002.b:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winter_wolf_candidate_2)] has the stature of a warrior!"
 agot_winter_wolf.1002.c:0 "[AGOTGetTitledFirstNameNicknamedNoTooltip(winter_wolf_candidate_3)] is built for the position!"
 agot_winter_wolf.1002.d:0 "Bah, none of these will do."
 agot_winter_wolf.1002.d.tt:0 "Interact with characters in your realm to assign them to your Winter Wolf" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_winter_wolf.1002.e:0 "I will need to look elsewhere."
 agot_winter_wolf.1002.e.tt:0 "Interact with characters in your realm to assign them to your Winter Wolf" #[ROOT.Char.Custom('KingsguardName')] <- this doesn't work in tooltips
 agot_winter_wolf.1003.t:0 "Bestowing the Mantle"
 agot_winter_wolf.1003.desc.intro:0 "[dead_winter_wolf.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has fulfilled [dead_winter_wolf.GetHerHis] solemn oath and has departed this world under the mantle of [dead_winter_wolf.GetHerHis] white cloak. [AGOTGetTitledFirstNameNicknamedNoTooltip(dead_winter_wolf)] [dead_winter_wolf.GetDeathReason]."
 agot_winter_wolf.1003.fallback.desc.intro:0 "[removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)|U] has disgraced [removed_kg.GetHerselfHimself] and was stripped of [removed_kg.GetHerHis] white cloak."
 agot_winter_wolf.1003.desc.no_options:0 "\n\nUnfortunately, [AGOTGetTitledFirstNameNicknamed(lord_commander)] informs me that, after careful consideration of the realm's nobility, no suitable candidates could be found worthy of serving within my [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1003.desc.end:0 "\n\nThe children of various nobles from across the realm have gathered in the courtyard, with [AGOTGetTitledFirstNameNicknamed(lord_commander)] beside me, [lord_commander.GetSheHe] notes which would be ideal candidates to serve within my [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1005.opening:0 "[winter_wolf_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_winter_wolf.1005.opening_desc:0 "I would be honored to serve within your [ROOT.Char.Custom('KingsguardName')]!"
 agot_winter_wolf.1005.host_likes_me:0 "I hope you will attend, as your presence would otherwise be sorely missed."
 agot_winter_wolf.1005.host_gets_along_with_me:0 "As a notable [ROOT.Char.GetTitleAsNameNoTooltip], I would be honored by your attendance."
 agot_winter_wolf.1005.host_dislikes_me:0 "I expect everyone of note to be there, which unfortunately includes you."
 agot_winter_wolf.1005.a:0 "You shall come to the capital to take your vows!"
 agot_winter_wolf.1007.opening:0 "[winter_wolf_candidate.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_winter_wolf.1007.opening_desc:0 "I must turn down the service within your [ROOT.Char.Custom('KingsguardName')].\n\n"
 agot_winter_wolf.1007.faith:0 "I shan't devote my life to serving your queer and [ROOT.Char.Custom('InsultAdjective')] gods."
 agot_winter_wolf.1007.claim:0 "I cannot simply cast off my claims and titles as if they were an old pair of clothes."
 agot_winter_wolf.1007.lustful:0 "I could never hope to give up the pleasures of the flesh for a life of celibacy!"
 agot_winter_wolf.1007.ambitious:0 "My life has far greater purpose ahead of it than standing by your chamberpot while you scutter out your latest suckling goose strips."
 agot_winter_wolf.1007.reject:0 "My House is in greater need of me than your court."
 agot_winter_wolf.1007.hate:0 "I would rather kiss the bloated anus of a dead pig than serve as your sworn shield."
 agot_winter_wolf.1007.a:0 "This time bring me someone who will serve the realm!"
 agot_winter_wolf.1007.a.tt:0 "You will send for more knights."
 agot_winter_wolf.1007.b:0 "[winter_wolf_candidate.GetSheHe|U] would deny their [ROOT.Char.GetTitleAsNameNoTooltip]?!"
 agot_winter_wolf.1008.t:0 "Vows Bestowed"
 agot_winter_wolf.1008.desc:0 "[winter_wolf_candidate.Custom2('MyCharacterIntroduction',ROOT.Char)|U] kneels before me, swearing to exchange [winter_wolf_candidate.GetHerHis] life for mine, to obey my word and keep my confidence, to speak [winter_wolf_candidate.GetHerHis] mind or hold [winter_wolf_candidate.GetHerHis] tongue at my beck, and to defend the honor of my name, my dynasty, and my throne. [winter_wolf_candidate.GetSheHe|U] rises, pledging to me with all [winter_wolf_candidate.GetHerHis] strength to give [winter_wolf_candidate.GetHerHis] life to protect me."
 agot_winter_wolf.1008.a:0 "Rise, Ser [winter_wolf_candidate.GetFirstNameNoTooltip]."
 agot_winter_wolf.1009.t:0 "[winter_wolf_candidate.Custom2('RelationToMeShort', SCOPE.sC('family_member') )|U]'s Reaction"
 agot_winter_wolf.1009.desc.mad:0 ""You think you can go behind my back and appoint my [family_member.Custom2('RelationToMeShort', winter_wolf_candidate)] to your guard you [ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.Custom('InsultNoun')]!?" My [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] storms to me after the anointing of [winter_wolf_candidate.GetNameNicknamedNoTooltip]. \n\n"
 agot_winter_wolf.1009.desc.heir:0 ""You may have stolen my heir from me, but I shall not forget this.""
 agot_winter_wolf.1009.desc.glad:0 ""I must thank you, my [ROOT.Char.Custom('ComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip], for bestowing the honor of serving within your royal guard unto my [family_member.Custom2('RelationToMeShort', winter_wolf_candidate)]." My [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('family_member') )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('family_member'))] [family_member.GetName] approaches me after the investiture of the newest member of my [ROOT.Char.Custom('KingsguardName')], [winter_wolf_candidate.GetFullName]."
 agot_winter_wolf.1009.a.mad:0 "I need not apologize to the likes of you."
 agot_winter_wolf.1009.a.glad:0 "Indeed, protecting me is an honor."
 agot_winter_wolf.1010.t:0 "A Brotherhood Bereft"
 agot_winter_wolf.1010.desc.intro:0 "With the passing of [dead_winter_wolf.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_winter_wolf.1010.fallback.desc.intro:0 "With the departure of [removed_kg.Custom2('MyCharacterIntroduction',ROOT.Char)] the [ROOT.Char.Custom('KingsguardName')] are robbed of leadership. "
 agot_winter_wolf.1010.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. [AGOTGetTitledFirstName(winter_wolf_successor)] would seem the best [winter_wolf_successor.GetWomanMan] for the job, and is expected by most to succeed [AGOTGetTitledFirstName(removed_kg)] as Lord Commander. However, the choice ultimately lays in my hands."
 agot_winter_wolf.1010.fallback.desc.end:0 "Now comes the crucial task of filling [removed_kg.GetHerHis] sabatons. With the [ROOT.Char.Custom('KingsguardName')] empty, now may be the best time to find knights worthy of the white cloak."
 agot_winter_wolf.1010.a:0 "[AGOTGetName(winter_wolf_successor)] is the natural successor to the office."
 agot_winter_wolf.1010.b:0 "[AGOTGetName(winter_wolf_1)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1010.c:0 "[AGOTGetName(winter_wolf_2)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1010.d:0 "[AGOTGetName(winter_wolf_3)] shall lead the [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.1010.e:0 "Perhaps someone else shall take [removed_kg.GetNamePossessive] place."
 agot_winter_wolf.1010.f:0 "There's... there's no one left."
 agot_winter_wolf.1011.a:0 "[AGOTGetName(winter_wolf_4)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.1011.b:0 "[AGOTGetName(winter_wolf_5)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.1011.c:0 "[AGOTGetName(winter_wolf_6)] shall lead the [ROOT.Char.Custom('KingsguardName')]"
 winter_wolf_other_selections_available_tt:0 "I shall consider my other guards"
 agot_winter_wolf.2001.t: "[ROOT.Char.Custom('KingsguardName')] Assignment"
 agot_winter_wolf.2001.desc: "I can dispatch my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetShortUIName], to protect a person of interest at [target_character.GetUINamePossessive] court."
 agot_winter_wolf.2001.desc_own_court: "I can assign my [GetPlayer.Custom2('RelationToMe',SCOPE.sC('councillor'))], [councillor.GetTitledFirstName], to protect one of my guests or courtiers."
 agot_winter_wolf.2001.desc_bodyguard_courtowner: "Alternatively, I could assign a bodyguard to [target_character.GetTitledFirstName] [target_character.GetHerselfHimself]."
 agot_winter_wolf.2001.a: "Protect the designated target."
 agot_winter_wolf.2001.b: "Protect [target_character.GetTitledFirstName]."
 agot_winter_wolf.2001.c: "Actually, never mind."
 agot_winter_wolf.2002.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_winter_wolf.2002.desc:0 "[recipient.GetTitledFirstName] has managed to avoid capture and has fled into the city! Perhaps there is still time to circumvent [recipient.GetHerHis] flight.\n\n[winter_wolf.GetName] is on watch and may be able to intercept [recipient.GetNameNoTooltip], or I could send word to [goldcloaks.GetName] and rouse the full force of the City Watch."
 agot_winter_wolf.2002.a:0 "[winter_wolf.GetName], return your sworn brother to me!"
 agot_winter_wolf.2002.a.failure:0 "[recipient.GetName] will escape"
 agot_winter_wolf.2002.b:0 "[goldcloaks.GetTitledFirstName], seize him!"
 agot_winter_wolf.2002.c:0 "Let [recipient.GetHerHim] go, [recipient.GetSheHe] is of no threat to me."
 agot_winter_wolf.2003.title:0 "Renegade [ROOT.Char.Custom('KingsguardName')]!"
 agot_winter_wolf.2003.desc:0 "My [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_winter_wolf'))] has come to my court seeking asylum. [crown.GetTitledFirstNamePossessive] attempted to have [fleeing_winter_wolf.GetFirstName] arrested on some trumped up charge and now [fleeing_winter_wolf.GetSheHe] finds [fleeing_winter_wolf.GetHerselfHimself] a fugitive of the realm. I must now make the difficult decision between my duty and my family in deciding what to do next."
 agot_winter_wolf.2003.a:0 "You are my [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fleeing_winter_wolf'))], and you belong here."
 agot_winter_wolf.2003.b:0 "If you make for the Wall, you shall be beyond [crown.GetTitledFirstNamePossessive] reach!"
 agot_winter_wolf.2003.c:0 "You must flee across the Narrow Sea!"
 agot_winter_wolf.2003.d:0 "I'm sorry [fleeing_winter_wolf.GetFirstName], but I cannot harbor a fugitive."
 agot_winter_wolf.3001.t:0 "A Child's Dream"
 agot_winter_wolf.3001.desc:0 "Little [child.GetFirstName] has always been infatuated with the tales of the [king.Custom('KingsguardName')], none moreso than [lord_commander.GetTitledFirstName], viewing [lord_commander.GetHerHim] in the same light as Ser [GetScriptedCharacterByHistoryID('Heroes_25').GetFirstName] of the Mirror Shield and Ser [GetScriptedCharacterByHistoryID('Heroes_24').GetFirstName] Star-Eyes.\n\nI thought little of [child.GetHerHis] dreams of being like these legendary figures, as all children have heroes they aspire to be like, but as [child.GetFirstNameNoTooltip] has gotten older, [child.GetHerHis] dreams of joining the [king.Custom('KingsguardName')] have become evermore real. Just today [child.GetSheHe] came before me and asked to set aside any betrothals I might have planned for [child.GetHerHim] so that [child.GetSheHe] can start training to become a member of [king.GetTitledFirstNamePossessive] [king.Custom('KingsguardName')]."
 agot_winter_wolf.3001.a:0 "By all means, little one."
 agot_winter_wolf.3001.b:0 "Your duty to your family comes before your duty to the crown."
 agot_winter_wolf.3002.t:0 "A Beacon of Chivalry"
 agot_winter_wolf.3002.desc:0 "It has come to my attention that my [ROOT.Char.Custom('KingsguardName')] [gallant_winter_wolf.GetFirstNameNicknamed] has become the talk of the realm. The smallfolk speak of [gallant_winter_wolf.GetHerHim] in the same breath of warriors of legend, young squires in play don [gallant_winter_wolf.GetHerHis] affect and re-enact [gallant_winter_wolf.GetHerHis] exploits in [gallant_winter_wolf.GetHerHis] greatest battles, and maids dream of granting their favor to a [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of [gallant_winter_wolf.GetHerHis] repute.\n\nNow this talk has gripped my court. The [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] of the court seek to emulate [gallant_winter_wolf.GetHerHis] deeds, and the [gallant_winter_wolf.Custom('AttractionWomanManMultiple')] of the court compete for [gallant_winter_wolf.GetHerHis] attention. It is a commonality now that across the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip] the name of [gallant_winter_wolf.GetFirstNameNoTooltip] is synonymous with skill, honor, and gallantry."
 agot_winter_wolf.3002.a:0 "I commend you, Ser [gallant_winter_wolf.GetFirstNameNoTooltip]."
 agot_winter_wolf.3002.b:0 "I would rather talk about my favorite topic: myself."
 agot_winter_wolf.3003.t:0 "Flagrant [ROOT.Char.Custom('KingsguardName')|U]: Caught in the Act!"
 agot_winter_wolf.3003.desc_bedroom:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_winter_wolf.GetName] has been discovered in [lusty_winter_wolf.GetHerHis] chambers, entertaining none other than [lusty_lover.GetFullName]!"
 agot_winter_wolf.3003.desc_brothel:0 ""Your Grace, your [ROOT.Char.Custom('KingsguardName')] [lusty_winter_wolf.GetName] has been discovered in the bowels of a pleasure den, engaging in obscene acts with the known harlot [lusty_lover.GetName]!""
 agot_winter_wolf.3003.a:0 "Throw [lusty_winter_wolf.GetHerHim] in the dungeon until I decide what to do with this oathbreaker."
 agot_winter_wolf.3003.b:0 "Mutilate [lusty_winter_wolf.GetHerHim], and send [lusty_winter_wolf.GetHerHim] to join the Night's Watch."
 agot_winter_wolf.3003.c:0 "Strip [lusty_winter_wolf.GetHerHim] of [lusty_winter_wolf.GetHerHis] white cloak."
 agot_winter_wolf.3003.d:0 "Everyone deserves their vices..."
 agot_winter_wolf.3003.e:0 "You can keep your white cloak, but [lusty_lover.GetFirstNameNoTooltip] is mine."
 agot_winter_wolf.3004.t:0 "Make Way for the [ROOT.Char.Custom('KingsguardName')|U]!"
 agot_winter_wolf.3004.desc:0 ""Make way for the [ROOT.Char.Custom('KingsguardName')]!" The yell echoed from the end of the throne-room. You turn just in time to watch as [marching_winter_wolf.GetNameNicknamed], marching at alarming speed, shouts at the young [obstructing_brat.GetName], who stands gormlessly in [marching_winter_wolf.GetHerHis] path. \n\nWhether due to willfulness or ignorance, [obstructing_brat.GetName] does not get the message. The child is trampled beneath the stomping heel of my [ROOT.Char.Custom('KingsguardName')], who crashes through [obstructing_brat.GetHerHim] with little more than a casual glance, affording the child the same attention as if [marching_winter_wolf.GetSheHe] had stepped in a puddle.\n\nMashed by the boot, [obstructing_brat.GetName] now lays on the courtroom floor, moaning in pain, and [marching_winter_wolf.GetName] marches [marching_winter_wolf.GetHerHis] way to my side to being the morning's watch."
 agot_winter_wolf.3004.a:0 "Nobody interrupts the [ROOT.Char.Custom('KingsguardName')] on the [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] business."
 agot_winter_wolf.3004.b:0 "[marching_winter_wolf.GetName], are you mad?! Go help [obstructing_brat.GetName] to their feet."
 agot_winter_wolf.3004.c:0 "Send the child to the Maester."
 agot_winter_wolf.3004.cure_toast:0 "Maester Successfully Treats [obstructing_brat.GetName]"
 agot_winter_wolf.3004.toast:0 "Maester Unsuccessful"
 agot_winter_wolf.3004.toast_desc:0 "[obstructing_brat.GetName] remains wounded."
 agot_winter_wolf.3005.t:0 "[essosi_warrior.GetSheHe|U] Comes Highly Recommended"
 agot_winter_wolf.3005.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [essosi_warrior.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to the greatest warrior Essos has ever seen. [essosi_warrior.GetFirstNameNoTooltip] is known from Braavos to Asshai, and [essosi_warrior.GetSheHe] would make an excellent addition to your [ROOT.Char.Custom('KingsguardName')].""
 agot_winter_wolf.3005.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_winter_wolf.3005.agot_winter_wolf.tt:0 "[essosi_warrior.GetName] will join your Winter Wolves "
 agot_winter_wolf.3005.b:0 "Perhaps you would take another position?"
 agot_winter_wolf.3005.court_position.tt:0 "You will find an adequate position for [essosi_warrior.GetName]."
 agot_winter_wolf.3005.c:0 "I have no need for more courtiers."
 agot_winter_wolf.3006.t:0 "[ROOT.Char.Custom('KingsguardName')]: Brothers in Arms"
 agot_winter_wolf.3006.desc:0 "[friendly_winter_wolf.GetFullName] is an outgoing sort of [friendly_winter_wolf.GetWomanMan]; always keen to start a conversation, or insert [friendly_winter_wolf.GetHerselfHimself] into one. While grating to the more stoic members of my [ROOT.Char.Custom('KingsguardName')], himself and [winter_wolf_friend.GetFullName] have become as inseperable as siblings.\n\nThey train together, break fast together, and in the thick of any battle they are found side-by-side, spurring on one another. This blood bond between these two warriors has become a common talking point within the court, the strength of which within my [ROOT.Char.Custom('KingsguardName')] can only serve to further solidify my reign."
 agot_winter_wolf.3006.a:0 "Let their friendship lead them to greater valours!"
 agot_winter_wolf.3007.notification:0 "[ROOT.Char.Custom('KingsguardName')] Improved"
 agot_winter_wolf.3007.desc:0 "[improved_winter_wolf.GetNamePossessive] hours sparring in the yard and commitment to [improved_winter_wolf.GetHerHis] vows have led to this improvement."
 agot_winter_wolf.3008.t:0 "[candidate.GetSheHe|U] Comes Highly Recommended"
 agot_winter_wolf.3008.desc:0 "[sponsor.GetTitledFirstName] enters the throne room, accompanied by a [candidate.GetWomanMan] foreign to me.\n\n"My [ROOT.Char.GetLadyLord]," [sponsor.GetFirstNameNoTooltip] rasps, a proud look on [sponsor.GetHerHis] face. "It is my honor to introduce you to [candidate.GetFullNameNoTooltip]. [candidate.GetSheHe|U] is a most puissant [candidate.GetWomanMan] of considerable martial talent and has forsaken marriage and titles in the hope of one day joining your [ROOT.Char.Custom('KingsguardName')].""
 agot_winter_wolf.3008.a:0 "Welcome to the [ROOT.Char.Custom('KingsguardName')]!"
 agot_winter_wolf.3008.agot_winter_wolf.tt:0 "[candidate.GetName] will join your Winter Wolves "
 agot_winter_wolf.3008.b:0 "Perhaps you would take another position?"
 agot_winter_wolf.3008.b.tt:0 "[candidate.GetName] will be promised a position when one becomes available."
 agot_winter_wolf.3008.c:0 "I am not so desperate that your like would guard me."
 agot_winter_wolf.3010.t:0 "The Sweat of [strong_winter_wolf.GetHerHis] Brow"
 agot_winter_wolf.3010.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [strong_winter_wolf.GetFullName] has taken to spending all [strong_winter_wolf.GetHerHis] time in the yards and stables of the Keep, though where others merely practice swordplay or horsemanship, [strong_winter_wolf.GetFirstNameNoTooltip] seems to spend every minute in search of increasingly strenuous and difficult physical work.\n\nThe different is clear to see in [strong_winter_wolf.GetHerHis] form, as [strong_winter_wolf.GetHerHis] frame has grown sinewy, dense and solid, much to the appeal of the gawking [strong_winter_wolf.Custom('AttractionGirlBoyPlural')] of the court who can reliably be found around the yard when [strong_winter_wolf.GetFirstNameNoTooltip] is at work."
 agot_winter_wolf.3010.a:0 "Perhaps you could model for a portrait, [strong_winter_wolf.Custom('SisterBrother')]!"
 agot_winter_wolf.3011.t:0 "A Challenger Approaches"
 agot_winter_wolf.3011.desc:0 "The dreary court day was certainly livened when the herald announced the arrival of [challenger.GetFullName], who marched into the throne room dressed more for the field than a petition.\n\n"My [ROOT.Char.Custom('FormalComplimentAdjective')] [ROOT.Char.GetTitleAsNameNoTooltip]," [challenger.GetSheHe] begins when I beckon [challenger.GetHerHim] forth. "The [ROOT.Char.Custom('KingsguardName')] is a noble institution of the realm. But as of this moment a worm wears the honor of defending your body. The [unworthy_winter_wolf.Custom('InsultAdjective')] [unworthy_winter_wolf.Custom('InsultNoun')] [unworthy_winter_wolf.GetFullName] has no business sullying your side!"\n\n[unworthy_winter_wolf.GetFirstNameNoTooltip] snaps suddenly to attention, realizing [unworthy_winter_wolf.GetSheHe] is being addressed. "My [ROOT.Char.GetTitleAsNameNoTooltip], the [ROOT.Char.Custom('KingsguardName')] is a sworn brotherhood. We serve for life, my blood is bound to shed for your own," [unworthy_winter_wolf.GetSheHe|l] stammers.\n\n"That is no issue," [challenger.GetName] answers, [challenger.Custom('quirk_pos_pp')]. "I'll gladly relieve you of your post.""
 agot_winter_wolf.3011.a:0 "Then let the better man guard my door."
 agot_winter_wolf.3011.a.challenger.toast:0 "[challenger.GetTitledFirstName] slew [unworthy_winter_wolf.GetTitledFirstName]"
 agot_winter_wolf.3011.a.unworthy_winter_wolf.toast:0 "[unworthy_winter_wolf.GetTitledFirstName] slew [challenger.GetTitledFirstName] "
 agot_winter_wolf.3011.b:0 "Be gone home, [challenger.GetTitledFirstNameNoTooltip]. [unworthy_winter_wolf.GetTitledFirstNameNoTooltip] has more than earned [unworthy_winter_wolf.GetHerHis] keep."
 agot_winter_wolf.3011.c:0 "Nobody questions my appointments. Guards!"
 agot_winter_wolf.3012.t:0 "A Broken Dream"
 agot_winter_wolf.3012.desc:0 "I am looking down from the gallery at my fumbling [failed_winter_wolf.Custom('GetDaughterSon')] in the courtyard. [failed_winter_wolf.GetSheHe|U] bumbles about the yard, showing almost no improvement from when [failed_winter_wolf.GetSheHe] began [failed_winter_wolf.GetHerHis] quest to join the prestigious guard of [ruler.GetHerHis] grace. Perhaps I ought to intervene. After all, is it not crueler to let [failed_winter_wolf.GetHerHim] continue with false hope than to quash this foolishness here and now?"
 agot_winter_wolf.3012.a:0 "It is time to move on from this."
 agot_winter_wolf.3012.b:0 "The Night's Watch is always in need of good men!"
 agot_winter_wolf.3012.c:0 "[failed_winter_wolf.GetSheHe|U]'ll get better!"
 agot_winter_wolf.3013.t:0 "Some Drink to Remember"
 agot_winter_wolf.3013.desc:0 "[drunken_winter_wolf.GetFullName] is known to spend all [drunken_winter_wolf.GetHerHis] time off duty drinking and carousing in local taverns and pot shops. [drunken_winter_wolf.GetSheHe|U]'s began to garner a reputation amongst the city and in the court, ranging from being able to drink anyone under a table, to being able to down an entire keg of Arbor gold while standing on [drunken_winter_wolf.GetHerHis] head.\n\nNow a particularly worrying tale has reached me involving [drunken_winter_wolf.GetFirstName] bringing a jackass and a honeycomb into a brothel. This behavior would seem unworthy of a member of the [ROOT.Char.Custom('KingsguardName')], but it has led to some interesting anecdotes to say the least."
 agot_winter_wolf.3013.a:0 "A night in the cells will sober [drunken_winter_wolf.GetHerHim] up."
 agot_winter_wolf.3013.b:0 "Being a [ROOT.Char.Custom('KingsguardName')] is stressful, leave [drunken_winter_wolf.GetHerHim] be."
 agot_winter_wolf.3013.c:0 "[drunken_winter_wolf.GetFullName] is a [drunken_winter_wolf.GetWomanMan] after my own heart!"
 agot_winter_wolf.3014.t:0 "Swordsman [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.3014.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winter_wolf.GetFullName] spends much of [lifestyle_winter_wolf.GetHerHis] time that isn't at my side in my courtyard, sweat running from [lifestyle_winter_wolf.GetHerHis] brow as [lifestyle_winter_wolf.GetSheHe] crosses swords with the greatest warriors in the realm.\n\n[lifestyle_winter_wolf.GetNameNoTooltip] has become a familiar face to my armorers and the [GetPlayer.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName], and word of [lifestyle_winter_wolf.GetHerHis] deftness with a blade has become the talk of the court. It nothing unusual for [lifestyle_winter_wolf.GetHerHim] to be seen in the courtyard from first rise of the sun to its final wink. [lifestyle_winter_wolf.GetNameNoTooltip] has garnered a reputation as a skilled blademaster."
 agot_winter_wolf.3014.a:0 "Perhaps you can help me with my swordplay, [lifestyle_winter_wolf.GetFirstNameNoTooltip]?"
 agot_winter_wolf.3015.t:0 "Hunting [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.3015.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winter_wolf.GetFullName] spends much of [lifestyle_winter_wolf.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_winter_wolf.GetHerHim] through [lifestyle_winter_wolf.GetHerHis] prestigious station.\n\n[lifestyle_winter_wolf.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_winter_wolf.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_winter_wolf.GetHerHim] to return to from [lifestyle_winter_wolf.GetHerHis] excursions with [lifestyle_winter_wolf.GetHerHis] boots mucked and [lifestyle_winter_wolf.GetHerHis] entourage carrying [lifestyle_winter_wolf.GetHerHis] latest trophy. [lifestyle_winter_wolf.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_winter_wolf.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_winter_wolf.3015.a:0 "Catch me a fat elk for tonight's supper, [lifestyle_winter_wolf.GetFirstNameNoTooltip]!"
 agot_winter_wolf.3016.t:0 "Falconer [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.3016.desc:0 "My [ROOT.Char.Custom('KingsguardName')] [lifestyle_winter_wolf.GetFullName] spends much of [lifestyle_winter_wolf.GetHerHis] time that isn't at my side in my royal woods, taking full advantage of the privileges provided to [lifestyle_winter_wolf.GetHerHim] through [lifestyle_winter_wolf.GetHerHis] prestigious station.\n\n[lifestyle_winter_wolf.GetNameNoTooltip] has become a known sight to my foresters and gamekeepers, and word of [lifestyle_winter_wolf.GetHerHis] precision with a bow has become the talk of the court. It nothing unusual for [lifestyle_winter_wolf.GetHerHim] to return to from [lifestyle_winter_wolf.GetHerHis] excursions with [lifestyle_winter_wolf.GetHerHis] boots mucked and [lifestyle_winter_wolf.GetHerHis] entourage carrying [lifestyle_winter_wolf.GetHerHis] latest trophy. [lifestyle_winter_wolf.GetHerHis|U] apartments draped in skins, hide and skulls, [lifestyle_winter_wolf.GetNameNoTooltip] has garnered a reputation as a true hunter."
 agot_winter_wolf.3016.a:0 "A truly noble pursuit, [lifestyle_winter_wolf.GetFullNameNoTooltip]!"
 agot_winter_wolf.3017.t:0 "[ROOT.Char.Custom('KingsguardName')]: Ignominious Murder!"
 agot_winter_wolf.3017.desc:0 "The naked corpse of my [ROOT.Char.Custom('KingsguardName')] [eunuch_winter_wolf.GetFullName] has been found outside of a local brothel. [eunuch_winter_wolf.GetSheHe|U] was discovered having been castrated, and to add to the insult, [eunuch_winter_wolf.GetHerHis] own cock stuffed into [eunuch_winter_wolf.GetHerHis] mouth. According to our sources, he was in the midst of an argument with a worker when he found himself overwhelmed by [eunuch_winter_wolf.GetHerHis] lessers. Nude and without [eunuch_winter_wolf.GetHerHis] weapon, he was overwhelmed by the whores.\n\nEmboldened by this the smallfolk have been stoked in a furor and are rioting in the streets. It seems [eunuch_winter_wolf.GetFirstName] was well known, but not particularly well liked."
 agot_winter_wolf.3017.a:0 "[eunuch_winter_wolf.GetFirstNameNoTooltip] you fool!"
 agot_winter_wolf.9100.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.9100.desc:0 "Now that I have defeated [loser.GetName], I must decide if I should keep [loser.GetHerHis] appointments to the [ROOT.Char.Custom('KingsguardName')], or if I should appoint my own.\n\nElevating my own appointees to the [ROOT.Char.Custom('KingsguardName')] will undoubtedly ensure my safety, but perhaps an argument could be made to keep some of the current members?"
 agot_winter_wolf.9100.a:0 "Let the judgement begin."
 agot_winter_wolf.9101.t:0 "A New [ROOT.Char.Custom('KingsguardName')]"
 agot_winter_wolf.9101.desc:0 "It is time to make my decision concerning who, if anyone, shall be removed from the [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.9101.a:0 "My will shall be done."
 agot_winter_wolf.9101.a_tt:0 "[THIS.Char.GetName] will be removed from [THIS.Char.GetHerHis] position and imprisoned."
 agot_winter_wolf.9101.b:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
 agot_winter_wolf.9101.c:0 "[kg.GetNameNoTooltip] can remain in my [ROOT.Char.Custom('KingsguardName')]."
