 nick_citadel_the_merciless:0 "the Merciless"
 nick_citadel_the_merciless_desc:0 "House Manderly remembers every debt of blood, but [CHARACTER.GetShortUINameNoTooltipNoFormat|U] repays them tenfold. Rivals who begged for quarter found none, a ruthlessness striking even among the mermen of Dunstonbury."
