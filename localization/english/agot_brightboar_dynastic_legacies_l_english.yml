 BAR_EMMON_KINGS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Bar_Emmon_5').GetCharacterViewNameNicknamed] was an Andal warlord who founded a small kingdom north of the Blackwater Rush during the Andal invasion, but he was opposed by the more powerful Darklyn kings of Duskendale. Sensing a weakness to the south, [GetScriptedCharacterByHistoryID('Bar_Emmon_5').GetCharacterViewName] married the daughter of [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewNameNicknamed], himself a rival to [GetScriptedCharacterByHistoryID('Durrandon_47').GetCharacterViewNameNicknamed], and the Bar Emmons abandoned the Blackwater for Massey's Hook. Although [GetScriptedCharacterByHistoryID('Durrandon_47').GetCharacterViewName] defeated [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewName], [GetScriptedCharacterByHistoryID('Bar_Emmon_5').GetCharacterViewName] drove the stormlanders from Stonedance, built Sharp Point as the new seat for House Bar Emmon, and established a kingdom on Massey's Hook with the son of [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewName] as a puppet. \n#weak We are uncrowned Kings forevermore."
 BAR_EMMON_FICKLE_NO_BULLETTAB:0 "\nPrior to the War of Conquest, House Bar Emmon was sworn to House Durrandon, the Storm Kings from Storm's End, but had closer ties to House Targaryen of nearby Dragonstone. When [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] launched his invasion of Westeros, the Bar Emmons supported him instead of the [GetScriptedCharacterByHistoryID('Durrandon_87').GetCharacterViewNameNicknamed]. With the creation of the crownlands after the Conquest, the Bar Emmons became sworn directly to Dragonstone, instead of House Baratheon of Storm's End, who had replaced the Durrandons. \n#weak The Fickle [personality|E] [trait|E] becomes more common."
 BAR_EMMON_ANDAL_ADVENTURERS_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Shortly after the Andals conquered the Vale, they began sailing to Blackwater Bay and the stormlands."
 BAR_EMMON_SWORDS_BAY_NO_BULLETTAB:0 "\nWe of House Bar Emmon command the Swords of the Bay, swift skirmishers sworn to our cause. Along shore and saltmarsh they strike hard and fade away, blades flashing like sunlight on water. Loyal and relentless, they guard our coasts and carry our will wherever the bay’s tides reach. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('bar_emmon_swords_bay').GetName] as [men_at_arms|E].#!"
 BAR_EMMON_SWORDFISH_NO_BULLETTAB:0 "\nWe of House Bar Emmon raise our children in the way of the Swordfish, swift and sharp. From youth, they learn speed of thought and blade, striking true and moving on. Like our sigil, they are taught to cut clean, waste nothing, and never linger where danger gathers. \n#weak The Sword of a Swordfish never breaks."
 
 #SCALES
 scales_legacy_track_name: "Scales"
 scales_legacy_track_desc: "The Weight of Justice"
 scales_legacy_1_name: "Heritage of Ser Elyas Scales"
 scales_legacy_2_name: "Lords Freeholder"
 scales_legacy_3_name: "Justice Prevails"
 scales_legacy_4_name: "Loyal Servants of House Targaryen"
 scales_legacy_5_name: "The sword of justice is ill-placed in the hands of an angry man"
 
 SCALES_ELYAS_NO_BULLETTAB:0 "\nWhen young [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed] was on Dragonstone during his regency, he spent every morning until midday in the castle yard training with sword, shield, and any other armament. [GetScriptedCharacterByHistoryID('Scales_20').GetCharacterViewNameNicknamed], along with [GetScriptedCharacterByHistoryID('Bullock_3').GetCharacterViewNameNicknamed] the commander of the castle garrison, [GetScriptedCharacterByHistoryID('Bullock_3').GetCharacterViewName] two sons, and knights of the Kingsguard, would spar with the king. \n#weak Our century long tradition of training with the Targaryen Lords has made our House produce numerous formidable warriors."
 SCALES_LORDS_FREEHOLDER_NO_BULLETTAB:0 "\nThe lords freeholder, or simply freeholders, were the nobility of the Valyrian Freehold. Any individual who owned land and was not born into slavery was considered a freeholder. The lords freeholder sometimes elected archons from their own number, to help lead Valyria for a limited time. While the freeholding families were officially of equal status, it was not entirely unheard of for Valyria to be swayed by one family alone. The freeholders benefited greatly from the mining of gold and silver by slaves beneath the Fourteen Flames. All freeholders were in concept equal, but in practice the wealthiest and most prestigious families had the most power. \n#weak At its apex Valyria was the greatest city in the known world, the center of civilization. Within its shining walls, twoscore rival houses vied for power and glory in court and council, rising and falling in an endless, subtle, oft savage struggle for dominance."
 SCALES_JUSTICE_PREVAILS_NO_BULLETTAB:0 "\nWe of House Scales raise our children in the ways of Justice, teaching them to weigh truth as carefully as law. From youth, they learn that fairness must prevail over favor or fear. Our scales are balanced by conscience, and through them, we ensure that justice endures, steadfast and unyielding. \n#weak The Just [personality|E] [trait|E] becomes more common."
 SCALES_TARGARYEN_NO_BULLETTAB:0 "\nWe of House Scales hold close and unwavering loyalty to House Targaryen, bound by oath and fire. Through generations, our banners have flown beside theirs, our swords guarding dragonlords and crown alike. In blood, flame, and honor, we share their triumphs and bear their burdens, steadfast and unyielding in devotion. \n#weak The Targaryens have our Eternal allegiance."
 SCALES_SWORD_JUSTICE_NO_BULLETTAB:0 "\nWe of House Scales raise our soldiers under the creed: “The sword of justice is ill-placed in the hands of an angry man.” Tempered in discipline and patience, they strike not from wrath but from reason. Their blades serve fairness, their strength ensures justice, and their hearts honor the law above all. \n#weak Our [heavy_infantry|E] are the peril of every foe.\n#weak Enables recruitment of [GetMaA('scales_swords_of_justice').GetName] as [men_at_arms|E].#!"
 
 #MASSEY
 massey_legacy_track_name: "Massey"
 massey_legacy_track_desc: "Endure"
 massey_legacy_1_name: "Lords of Stonedance"
 massey_legacy_2_name: "First Men"
 massey_legacy_3_name: "Kings of the Hook"
 massey_legacy_4_name: "Fickle Allegiances"
 massey_legacy_5_name: "Hooked Spears"
 
 MASSEY_STONEDANCE_NO_BULLETTAB:0 "\nStonedance was founded by [GetScriptedCharacterByHistoryID('Massey_10').GetCharacterViewNameNicknamed] during the reign of [GetScriptedCharacterByHistoryID('Durrandon_6').GetCharacterViewNameNicknamed]. Stonedance is the seat of House Massey in the crownlands. It is located on the eastern shore of Massey's Hook along the narrow sea, south of Sharp Point. Massey's Hook is a peninsula in the crownlands that defines the eastern extent of Blackwater Bay. Ships must sail around in order to get to King's Landing from the south. \n#weak Massey's Hook is a peninsula in the crownlands that defines the eastern extent of Blackwater Bay."
 MASSEY_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 MASSEY_KINGS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Massey_10').GetCharacterViewNameNicknamed], a vassal of [GetScriptedCharacterByHistoryID('Durrandon_6').GetCharacterViewNameNicknamed], built Stonedance and ruled Massey's Hook. The Masseys broke away from House Durrandon during the reign of [GetScriptedCharacterByHistoryID('Durrandon_31').GetCharacterViewNameNicknamed], however. During the Age of the Hundred Kingdoms, petty kings from House Massey were one of many who historically claimed the mouth of the Blackwater Rush. The Masseys returned to the dominion of Storm's End when [GetScriptedCharacterByHistoryID('Durrandon_47').GetCharacterViewNameNicknamed] took Stonedance after besieging the castle for a year and slaying [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewNameNicknamed]. Less than two years later, however, [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewName] daughter [GetScriptedCharacterByHistoryID('Massey_17').GetCharacterViewName] married the Andal warlord [GetScriptedCharacterByHistoryID('Bar_Emmon_5').GetCharacterViewName], who expelled [GetScriptedCharacterByHistoryID('Durrandon_47').GetCharacterViewName] men from Stonedance and replaced them with [GetScriptedCharacterByHistoryID('Massey_15').GetCharacterViewName] son. \n#weak Blackwater Bay was rough and choppy, whitecaps everywhere."
 MASSEY_FICKLE_NO_BULLETTAB:0 "\nWe of House Massey are known for fickle allegiances, bending with the tide of power. Today’s foe may be tomorrow’s ally, if fortune favors it. We choose survival over sentiment, profit over pride, switching banners as suits our interests. In a shifting realm, we endure by never standing still alone. \n#weak The Fickle [personality|E] [trait|E] becomes more common."
 MASSEY_SPEARS_NO_BULLETTAB:0 "\nWe of House Massey field the Hooked Spears, an elite band sworn to our banner. Their barbed spearheads drag riders from saddles and tear shields aside. Disciplined and ruthless, they fight with precision and guile, embodying our house’s talent for turning the enemy’s strength against them at the perfect moment. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('massey_hooked_spears').GetName] as [men_at_arms|E].#!"
 
 #BYWATER
 bywater_legacy_track_name: "Bywater"
 bywater_legacy_track_desc: "We Cast Our Nets Wide"
 bywater_legacy_1_name: "Loyal to even Tyrants"
 bywater_legacy_2_name: "A House of Humble Fishers"
 bywater_legacy_3_name: "First Men"
 bywater_legacy_4_name: "The Leisters of the Blackwater"
 bywater_legacy_5_name: "A House of Martyrdom"
 
 BYWATER_TYRANTS_NO_BULLETTAB:0 "\nWhen the realm began to turn against [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] for [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed], Lord Bywater was one of the few lords who gathered at his command. However, when [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewName] mysteriously died upon the Iron Throne, Lord Bywater fled to his seat. \n#weak We are forever loyal to house Targaryen."
 BYWATER_HUMBLE_NO_BULLETTAB:0 "\nWe of House Bywater are a house of humble fishers, born of nets, tides, and hard labor. The sea fed our forebears long before swords ever did. We value patience, perseverance, and honest work, knowing that every catch is earned. From quiet waters, we rose, steady, unassuming, and enduring. \n#weak None are as Humble as we."
 BYWATER_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 BYWATER_LEISTERS_NO_BULLETTAB:0 "\nWe of House Bywater command the Leisters of the Blackwater, elite spearmen sworn to tide and house alike. Armed with barbed fishing spears turned to war, they strike from riverbanks and shallows with deadly skill. What once fed us now defends us, proof that humble tools, in steady hands, can become fearsome weapons. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('bywater_blackwater_leisters').GetName] as [men_at_arms|E].#!"
 BYWATER_MARTYRDOM_NO_BULLETTAB:0 "\nWe of House Bywater are a house of martyrdom, hardened by loss and purpose. We will sacrifice coin, comfort, limb, and life itself to see our goals fulfilled. Pain does not deter us, it proves devotion. From blood and resolve, we endure, unbroken even when broken, steadfast unto death. \n#weak It is not the punishment but the cause that makes the martyr."
 
 #FOLLARD
 follard_legacy_track_name: "Follard"
 follard_legacy_track_desc: "None so Wise"
 follard_legacy_1_name: "First Men"
 follard_legacy_2_name: "A House of 'Fools'"
 follard_legacy_3_name: "Every Man has his Price"
 follard_legacy_4_name: "The Fools Squires"
 follard_legacy_5_name: "Wit is a Mans Power"
 
 FOLLARD_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 FOLLARD_FOOLS_NO_BULLETTAB:0 "\nHe who plays the fool but knows he is smarter than the King. He talks and talks and entertains, and no one suspects that he is more than just a fool. He is more powerful than any other man in the Seven Kingdoms. \n#weak Some men of our House are Born as natural Jesters."
 FOLLARD_PRICE_NO_BULLETTAB:0 "\nEvery man has his price. For some it's money, for some it's women, for others glory. But the honest man you don't have to buy, he winds up costing you nothing. \n#weak This wise saying has helped our House propel diplomatically."
 FOLLARD_SQUIRES_NO_BULLETTAB:0 "\nWe of House Follard are served by the Fool’s Squires, devoted warriors bound by loyalty and wit. Mocked by name, never by deed, they fight with fierce devotion and cunning guile. In battle and service alike, they prove that folly is only a mask for steadfast courage and unshakable faith. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('follard_fools_squires').GetName] as [men_at_arms|E].#!"
 FOLLARD_POWER_NO_BULLETTAB:0 "\nWe of House Follard teach our children that wit is a man’s power. Steel may fail and strength may fade, but a sharp mind endures. From youth, they learn to laugh, to think, and to outmaneuver foes. \n#weak In court or conflict, cleverness is our truest weapon."
 
 #FARRING
 farring_legacy_track_name: "Farring"
 farring_legacy_track_desc: "We Knights Two"
 farring_legacy_1_name: "Practiced Duelists"
 farring_legacy_2_name: "Andal Adventurers"
 farring_legacy_3_name: "Close ties to the Stormlanders"
 farring_legacy_4_name: "Pages from Birth"
 farring_legacy_5_name: "Knights of the Northern Kingswood"
 
 FARRING_DUELISTS_NO_BULLETTAB:0 "\nWe of House Farring are practiced duelists, raised with blade in hand and honor in mind. From youth, we learn precision, balance, and restraint, valuing skill over brute force. \n#weak In single combat, our name carries weight, for we fight cleanly, confidently, and with mastery earned through endless practice."
 FARRING_ANDAL_ADVENTURERS_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Shortly after the Andals conquered the Vale, they began sailing to Blackwater Bay and the stormlands."
 FARRING_STORMLANDERS_NO_BULLETTAB:0 "\nWe of House Farring, though sworn directly to the King, hold close ties to the Stormlands and the Lords of Storm’s End. Shared blood, battle, and storm bind us. \n#weak Between crown and thunder, we stand as bridges of loyalty, honoring royal duty while keeping faith with the tempest-born lords of the south."
 FARRING_PAGES_NO_BULLETTAB:0 "\nWe of House Farring raise our children as pages from birth, trained in manners, swordplay, and strategy from their earliest days. Childhood is never idle; every lesson shapes skill, discipline, and honor. From cradle to combat, they learn to serve, observe, and excel, destined to become the duelists our house is famed for. \n#weak Some members of our House are Born as Natural Blademasters."
 FARRING_KNIGHTS_NO_BULLETTAB:0 "\nWe of House Farring command the Knights of the Northern Kingswood, sworn to our banner. Clad in steel and mounted on warhorses, they strike with relentless force, cutting through foes and holding the line. Their loyalty, discipline, and courage make them the living shield and spear of our house. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('farring_knights_kingswood').GetName] as [men_at_arms|E].#!"
 
 #PYLE
 pyle_legacy_track_name: "Pyle"
 pyle_legacy_track_desc: "Guard the Mind"
 pyle_legacy_1_name: "Born with Swords in the Cradle"
 pyle_legacy_2_name: "Chivalrous Traditions"
 pyle_legacy_3_name: "All Honour can be Redeemed"
 pyle_legacy_4_name: "Andal Adventurers"
 pyle_legacy_5_name: "Black Shields of House Pyle"
 
 PYLE_SWORDS_NO_BULLETTAB:0 "\nWe of House Pyle raise our children with swords in the cradle, taught that steel and skill are as vital as breath. From their first steps, they learn to strike, defend, and endure. Blades shape their hands and hearts, forging a lineage where every generation is ready for war. \n#weak Some members of our House are Born as Natural Blademasters."
 PYLE_CHIVALRY_NO_BULLETTAB:0 "\nWe of House Pyle uphold deep chivalrous traditions, where honor, courage, and loyalty guide every action. From the battlefield to the hall, our word is binding and our deeds measured by virtue. Generations are trained in courtesy, valor, and respect, ensuring that our house embodies the true ideals of knighthood. \n#weak Knighthood lies above eternity, it doesn't live off fame, but rather deeds."
 PYLE_HONOUR_NO_BULLETTAB:0 "\nWe of House Pyle believe all honour can be redeemed, no matter the fall. Mistakes are lessons, shame a stepping stone. From youth, we learn that courage, contrition, and resolve restore the soul’s worth. \n#weak In every action, we strive to reclaim dignity, proving that even lost honour can rise again."
 PYLE_ANDAL_ADVENTURERS_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Shortly after the Andals conquered the Vale, they began sailing to Blackwater Bay and the stormlands."
 PYLE_SHIELDS_NO_BULLETTAB:0 "\nWe of House Pyle command the Black Shields, heavy infantry sworn to our banner. Clad in dark steel, disciplined and unyielding, they hold the line where others falter. In shield wall and phalanx, their loyalty and strength embody our house, turning defense into an immovable force none can break. \n#weak Our [heavy_infantry|E] are the peril of every foe.\n#weak Enables recruitment of [GetMaA('pyle_black_shields').GetName] as [men_at_arms|E].#!"
 
 #GAUNT
 gaunt_legacy_track_name: "Gaunt"
 gaunt_legacy_track_desc: "With Darkest Steel"
 gaunt_legacy_1_name: "Loyal Servants of House Targaryen"
 gaunt_legacy_2_name: "Black Lances"
 gaunt_legacy_3_name: "Born in the Saddle"
 gaunt_legacy_4_name: "Rigerous Training"
 gaunt_legacy_5_name: "Andal Adventurers"
 
 GAUNT_LOYAL_NO_BULLETTAB:0 "\nWe of House Gaunt are loyal servants of House Targaryen, sworn in blood and fire. Across generations, our swords, counsel, and shields have guarded dragonlords and crown alike. Steadfast and unwavering, we bind our fate to theirs, ensuring that where the dragons fly, the Gaunts are ever present, loyal and true. \n#weak We are forever loyal to house Targaryen."
 GAUNT_LANCES_NO_BULLETTAB:0 "\nWe of House Gaunt command the Black Lances, knights sworn to our banner and bound by honor. Clad in midnight steel, they ride with discipline and courage, striking where duty calls. Fearless in battle, unwavering in loyalty, they are the sword and shield of our house, embodying Gaunt valor. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes."
 GAUNT_SADDLE_NO_BULLETTAB:0 "\nWe of House Gaunt raise our children in the saddle, from cradle to stirrup. From their first breath, they learn balance, endurance, and the ways of horse and warrior. Riding is not pastime but inheritance, forging strength, skill, and courage that flow in their blood as surely as Gaunt loyalty. \n#weak On the back of a horse you will find paradise."
 GAUNT_TRAINING_NO_BULLETTAB:0 "\nWe of House Gaunt endure rigorous training from youth, where every day shapes body, mind, and spirit. Blades are mastered, mounts commanded, and discipline enforced. Pain and exhaustion are tools, forging warriors capable of standing beside dragons. \n#weak Through relentless practice, we become unyielding, our house defined by skill, endurance, and honor."
 GAUNT_ANDAL_ADVENTURERS_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Shortly after the Andals conquered the Vale, they began sailing to Blackwater Bay and the stormlands."
 
 #DARKLYN
 darklyn_legacy_track_name: "Darklyn"
 darklyn_legacy_track_desc: "Beneath Dusk's Dim Light"
 darklyn_legacy_1_name: "Aegon's first test"
 darklyn_legacy_2_name: "Kings of the Blackwater"
 darklyn_legacy_3_name: "Lords of the Dun Fort"
 darklyn_legacy_4_name: "House of the Kingsguard"
 darklyn_legacy_5_name: "First Men"
 
 DARKLYN_AEGON_NO_BULLETTAB:0 "\nDuring Aegon's Conquest, [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] and his bastard half-brother [GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed] defeated the Darklyns of Duskendale and the Mootons of Maidenpool in Aegon's first test. \n#weak We bent the knee to the Targaryens and served their new kings as the Lords of Duskendale."
 DARKLYN_KINGS_NO_BULLETTAB:0 "\nThe Darklyns were petty kings of the First Men during the Age of Heroes. Their closest allies were their bannermen of House Hollard, who served them loyally and provided brides three times for the Darklyn kings of old. The Darklyns claimed the mouth of the Blackwater Rush during the Hundred Kingdoms. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('darklyn_dusk_knights').GetName] as [men_at_arms|E].#!"
 DARKLYN_LORDS_NO_BULLETTAB:0 "\nDuskendale spreads out around its harbor and has cobbled streets. The gatehouse opens to a market square. The castle of House Darklyn that overlooks the port is the Dun Fort, a squat square stone castle with big drum towers. Duskendale is surrounded by strong walls which shimmer palely in predawn. Guardsmen wield spears and wear chain mail hauberks. \n#weak The largest inn in Duskendale is the Seven Swords, across from which lives a skilled painter, the sister of the captain of the gatehouse. Duskendale contains multiple septs."
 DARKLYN_KINGSGUARD_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Darklyn_9').GetCharacterViewNameNicknamed], was among the first seven knights of the Kingsguard. Ser Robin is remembered for being quick, strong, observant, and famed for his prowess with sword and shield. He was devoted to his king. Seven Darklyns eventually joined the Kingsguard, more than any other house. \n#weak Many born to our House Dream of being Kingsguard themselves since Birth."
 DARKLYN_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 
 #STOKEWORTH
 stokeworth_legacy_track_name: "Stokeworth"
 stokeworth_legacy_track_desc: "Proud to Be Faithful"
 stokeworth_legacy_1_name: "Swords of the Lamb"
 stokeworth_legacy_2_name: "Lords of Stokeworth"
 stokeworth_legacy_3_name: "The Lamb and the Chalice"
 stokeworth_legacy_4_name: "Quick to surrender"
 stokeworth_legacy_5_name: "Exceptional Architects"
 
 STOKEWORTH_SWORDS_NO_BULLETTAB:0 "\nWe of House Stokeworth are served by the Swords of the Lamb, our personal retinue sworn to guard hearth and hall. Though gentle in name, they are steadfast and unbreakable in battle, defending our people with disciplined blades and loyal hearts, ever watchful beneath the banner of proud Stokeworth honor. \n#weak Our [heavy_infantry|E] are the peril of every foe.\n#weak Enables recruitment of [GetMaA('stokeworth_swords_of_the_lamb').GetName] as [men_at_arms|E].#!"
 STOKEWORTH_LORDS_NO_BULLETTAB:0 "\nWe of House Stokeworth are the Lords of Stokeworth, guardians of our ancient ancestral castle. From its sturdy walls we have watched over field and folk for generations, ruling with steady hands and steadfast hearts. \n#weak Stone and lineage bind us, and within these halls our legacy endures, unbroken and proud."
 STOKEWORTH_LAMB_NO_BULLETTAB:0 "\nWe of House Stokeworth are the House of the Lamb and the Chalice, symbols of gentleness, faith, and quiet strength. We value duty over pride, mercy over wrath, and service above all. In our halls humility endures, and honor flows like wine from a sacred cup, steady, pure, enduring, true. \n#weak The Forgiving [personality|E] [trait|E] becomes more common."
 STOKEWORTH_SURRENDER_NO_BULLETTAB:0 "\nWe of House Stokeworth are known to be quick to surrender, choosing survival over needless ruin. When odds turn against us, we bend before breaking, sparing our people and lands. Pride fades before prudence; we live to endure, rebuild, and serve another day. \n#weak Wisdom guides our yielding hearts. Always pragmatic."
 STOKEWORTH_ARCHITECTS_NO_BULLETTAB:0 "\nWe of House Stokeworth are renowned as great architects, raising strong walls, graceful towers, and halls of lasting beauty. Stone answers to our design, and castles flourish beneath our hands. From sturdy keeps to elegant bridges, we build with patience, precision, and pride, shaping the realm in enduring form forever. \n#weak Some Children of our House are born as exceptional Architects."
 
 #BUCKWELL
 buckwell_legacy_track_name: "Buckwell"
 buckwell_legacy_track_desc: "Pride and Purpose"
 buckwell_legacy_1_name: "Fertile Forests"
 buckwell_legacy_2_name: "Lords of Antlers"
 buckwell_legacy_3_name: "Self exile over Death"
 buckwell_legacy_4_name: "A House of Hunters"
 buckwell_legacy_5_name: "First Men"
 
 BUCKWELL_FORESTS_NO_BULLETTAB:0 "\nWe of House Buckwell rule lands rich with fertile forests, where tall oaks and green boughs stretch as far as eye can see. Game thrives, rivers run clear, and timber fills our halls with wealth. \n#weak From deep woodland soil, our strength grows steady and enduring through every passing season sure."
 BUCKWELL_LORDS_NO_BULLETTAB:0 "\nWe of House Buckwell are the Lords of Antlers, proud keepers of our ancient ancestral castle. Its towers rise above forest and field, strong as the stag upon our banner. From these halls we guard our lands and people, rooted deep like the woods that shelter our enduring legacy. \n#weak Our Seat is named after the trophies of old of our House. Many of our House are born as excelent Hunters."
 BUCKWELL_EXILE_NO_BULLETTAB:0 "\nWe of House Buckwell have chosen self exile over death, valuing survival above pride. When doom threatened our line, we gathered kin and banner and departed rather than perish in stubborn ruin. Better distant fields and humble hope than graves beneath familiar stones forever, to preserve our noble name enduring. \n#weak The Craven [personality|E] [trait|E] becomes more common."
 BUCKWELL_HUNTERS_NO_BULLETTAB:0 "\nWe of House Buckwell are a house of hunters, raised among antlered forests and shadowed glades. From youth we track, stalk, and strike with patience and keen eye. Bow, spear, and hound are our heritage. In field and wood we thrive, providers, guardians, masters of the chase proud, relentless, true. \n#weak Our [archers|E] are the most skilled Hunters of House Buckwell."
 BUCKWELL_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 
 #ROSBY
 rosby_legacy_track_name: "Rosby"
 rosby_legacy_track_desc: "Go Boldly Forth"
 rosby_legacy_1_name: "Veterans of the First Dornish War"
 rosby_legacy_2_name: "Skilled Fighters"
 rosby_legacy_3_name: "Lords of Rosby"
 rosby_legacy_4_name: "Royalists to the Core"
 rosby_legacy_5_name: "Ermine Hunters"
 
 ROSBY_VETERANS_NO_BULLETTAB:0 "\nWe of House Rosby are veterans of the First Dornish War, our banners forged in fire and blood. We fought in scorching sands and bitter passes, enduring loss and hardship. From those battles, honor and courage were tempered into legacy, and our house stands forever marked by valor earned under the sun. \n#weak The First Dornish War taught our House that stopping the Hunt before the Prey has been slain is a grave mistake."
 ROSBY_FIGHTERS_NO_BULLETTAB:0 "\nWe of House Rosby are skilled fighters, honed through years of war and discipline. Blade, spear, and shield are extensions of our will, each strike precise and deliberate. In battle, we move with practiced grace, striking hard and fast. \n#weak Our reputation is earned, feared, and respected across the realms of men."
 ROSBY_LORDS_NO_BULLETTAB:0 "\nWe of House Rosby are the Lords of Rosby, guardians of our ancestral castle perched upon the western cliffs. From these halls, we watch coast and countryside alike, ruling with vigilance and honor. \n#weak Stone and legacy intertwine here, and within these walls, the strength and pride of our house endure unbroken."
 ROSBY_ROYALISTS_NO_BULLETTAB:0 "\nWe of House Rosby are royalists to the core, bound by oath and blood to crown and realm. Loyalty guides our swords and hearts alike, unwavering even in hardship. Through war, counsel, and counsel, we uphold the king’s honor, proving that devotion to crown and country is the measure of true nobility. \n#weak Loyalty is second nature to our House."
 ROSBY_ERMINE_HUNTERS_NO_BULLETTAB:0 "\nWe of House Rosby are hunters of the ermine, skilled in tracking, patience, and swift, precise strikes. From snowy hills to hidden glades, we pursue our quarry with cunning and endurance. In this practice, we learn discipline, stealth, and the art of the hunt, a reflection of our house’s sharp minds and keen resolve. \n#weak Our [archers|E] are the most skilled Hunters of House Rosby.\n#weak Enables recruitment of [GetMaA('rosby_huntsmen').GetName] as [men_at_arms|E].#!"
 
 #HAYFORD
 hayford_legacy_track_name: "Hayford"
 hayford_legacy_track_desc: "Paved by Our Deeds"
 hayford_legacy_1_name: "The Cruels voice of reason"
 hayford_legacy_2_name: "Scouts of the Blackwater"
 hayford_legacy_3_name: "Lords of Hayford"
 hayford_legacy_4_name: "One needs Patience to be Diligent"
 hayford_legacy_5_name: "First Men"
 
 HAYFORD_VOICE_NO_BULLETTAB:0 "\nWe of House Hayford are the cruel king’s voice of reason, advisors whose words cut sharper than any blade. We temper wrath with cold judgment, shaping law and strategy with unflinching clarity. \n#weak Mercy is measured, justice precise, and in our counsel, even the fiercest king learns discipline and fear."
 HAYFORD_SCOUTS_NO_BULLETTAB:0 "\nWe of House Hayford are the scouts of the Blackwater, eyes and ears along river and shore. Silent, swift, and unseen, we track, report, and ambush as duty demands. From shadowed banks to misty inlets, our vigilance guards our lands, and our presence ensures no foe moves unseen beneath the tides. \n#weak [light_cavalry|E] are faster than their [heavy_cavalry|E] counterparts, and thereby more effective in persuing the enemy.\n#weak Enables recruitment of [GetMaA('hayford_scouts_blackwater').GetName] as [men_at_arms|E].#!"
 HAYFORD_LORDS_NO_BULLETTAB:0 "\nWe of House Hayford dwell in our ancestral castle, Hayford, perched where the Blackwater winds through hill and fen. Its walls rise strong, a bastion of stone and watchfulness. \n#weak From these towers, we oversee river and road, guarding our lands and legacy with unwavering vigilance and the cunning of generations."
 HAYFORD_PATIENCE_NO_BULLETTAB:0 "\nWe of House Hayford raise our children under the saying, 'One needs patience to be diligent.' From their earliest days, they learn restraint, observation, and careful thought. Every task is a lesson in persistence, every challenge a test of focus. Through patience, they become steadfast, skilled, and ready to serve our house. \n#weak The Patient and Diligent [personality|E] [trait|E] become more common."
 HAYFORD_FIRST_MEN_NO_BULLETTAB:0 "\nThe First Men originated in the grasslands of Essos, in the lands now known as the Dothraki sea. Between eight thousand and twelve thousand years before Aegon's Landing, during the Dawn Age, the First Men came to Westeros from Essos, although no tale recalls exactly why they made the trek westwards. The First Men crossed the land bridge called the Arm of Dorne under the leadership of the First King, according to legends from the north, or Garth Greenhand, the High King of the First Men, according to some legends from the Reach. \n#weak They came with bronze swords and great leathern shields, riding horses."
 
 #BYRCH 
 byrch_legacy_track_name: "Byrch"
 byrch_legacy_track_desc: "Sway in the Breeze"
 byrch_legacy_1_name: "Roots Deeper Than Law"
 byrch_legacy_2_name: "Loyal to even Tyrants"
 byrch_legacy_3_name: "Unbowed Beneath the Storm"
 byrch_legacy_4_name: "Axes of the Crownlands"
 byrch_legacy_5_name: "Blood Feeds the Bark"
 
 BYRCH_ROOTS_NO_BULLETTAB:0 "\nWe of House Byrch claim roots deeper than law, older than charters or crowns. Tradition guides us more than written rule, and our children grow headstrong in that certainty. Raised to trust instinct over statute, they can be arbitrary, decisive, and unyielding. \n#weak The Arbitrary [personality|E] [trait|E] becomes more common."
 BYRCH_TYRANTS_NO_BULLETTAB:0 "\nWhen the realm began to turn against [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] for [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed], Lord Byrch was one of the few lords who gathered at his command. \n#weak We are forever loyal to house Targaryen."
 BYRCH_UNBOWED_NO_BULLETTAB:0 "\nWe of House Byrch stand unbowed beneath the storms, our banners snapping against wind and rain. Tempest and thunder test us, yet never break us. Rooted deep in stubborn soil, we endure every gale with clenched fists and steady hearts. \n#weak Proving that no storm can uproot what is truly steadfast."
 BYRCH_AXES_NO_BULLETTAB:0 "\nWe of House Byrch command the Axes of the Crownlands, elite axemen sworn to our banner. Broad-bladed and relentless, they hew through shield and mail with brutal precision. In tight ranks they advance, disciplined and fierce, the ringing of steel on steel announcing Byrch strength wherever battle is joined. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('byrch_crownland_axes').GetName] as [men_at_arms|E].#!"
 BYRCH_BLOOD_NO_BULLETTAB:0 "\nWe of House Byrch keep the old saying: blood feeds the bark. The blood of our enemies sinks into the roots of our forests, strengthening trunk and branch alike. Victory is not forgotten but returned to the soil, a grim reminder that our trees.  \n#weak Our house grow stronger with every fallen foe."
  
 #HARTE
 harte_legacy_track_name: "Harte"
 harte_legacy_track_desc: "Bucking Fiercely"
 harte_legacy_1_name: "Fickle Loyalty"
 harte_legacy_2_name: "Antlers Turned Against Kings"
 harte_legacy_3_name: "Run Where the Herd Runs"
 harte_legacy_4_name: "House of the Bucks"
 harte_legacy_5_name: "Harte Hunters"
 
 HARTE_FICKLE_NO_BULLETTAB:0 "\nWe of House Harte are known for fickle loyalty, bending with the tide of power. Today’s foe may be tomorrow’s ally, if fortune favors it. We choose survival over sentiment, profit over pride, switching banners as suits our interests. In a shifting realm, we endure by never standing still alone. \n#weak The Fickle [personality|E] [trait|E] becomes more common."
 HARTE_TYRANTS_NO_BULLETTAB:0 "\nWhen the realm began to turn against [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] for [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed], Lord Bywater was one of the few lords who gathered at his command. However, when [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewName] mysteriously died upon the Iron Throne, Lord Harte fled to his seat. \n#weak We are forever loyal to house Targaryen.""
 HARTE_HERD_NO_BULLETTAB:0 "\nWe of House Harte run where the herd runs, ever mindful of the realm’s shifting winds. We follow trends, align with rising powers, and move with the current rather than against it. Some call it fickle; we call it survival. \n#weak In a changing world, we endure by never standing alone."
 HARTE_BUCKS_NO_BULLETTAB:0 "\nWe of House Harte are the House of Bucks, swift, proud, and watchful. Like the hartes on our banner, we move with grace and strength, ever alert to danger. Our lands and people thrive under vigilance, and our house embodies the courage, speed, and nobility of the harte in all things. \n#weak Some members of our House resemble the Hartes entire nature."
 HARTE_HUNTERS_NO_BULLETTAB:0 "\nWe of House Harte are a house of hunters, raised among antlered forests and shadowed glades. From youth we track, stalk, and strike with patience and keen eye. Bow, spear, and hound are our heritage. In field and wood we thrive, providers, guardians, masters of the chase proud, relentless, true. \n#weak Our [archers|E] are the most skilled Hunters of House Harte.\n#weak Enables recruitment of [GetMaA('harte_huntsmen').GetName] as [men_at_arms|E].#!"
 
 #CARGYLL
 cargyll_legacy_track_name: "Cargyll"
 cargyll_legacy_track_desc: "Golden Loyalty, Golden Duty"
 cargyll_legacy_1_name: "House of the Golden Goose"
 cargyll_legacy_2_name: "Gold Never Changes Hands"
 cargyll_legacy_3_name: "None are as loyal as us"
 cargyll_legacy_4_name: "Oaths Weigh More Than Coin"
 cargyll_legacy_5_name: "To Serve Is to Shine"
 
 CARGYLL_GOOSE_NO_BULLETTAB:0 "\nWe of House Cargyll are the House of the Golden Goose, guardians of wealth, prosperity, and cunning. Like the fabled bird, we bring fortune and protection to our lands. Our banners gleam with gold, and our house thrives on cleverness, vigilance, and the careful nurturing of both people and treasure. \n#weak The Temperate [personality|E] [trait|E] becomes more common."
 CARGYLL_HANDS_NO_BULLETTAB:0 "\nWe of House Cargyll live by the saying, 'Gold never changes hand,' a testament to our steadfast loyalty. Wealth, trust, and honor remain bound to our house, never squandered or betrayed. In service, governance, and family alike, we guard what is ours. \n#weak Unwavering devotion and vigilance."
 CARGYLL_LOYAL_NO_BULLETTAB:0 "\nWe of House Cargyll say proudly, none are as loyal as us. Bound by oath, blood, and honor, we stand unwavering beside our allies and liege. In word and deed, our devotion is unmatched, enduring trials, tempests, and time itself.  \n#weak Loyalty is not choice it is our very nature."
 CARGYLL_OATHS_NO_BULLETTAB:0 "\nWe of House Cargyll command the Golden Goose Knights, sworn warriors who ride with honor above all. Their motto, 'Oaths Weigh More Than Coin,' guides every charge, strike, and defense. Loyal, disciplined, and steadfast, they embody our house. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('cargyll_goose_knights').GetName] as [men_at_arms|E].#!"
 CARGYLL_SERVE_NO_BULLETTAB:0 "\nHouse Cargyll serves to shine, illuminating loyalty, honor, and duty in every deed. Our actions reflect the light of our name, guiding allies and inspiring awe. Through service, counsel, and courage, we ensure that our house’s brilliance endures. \n#weak A constant beacon of steadfastness and pride in a shadowed world."
 
 #CRABB
 crabb_legacy_track_name: "Crabb"
 crabb_legacy_track_desc: "The Crab of the Cliff"
 crabb_legacy_1_name: "Legacy of Clarence Crabb"
 crabb_legacy_2_name: "Armor Worn Like Shell"
 crabb_legacy_3_name: "Kingsguard Traditions"
 crabb_legacy_4_name: "We Hold Against the Tide"
 crabb_legacy_5_name: "House of the Crabb"
 
 CRABB_CLARENCE_NO_BULLETTAB:0 "\nAccording to legend, [GetScriptedCharacterByHistoryID('Crabb_13').GetCharacterViewNameNicknamed] was eight feet tall and strong enough to uproot trees and throw them half a mile. He was so heavy that only an aurochs could carry him. Ser Clarence's seat was called the Whispers, so named due to the disembodied heads that he would collect and bring home to his wife, who would raise them from the dead. The dead heads would give him counsel, and talk among themselves in a whisper. Ser Clarence collected the heads from a variety of people, including pirates, lords, wizards, knights, and even one king from Duskendale. Clarence is also said to have fought the squisher king. \n#weak Some members of our House are born as natural giants."
 CRABB_SHELL_NO_BULLETTAB:0 "\nHouse Crabb wears their armor as naturally as a crab wears its shell protection fused with body and instinct. From youth, we move, fight, and endure as one with steel, unyielding and resilient. Our defense is second nature, our strength hidden yet impenetrable. \n#weak Our [heavy_infantry|E] are the peril of every foe."
 CRABB_KINGSGUARD_NO_BULLETTAB:0 "\nHouse Crabb has served the Iron Throne with unwavering devotion, generations raised as Kingsguard. Our swords defend crown and king alike, our shields stand where others fall. Through fire, war, and intrigue, we have remained steadfast. \n#weak A living bulwark of loyalty, honor, and unbroken service to the realm’s highest seat of power."
 CRABB_TIDE_NO_BULLETTAB:0 "\nHouse Crabb holds against the tide as steadfastly as the crab clings to rock. In battle and storm alike, we endure, unyielding to pressure or flood. Strong, patient, and resilient, our house weathers every assault, turning force aside with unwavering grip. \n#weak Proving that persistence is the fiercest kind of strength."
 CRABB_CRABB_NO_BULLETTAB:0 "\nHouse Crabb is the House of the Crab, resilient, steadfast, and ever watchful. Like our sigil, we move cautiously yet decisively, armored against threat and tide alike. In defense, patience, and cunning, we embody the crab’s nature \n#weak Unyielding, enduring, and perfectly suited to survive where others falter."
 
 #HOGG
 hogg_legacy_track_name: "Hogg"
 hogg_legacy_track_desc: "The Grand Old Boar"
 hogg_legacy_1_name: "Loyal to even Tyrants"
 hogg_legacy_2_name: "Tourney Knights"
 hogg_legacy_3_name: "Tusks Lowered for the Charge"
 hogg_legacy_4_name: "House of the Hogg"
 hogg_legacy_5_name: "Too Stubborn to Break"
 
 HOGG_LOYAL_NO_BULLETTAB:0 "\nJon Hogg, known as Big Jon Hogg remained loyal to the Iron Throne during the Faith Militant uprising. He fought in the battle at the Great Fork, under the command of King Maegor I Targaryen. Early in the battle, he was blinded by a sword slash, yet he managed to rally his men and led a charge that broke through the lines of the Faith Militant and put the Poor Fellows to flight. \n#weak Many in our House aspire to be as Loyal as Big Jon."
 HOGG_TOURNEY_NO_BULLETTAB:0 "\nHarys Hogg, also known as Harry the Ham, In 55 AC, Harys became a favorite of the smallfolk during the great melee celebrating the completion of the Dragonpit. \n#weak Many in our House aspire to be like Harys."
 HOGG_TUSKS_NO_BULLETTAB:0 "\nHouse Hogg fields the Tusk Chargers, heavy infantry famed for brutal, disciplined assaults. Like a boar lowering its tusks, they brace shields, dip helms, and drive forward in crushing formation. Their charge is sudden, savage, and unstoppable, breaking lines with raw force and leaving trampled foes in their wake. \n#weak Our [heavy_infantry|E] are the peril of every foe."
 HOGG_HOGG_NO_BULLETTAB:0 "\nHouse Hogg is the House of the Hogg, stubborn, fierce, and unafraid to stand its ground. Like the beast upon our banner, we root deep, defend our own, and charge when threatened. Strength, endurance, and raw determination define us, for a cornered hogg is among the most dangerous foes. \n#weak The Stubborn [personality|E] [trait|E] becomes more common."
 HOGG_STUBBORN_NO_BULLETTAB:0 "\nHouse Hogg is too stubborn to break, forged in hardship and hardened by pride. We dig in when others yield, endure when others falter, and fight on when hope thins. Pressure only strengthens our resolve. \n#weak Like the beast we bear, we stand firm, unmovable, and utterly relentless."
 
 #BRUNE
 brune_legacy_track_name: "Brune"
 brune_legacy_track_desc: "As Bold as the Bear"
 brune_legacy_1_name: "House of the Bear"
 brune_legacy_2_name: "Legacy of Bernarr"
 brune_legacy_3_name: "Claws Remember Old Wounds"
 brune_legacy_4_name: "Legacy of the Brothers Brune"
 brune_legacy_5_name: "No Quarry Escapes the Den" 
 
 BRUNE_BEAR_NO_BULLETTAB:0 "\nHouse Brune is the House of the Bear, fierce and formidable in strength. Like the great beast of forest and mountain, we are patient in peace yet terrible in wrath. Our claws are sharp, our will unshakable. \n#weak When roused, we defend kin and land with unstoppable fury."
 BRUNE_BERNARR_NO_BULLETTAB:0 "\nBernarr was the squire of Lord Alyn Stokeworth, the Hand of the King. When Lord Alyn was slain by the rebel Harren the Red, Bernarr avenged him by killing Harren.  In 42 AC, Ser Bernarr was present at Visenya's Hill when King Maegor I Targaryen was challenged by Ser Damon Morrigen, Grand Captain of the Warrior's Sons, to a trial of seven to settle his legitimacy to the Iron Throne. Bernarr was shamed into action by the volunteering of Dick Bean, a simple man-at-arms. Ser Bernarr spoke out, offering to stand beside King Maegor, and noting that all present were no true knights. \n#weak Bernarr is the prime example of chivalrous actions of our House."
 BRUNE_CLAWS_NO_BULLETTAB:0 "\nThe Claws of the Bear, are grim spearmen sworn to den and blood. They live by the saying, 'Claws remember old wounds,' holding grudges as tightly as their ash-hafted spears. Patient and relentless, they answer every slight in time, striking with measured, unforgiving strength. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('brune_bear_claws').GetName] as [men_at_arms|E].#!"
 BRUNE_BROTHERS_NO_BULLETTAB:0 "\nThe Brothers Brune were legendary champions of Crackclaw Point, where bog, pine, and broken coast breed hard folk and harder feuds. In a land slow to kneel and quick to fight, they ended blood-soaked rivalries, uniting clawmen beneath bear banners and bringing rare peace to that stubborn, storm-lashed peninsula. \n#weak The Authoritative [personality|E] [trait|E] becomes more common."
 BRUNE_DEN_NO_BULLETTAB:0 "\nHouse Brune lets no quarry escape the den. Disputes, betrayals, and rivalries are settled within our own walls, never spilling into the open. Like a bear guarding its cave, we keep our struggles contained and our secrets closer still. \n#weak What begins within our house ends there."

 #CAFFEREN 
 cafferen_legacy_track_name: "Cafferen"
 cafferen_legacy_track_desc: "For What is Just"
 cafferen_legacy_1_name: "Sworn Enemies of Dorne"
 cafferen_legacy_2_name: "Fawnish Archers"
 cafferen_legacy_3_name: "House of the Fawn"
 cafferen_legacy_4_name: "Marcher Blood, Marcher Law"
 cafferen_legacy_5_name: "Oaths Tempered by Rain" 
 
 CAFFEREN_DORNE_NO_BULLETTAB:0 "\nDuring the First Dornish War, [GetScriptedCharacterByHistoryID('Cafferen_13').GetCharacterViewNameNicknamed] was to be wed to [GetScriptedCharacterByHistoryID('Oakheart_19').GetCharacterViewNameNicknamed], daughter of [GetScriptedCharacterByHistoryID('Oakheart_15').GetCharacterViewNameNicknamed]. At the wedding, the notorious [GetScriptedCharacterByHistoryID('Wyl_21').GetCharacterViewNameNicknamed] led attackers that slew Lord Oakheart and most of the guests. [GetScriptedCharacterByHistoryID('Oakheart_19').GetCharacterViewNameNicknamed] and her handmaids were carried off and sold to a Myrish slaver. \n#weak Since before the actions of [GetScriptedCharacterByHistoryID('Wyl_21').GetCharacterViewNameNicknamed] House Cafferen has been a sworn enemy of Dorne, fighting them for centuries."
 CAFFEREN_ARCHERS_NO_BULLETTAB:0 "\nHouse Cafferen’s Fawnish Archers move with the grace of woodland fawns, light of step and keen of eye. Slender and swift, they loose arrows with uncanny precision, vanishing between trees like spirits of the green. Gentle in bearing yet deadly in aim, they are beauty and peril entwined. \n#weak \n#weak Our [archers|E] will crush our enemies swiftly and unseen."
 CAFFEREN_FAWN_NO_BULLETTAB:0 "\nHouse Cafferen is the House of the Fawn, gentle in mien yet swift in peril. We prize grace, vigilance, and quiet courage, moving lightly through court and wood alike. Though soft of speech and fair of bearing, we startle into sudden strength when threatened. \n#weak Fleet and unerring as the forest’s child."
 CAFFEREN_MARCHER_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 CAFFEREN_OATHS_NO_BULLETTAB:0 "\nHouse Cafferen’s oaths are tempered by rain, forged in the soft, relentless drumming of storm and drizzle. Promises are not made lightly, and like leaves washed clean, our words endure through hardship. Patience and resilience mark our loyalty, ensuring every vow is as steadfast as roots beneath wet soil. \n#weak The Just [personality|E] [trait|E] becomes more common."
 
 #PEASEBURY 
 peasebury_legacy_track_name: "Peasebury"
 peasebury_legacy_track_desc: "Born in Bliss and Joy"
 peasebury_legacy_1_name: "Pea Pod Soldiers"
 peasebury_legacy_2_name: "Stewards of Simple Bounty"
 peasebury_legacy_3_name: "Fields of Plenty"
 peasebury_legacy_4_name: "House of the Pea"
 peasebury_legacy_5_name: "From Pea to Prosperity" 
 
 PEASEBURY_SOLDIERS_NO_BULLETTAB:0 "\nHouse Peasebury commands the Pea Pod Soldiers, elite heavy infantry clad in rounded, layered armor. Tough, disciplined, and cohesive, they advance like a tightly packed pod, protecting one another while crushing foes with coordinated force. \n#weak Our [heavy_infantry|E] are the peril of every foe."
 PEASEBURY_STEWARDS_NO_BULLETTAB:0 "\nWe are guardians of humble harvests and honest toil. We tend fields, flocks, and people alike, ensuring prosperity and sustenance endure. Modest in wealth but rich in care, our house honors labor, patience, and the quiet strength that feeds both hearth and realm. \n#weak The Humble [personality|E] [trait|E] becomes more common."
 PEASEBURY_FIELDS_NO_BULLETTAB:0 "\nHouse Peasebury rules over the Fields of Plenty, where rows upon rows of peas stretch green and endless. Fertile soil and careful hands keep the harvest bountiful, feeding lords and commonfolk alike. \n#weak Our century long cultivation of Peas has resulted in the so called fields of plenty."
 PEASEBURY_PEA_NO_BULLETTAB:0 "\nHouse Peasebury is the House of the Pea, humble yet enduring. Like the small seed, we thrive through patience, care, and persistence. Unassuming in appearance but vital in sustenance, our house values growth, nourishment, and quiet strength. \n#weak A legacy that endures generations."
 PEASEBURY_PROSPERITY_NO_BULLETTAB:0 "\nHouse Peasebury rises from pea to prosperity, humble beginnings forged into lasting wealth through toil, patience, and stewardship. From tiny seeds sown in fertile fields, we cultivate growth, sustenance, and influence. \n#weak Diligence and care yield both bounty and honor."
 
 #FELL
 fell_legacy_track_name: "Fell"
 fell_legacy_track_desc: "The Moon is High"
 fell_legacy_1_name: "The Forest is our Friend"
 fell_legacy_2_name: "Callous Tactics"
 fell_legacy_3_name: "Forest Stalkers"
 fell_legacy_4_name: "Silent as the Rising Moon"
 fell_legacy_5_name: "Shadows Beneath the Boughs" 
 
 FELL_FOREST_NO_BULLETTAB:0 "\nHouse Fell uses the forest to our advantage, moving through shadowed glades and hidden paths as naturally as the wind. Trees, undergrowth, and mist are allies, shielding us from enemies and guiding our hand. \n#weak In every branch and root, we find protection, cunning, and strength."
 FELL_CALLOUS_NO_BULLETTAB:0 "\nHouse Fell excels in callous tactics, stalking foes through shadowed woods, skirmishing where least expected, and striking from hidden positions with lethal precision. Patience and cunning guide every move. \n#weak The Callous [personality|E] [trait|E] becomes more common."
 FELL_STALKERS_NO_BULLETTAB:0 "\nThe Forest Stalkers, elite skirmishers sworn to our banner. Silent, patient, and deadly, they move like shadows among trees, striking with precision and vanishing before foes can retaliate. Masters of ambush and guerrilla tactics. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('fell_forest_stalkers').GetName] as [men_at_arms|E].#!"
 FELL_SILENT_NO_BULLETTAB:0 "\nHouse Fell is silent as the rising moon, moving unseen through forest and shadow. Our presence is felt only in the whisper of leaves or the sudden fall of an enemy. \n#weak Patience, discretion, and subtlety are our weapons."
 FELL_SHADOW_NO_BULLETTAB:0 "\nHouse Fell moves through the shadows beneath the boughs, blending with darkness and foliage alike. Every tree conceals us, every root guides our step. From hidden vantage, we observe, ambush, and strike, turning the forest into both shield and weapon. \n#weak In the hush beneath the canopy, our house thrives unseen and unstoppable."
 
 #PENROSE
 penrose_legacy_track_name: "Penrose"
 penrose_legacy_track_desc: "Set Down Our Deeds"
 penrose_legacy_1_name: "Loyal House"
 penrose_legacy_2_name: "Papyrus Knights"
 penrose_legacy_3_name: "House of the Quill"
 penrose_legacy_4_name: "Ink Bound by Honour"
 penrose_legacy_5_name: "Lords of Parchments" 
 
 PENROSE_LOYAL_NO_BULLETTAB:0 "\nHouse Penrose is steadfastly loyal, bound by oath, honor, and blood. Our word is unwavering, our service enduring, and our banners stand beside allies through storm and strife. Loyalty guides every action, shaping decisions and deeds alike. \n#weak In crown, kin, and cause, House Penrose remains true, steadfast, and unshakable."
 PENROSE_PAPYRUS_NO_BULLETTAB:0 "\nThe Papyrus Knights, skilled heavy cavalry sworn to our banner. Clad in polished steel and mounted on powerful steeds, they strike with precision and force, breaking enemy lines and holding ground with unwavering discipline. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('penrose_papyrus_knights').GetName] as [men_at_arms|E].#!"
 PENROSE_QUILL_NO_BULLETTAB:0 "\nHouse Penrose is the House of the Quill, valuing wisdom, record, and counsel as much as sword and shield. Words guide our strategy, law, and legacy. From careful thought to decisive action, our house wields knowledge like steel. \n#weak The Gregarious [personality|E] [trait|E] becomes more common."
 PENROSE_HONOUR_NO_BULLETTAB:0 "\nFlowing with purpose yet constrained by duty. Our words, oaths, and actions are deliberate, each stroke guided by loyalty and principle. Knowledge and truth shape our path, and through disciplined counsel and steadfast resolve. \n#weak We leave a lasting mark upon the world."
 PENROSE_PARCHMENTS_NO_BULLETTAB:0 "\nHouse Penrose rules from Castle Parchments, our ancestral seat of ink, scroll, and stone. Towers rise like quills upon the skyline, halls lined with records of law and legacy. \n#weak From here, we guard our lands, preserve knowledge, and guide our people."
 
 #MORRIGEN
 morrigen_legacy_track_name: "Morrigen"
 morrigen_legacy_track_desc: "Welcoming the Stranger"
 morrigen_legacy_1_name: "House of the Crow"
 morrigen_legacy_2_name: "Black Wings Over Crow’s Nest"
 morrigen_legacy_3_name: "Stag, Star & Dragon"
 morrigen_legacy_4_name: "Harbingers of the Last Light"
 morrigen_legacy_5_name: "Crow Guard" 
 
 MORRIGEN_CROW_NO_BULLETTAB:0 "\nHouse Morrigen is the House of the Crow, watchful, clever, and unyielding. Like the bird on our banner, we soar high in thought and strike swiftly when needed. \n#weak Vigilant and adaptable, we thrive in shadow and storm alike."
 MORRIGEN_NEST_NO_BULLETTAB:0 "\nCrows Nest, our ancestral castle perched on jagged cliffs. Its towers sweep the seas and skies, a sentinel over land and tide. From these heights, we guard our people and legacy. \n#weak Our presence as unyielding and watchful as the crows that circle our walls."
 MORRIGEN_DRAGON_NO_BULLETTAB:0 "\nDickon and the Bastard of Blackhaven were slain by the dragonflame of Meraxes while leading the vanguard of Argilac during the Last Storm. Damon Morrigen, called Damon the Devout, was a pious knight from House Morrigen who was a devout member of the Warrior's Sons. Gyles Morrigen was a knight from House Morrigen. He served in the Kingsguard as Lord Commander during the reign of King Jaehaerys I Targaryen. \n#weak We have served Stag, Star and Dragon alike, always loyaly, always bravely."
 MORRIGEN_LIGHT_NO_BULLETTAB:0 "\nWe are the harbingers of the Last Light, guiding the lost and honoring the stranger, as our words command. In shadowed halls and storm-lashed lands, we offer vigilance, protection, and counsel. Our deeds prepare the realm for what comes. \n#weak Foresight, mercy, and unwavering dedication to duty and omen alike."
 MORRIGEN_GUARD_NO_BULLETTAB:0 "\nThe Crow Guard, elite heavy infantry sworn to our banner. Clad in black steel and disciplined to precision, they defend Crows Nest and strike with unrelenting force. \n#weakOur [heavy_infantry|E] are the peril of every foe.\n#weak Enables recruitment of [GetMaA('morrigen_crow_guard').GetName] as [men_at_arms|E].#!"
 
