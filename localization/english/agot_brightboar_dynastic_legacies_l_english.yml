l_english:

 #ROWAN
 rowan_legacy_track_name: "Rowan"
 rowan_legacy_track_desc: "Unwithering Resolve"
 rowan_legacy_1_name: "Marshalls of the Northmarch"
 rowan_legacy_2_name: "Knightly upbringing"
 rowan_legacy_3_name: "Bountiful Orchards"
 rowan_legacy_4_name: "Green Seeds, Golden Leaves"
 rowan_legacy_5_name: "Knights of the Golden Tree"
 
 ROWAN_MARSHALLS_OF_THE_NORTHMARCH_NO_BULLETTAB:0 "\nHouse Rowans dominions extend all along the Reach' northern borders. The Rowans were made Marshall of the Northmarch to replace the declining House Osgrey, now their bannermen. \n#weak House Rowan guards the border with Unwithering Resolve."
 ROWAN_KNIGHTLY_UPBRINGING_NO_BULLETTAB:0 "\nThe children of House Rowan are raised beneath the boughs of Goldengrove, where the air smells of oak and old honour. From their earliest days, they are taught the songs of glory and the weight of duty, their lullabies the clash of steel and tales of heroes past. Their lessons are carved into them like names in bark: never bend in cowardice, never break in fear.\n#weak A Rowan child learns to stand tall as an oak, and yield only to wisdom."
 ROWAN_BOUNTIFUL_ORCHARDS_NO_BULLETTAB:0 "\nGoldengrove has long been a land of bounty, where the earth gives freely and the blood of House Rowan runs rich and strong. The orchards bear heavy with fruit, and so too does our noble line; generation upon generation of sons and daughters born beneath the golden leaves. Our halls echo with life and laughter, our harvests fill carts and cups from Oldtown to Bitterbridge.\n#weak The blood of House Rowan flows like ripe cider; sweet, strong, and never scarce."
 ROWAN_GREEN_GOLD_NO_BULLETTAB:0 "\nHouse Rowan can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Rowan_6').GetFirstNameNicknamed]. Through her house Rowan can claim ancestry over [GetScriptedCharacterByHistoryID('Lannister_29').GetFirstNameNicknamed], the seeds of the Golden Tree do not only bear Golden Leaves; they give rise to lions, crowned in gold and rooted in glory. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 ROWAN_GOLDEN_TREE_KNIGHTS_NO_BULLETTAB:0 "\nThe Knights of the Golden Tree are known for both their bravery in battle and their chivalrous nature. \n#weak [heavy_cavalry|E] is king in the fertile fields of the Reach.\n#weak Enables recruitment of [GetMaA('rowan_knights_of_the_golden_tree').GetName] as [men_at_arms|E].#!"
 
 #WEBBER
 webber_legacy_track_name: "Webber"
 webber_legacy_track_desc: "We Spin the Steel"
 webber_legacy_1_name: "Rulers of the Coldmoat"
 webber_legacy_2_name: "House of the Spider"
 webber_legacy_3_name: "Sworn to Goldengrove"
 webber_legacy_4_name: "Northmarcher Philosophy"
 webber_legacy_5_name: "Lords of the Horseshoe Hills"
 
 WEBBER_COLDMOAT_RULERS_NO_BULLETTAB:0 "\nEver since [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] stripped House [GetScriptedCharacterByHistoryID('Osgrey_7').GetDynastyHouseName] of the [GetTitleByKey('c_coldmoat').GetBaseName], we have served as stewards of the [GetTitleByKey('b_coldmoat').GetBaseNameNoTier], greatest of the Castles of the Northmarch. \n#weak House Webber guards the Northmarch."
 WEBBER_SPIDER_HOUSE_NO_BULLETTAB:0 "\nThe Spider, in its web, isnt just House [GetScriptedCharacterByHistoryID('Webber_30').GetDynastyHouseName] sigil, it embodies the Nature of our House. From a young age the Heirs of our House are taught the ways of the Spider, spinning their own spy networks even at the youngest of ages. \n#weak Doubles the amount of spies that can be recruited without penalty."
 WEBBER_SWORN_TO_GOLDENGROVE_NO_BULLETTAB:0 "\nSince the Fall of House [GetScriptedCharacterByHistoryID('Osgrey_7').GetDynastyHouseName] in the Fields of Fire, at the hands of [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] and the Dragons of House [GetScriptedCharacterByHistoryID('Targaryen_27').GetDynastyHouseName]. Our House was Sworn to House [GetScriptedCharacterByHistoryID('Rowan_6').GetDynastyHouseName], who we have served faithfully ever since. \n#weak House [GetScriptedCharacterByHistoryID('Webber_30').GetDynastyHouseName] Loyaly serves House [GetScriptedCharacterByHistoryID('Rowan_6').GetDynastyHouseName]."
 WEBBER_NORTHMARCH_PHILOSOPHY_NO_BULLETTAB:0 "\nWhilst members of our House are raised in the ways of Spycraft, we are also raised as Sentries of [GetTitleByKey('k_the_reach').GetBaseNameNoTier], the primary line of defense of the Bountiful [GetTitleByKey('k_the_reach').GetBaseName] against any and all foes coming from the North. We learn the terrain of the Northmarch our entire Childhood and train with our troops to create the most useful defensive Bannermen for House [GetScriptedCharacterByHistoryID('Rowan_6').GetDynastyHouseName]. \n#weak We are the first and last line of defense."
 WEBBER_HORSESHOE_HILLS_NO_BULLETTAB:0 "\nThe Horseshoe Hills are a series of hills in [GetTitleByKey('k_the_reach').GetBaseNameNoTier]. They form a defensive line that we can utilise against any invading army, but more importantly, these hills can be used to grow Wine, so we can brew our Lands famous Brandy. \n#weak These Hills are our Home, we know how to develop them."
 
 #OSGREY
 osgrey_legacy_track_name: "Osgrey"
 osgrey_legacy_track_desc: "Stand Fast, Stand Firm"
 osgrey_legacy_1_name: "Legacy of the Little Lion"
 osgrey_legacy_2_name: "Proud House Osgrey"
 osgrey_legacy_3_name: "Punishment as Landed Gentry"
 osgrey_legacy_4_name: "Old Marshalls of the Northmarch"
 osgrey_legacy_5_name: "Supporters of the Faith Militant"
 
 OSGREY_LITTLE_LION_NO_BULLETTAB:0 "\nSince [GetScriptedCharacterByHistoryID('Osgrey_12').GetCharacterViewNameNicknamed] slew [GetScriptedCharacterByHistoryID('Lannister_59').GetCharacterViewNameNicknamed] at the Red Lake, our House has been known for despite being the weaker foe defeating our enemies non the less. \n#weak We are the House of the Little Lion."
 OSGREY_PERWYN_LEGACY_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Osgrey_7').GetCharacterViewNameNicknamed] was the greatest Lord our House has ever seen, his crowining achievement being the construction of the Coldmoat. He serves as an inspiration for us, and fuels our wishes to regain the Glory & Vigor we lost at the hands of [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] and earlier at the hands of his father [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed]. \n#weak We shall strive to achive the Glory of [GetScriptedCharacterByHistoryID('Osgrey_7').GetCharacterViewNameNicknamed]."
 OSGREY_LANDED_GENTRY_NO_BULLETTAB:0 "\nFor his support of the Poor Fellows and the Warrior's Sons during [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] rule, [GetScriptedCharacterByHistoryID('Osgrey_25').GetCharacterViewNameNicknamed] was stripped of the Coldmoat and forced to take the Black. It is the darkest day of our House since our Fall at the Field of Fire. \n#weak It has taught us the values of properly trained Knights."
 OSGREY_OLD_NORTHMARCH_MARSHALL_NO_BULLETTAB:0 "\nFor at least 1000 years before the Conquest House [GetScriptedCharacterByHistoryID('Osgrey_7').GetDynastyHouseName] served as the Marshalls of the Northmarch for House [GetScriptedCharacterByHistoryID('Gardener_1').GetDynastyHouseName]. Never once betraying them and together with them taking the fall at the Field of Fire \n#weak House [GetScriptedCharacterByHistoryID('Osgrey_7').GetDynastyHouseName] falls and rises with House [GetScriptedCharacterByHistoryID('Gardener_1').GetDynastyHouseName]."
 OSGREY_FAITH_MILITANT_NO_BULLETTAB:0 "\nWhilst [GetScriptedCharacterByHistoryID('Osgrey_25').GetCharacterViewNameNicknamed] story is one of sorrow and loss for our House, it represents the nature of our House. We have always been supporters of the Faith Militant and the High Septon over any other Force. Be it House [GetScriptedCharacterByHistoryID('Gardener_1').GetDynastyHouseName] or House [GetScriptedCharacterByHistoryID('Targaryen_31').GetDynastyHouseName] to House [GetScriptedCharacterByHistoryID('Osgrey_7').GetDynastyHouseName] the High Septon is Supreme. \n#weak Our [heavy_infantry|E] are trained to fight the [heavy_cavalry|E] of House Rowan and the Westerlands.\n#weak Enables recruitment of [GetMaA('osgrey_faith_militant').GetName] as [men_at_arms|E].#!"
 
 #CRANE
 crane_legacy_track_name: "Crane"
 crane_legacy_track_desc: "Grace In Flight"
 crane_legacy_1_name: "Heirs to Garth 'Greenhand'"
 crane_legacy_2_name: "House of the Crane"
 crane_legacy_3_name: "High Flying Aspirations"
 crane_legacy_4_name: "Rulers of the Red Lake"
 crane_legacy_5_name: "Crane Warriors"
 
 CRANE_GREEN_CRANE_NO_BULLETTAB:0 "\nHouse Crane can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Crane_7').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 CRANE_CRANE_SKINCHANGERS_NO_BULLETTAB:0 "\nThe Founder of our House the legendary [GetScriptedCharacterByHistoryID('Crane_7').GetFirstNameNicknamed] supposidly could turn into a Crane at will, and it is rumoured that the Women of our House rarely can inherit this ability. \n#weak True or not the Rumour of our Women being Skinchangers alone benefits our House."
 CRANE_ELLARD_ASPIRATIONS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Crane_22').GetCharacterViewNameNicknamed] was among the group of squires who kept company with [GetScriptedCharacterByHistoryID('Targaryen_50').GetCharacterViewNameNicknamed]. The princess fell out with Ellard after he kissed her on the lips without her leave. \n#weak Just like Ellard, all members of House [GetScriptedCharacterByHistoryID('Crane_22').GetDynastyHouseName] have enormous aspirations, like marrying a princess."
 CRANE_RED_LAKE_NO_BULLETTAB:0 "\nOur House Seat Red Lake, is named after the Lake of the same name situated to the South of our Seat. When [GetScriptedCharacterByHistoryID('Crane_7').GetFirstNameNicknamed] settled down at the Red Lake, it was a vaste Blue Lake, but her Legendary Brother [GetScriptedCharacterByHistoryID('Gardener_3').GetFirstNameNicknamed] brought all of the Gigants of the Reach to Red Lake and put them all to the Blade, for ever changing the colour of the Lake from Blue to Red. \n#weak At the Seat of our House the Giants of the Reach found their end, forever changing the region and our lake."
 CRANE_SWORN_REACH_NO_BULLETTAB:0 "\nHouse Crane and our lands at the Red Lake, has long been the battleground between the Westerlands and the Reach, due to that we have developed warriors purely to combat the onslaught of enemy [heavy_cavalry|E]. \n#weak [spearmen|E] are the natural counters to the Cavalry of the Westerlands.\n#weak Enables recruitment of [GetMaA('crane_claws').GetName] as [men_at_arms|E].#!"
 
 #OAKHEART
 oakheart_legacy_track_name: "Oakheart"
 oakheart_legacy_track_desc: "Our Roots Go Deep"
 oakheart_legacy_1_name: "The Green Oak"
 oakheart_legacy_2_name: "Sworn Enemies of Dorne"
 oakheart_legacy_3_name: "Lords of Old Oak"
 oakheart_legacy_4_name: "Progenitor of Chivalry"
 oakheart_legacy_5_name: "Oaken Shields"
 
 OAKHEART_GREEN_OAK_NO_BULLETTAB:0 "\nHouse Oakheart can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his son [GetScriptedCharacterByHistoryID('Oakheart_5').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 OAKHEART_ENEMIES_OF_DORNE_NO_BULLETTAB:0 "\nDuring the First Dornish War, [GetScriptedCharacterByHistoryID('Cafferen_13').GetCharacterViewNameNicknamed] was to be wed to [GetScriptedCharacterByHistoryID('Oakheart_19').GetCharacterViewNameNicknamed], daughter of [GetScriptedCharacterByHistoryID('Oakheart_15').GetCharacterViewNameNicknamed]. At the wedding, the notorious [GetScriptedCharacterByHistoryID('Wyl_21').GetCharacterViewNameNicknamed] led attackers that slew Lord Oakheart and most of the guests. [GetScriptedCharacterByHistoryID('Oakheart_19').GetCharacterViewNameNicknamed] and her handmaids were carried off and sold to a Myrish slaver. \n#weak Since before the actions of [GetScriptedCharacterByHistoryID('Wyl_21').GetCharacterViewNameNicknamed] House Oakheart has been a sworn enemy of Dorne, fighting them for centuries."
 OAKHEART_OLD_OAK_NO_BULLETTAB:0 "\nSince the Age of Heroes house Oakheart has had its seat at [GetTitleByKey('b_old_oak').GetBaseNameNoTier], we have been Kings and Lords of Old Oak ever since [GetScriptedCharacterByHistoryID('Oakheart_5').GetFirstNameNicknamed] built the first part of our mighty seat. From Old Oak we control a significant portion of the Ocean Road, spanning from the [GetTitleByKey('c_summer_cove').GetBaseNameNoTier] all the way to the [GetTitleByKey('c_clickingmoor').GetBaseNameNoTier]. Due to this we are often referred to as the Lords of the Ocean Road, despite our official title being the Lord of Old Oak. \n#weak The Wealth of the Ocean Road, greatly benefits our House."
 OAKHEART_ORIGIN_CHIVALRY_NO_BULLETTAB:0 "\nThe founder of our house [GetScriptedCharacterByHistoryID('Oakheart_5').GetFirstNameNicknamed] was a half giant, and his height is rumoured to have been ten feet tall. Whilst we his heirs arent quite as tall as he was, our House is taller than all others. He is also said to have been the man who brought chivalry to Westeros, through his many chivalrous actions in life, marking the start of knighthood and chivalry in Westeros. \n#weak The [GetTrait('giant').GetName(GetNullCharacter)] [congenital|E] [trait|E] becomes more common in our Dynasty."
 OAKHEART_OAK_SHIELDS_NO_BULLETTAB:0 "\nFor our numerous campaigns in Dorne, we have developed a specialised fighting style, utlising Heavily Armoured Footmen, armed with swords and massive Oaken Shields to protect them from Dornish Cavalry and arrows. Guided by rigid organisation and troop movement to prevent ourselves from being caught off guard. \n#weak Our [heavy_infantry|E] are trained to fight in Dorne.\n#weak Enables recruitment of [GetMaA('oakheart_oak_shields').GetName] as [men_at_arms|E].#!"
 
 #BALL
 ball_legacy_track_name: "Ball"
 ball_legacy_track_desc: "Hot Blooded"
 ball_legacy_1_name: "House of Wrath"
 ball_legacy_2_name: "Unwavering Loyalty"
 ball_legacy_3_name: "The Foxes Ball"
 ball_legacy_4_name: "Lords of Woodbine"
 ball_legacy_5_name: "Woodbine Hunters"
 
 BALL_WRATH_NO_BULLETTAB:0 "\nThe words of our House are not just words, they are a testiment to our nature. Members of House Ball have been denoted to be quick to anger and easily displeased, making for a house of brilliant warriors yet not living up to our legendary ancestor [GetScriptedCharacterByHistoryID('Gardener_2').GetCharacterViewNameNicknamed] cunning and decietful nature. \n#weak The [GetTrait('wrathful').GetName(GetNullCharacter)] [personality|E] [trait|E] becomes more common in our Dynasty."
 BALL_LOYAL_BRAVERY_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Ball_16').GetCharacterViewNameNicknamed] served as a lady and companion for [GetScriptedCharacterByHistoryID('Targaryen_36').GetCharacterViewNameNicknamed]. When her queen was attacked by the order of holy sisters while attempting to bathe in the sacred waters of Jonquil's Pool at Maidenpool, Rosamund, like the rest of the queen's ladies, did not hesitate to put herself between the queen and her would-be assassins. \n#weak Like [GetScriptedCharacterByHistoryID('Ball_16').GetCharacterViewNameNicknamed] the members of our House are fiercly loyal until death."
 BALL_FOXES_BALL_NO_BULLETTAB:0 "\nHouse Ball can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Gardener_2').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 BALL_LORDS_OF_WOODBINE_NO_BULLETTAB:0 "\nSince the Age of Heroes house Ball has had its seat at [GetTitleByKey('b_woodbine').GetBaseNameNoTier], whilst not a traditional House Seat, it is the Seat of our House and serves as a gathering place for our realms Hunters, primarily made up of the proud members of House Ball. \n#weak The Lush Forests of Woodbine provide what we need."
 BALL_WOODBINE_HUNTERS_NO_BULLETTAB:0 "\nDue to our Realms Lush Forests and large amount of Game and other wild animals, we attract some of the northern Reaches greatest hunters. Whilst they pale in comparison to the Hunters of House [GetScriptedCharacterByHistoryID('Tarly_8').GetDynastyHouseName] they are non the less brilliant Hunters. \n#weak Our [archers|E] are the most skilled Hunters of Woodbine.\n#weak Enables recruitment of [GetMaA('ball_woodbine_hunters').GetName] as [men_at_arms|E].#!"
 
 #PEAKE
 peake_legacy_track_name: "Peake"
 peake_legacy_track_desc: "We Three Stand"
 peake_legacy_1_name: "Starpike, Whitegrove, &  Dustonbury"
 peake_legacy_2_name: "Marcher Lords"
 peake_legacy_3_name: "Reach Court Intrigue"
 peake_legacy_4_name: "The Foxes Castle"
 peake_legacy_5_name: "Peake Pikes"
 
 PEAKE_THREE_CASTLES_NO_BULLETTAB:0 "\nEver since we drove House [GetScriptedCharacterByHistoryID('Manderly_13').GetDynastyHouseName] from their ancestral seat of Dustonbury our House has ruled from three of the mightyest castles of the Reach. Starpike our ancestral home, the magnificent Whitegrove and the Manderlys glimering White Bastion of Dustonbury greatest of our Castles. These castles not only define our Realm but they define who we are, they are our identity. \n#weak Just like our Three Castles we Stand Mighty and tall."
 PEAKE_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 PEAKE_COURT_INTRIGUE_NO_BULLETTAB:0 "\nNear the end of the long reign of [GetScriptedCharacterByHistoryID('Gardener_52').GetCharacterViewNameNicknamed], a problem arose with the succession as Garth had sired no sons and only daughters, [GetScriptedCharacterByHistoryID('Gardener_53').GetCharacterViewNameNicknamed] had married [GetScriptedCharacterByHistoryID('Manderly_13').GetCharacterViewNameNicknamed], and [GetScriptedCharacterByHistoryID('Gardener_54').GetCharacterViewNameNicknamed] had married [GetScriptedCharacterByHistoryID('Peake_14').GetCharacterViewNameNicknamed]. Both lords were determined that their own wife should succeed to the throne, and the rivalry between them was marked by betrayal, conspiracy and murder, and finally escalated into open war with other lords joining the cause on both sides. \n#weak Just like the intrigue and later war between [GetScriptedCharacterByHistoryID('Manderly_13').GetCharacterViewNameNicknamed] and [GetScriptedCharacterByHistoryID('Peake_14').GetCharacterViewNameNicknamed] there have been many cases where the intrigue at court was more important than managing our own Domain."
 PEAKE_FOXES_CASTLE_NO_BULLETTAB:0 "\nHouse Peake can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Gardener_2').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 PEAKE_PEAK_PIKES_NO_BULLETTAB:0 "\nJust like other Marcher Lords we boast the same skilled Longbowmen trained to fight in the Dornish Marches, but whilst the other Lords specialise on ranged combat we have sired a secondary fighting force specialised to break the lines of the charging Dornish [heavy_cavalry|E]. \n#weak [spearmen|E] are the natural counters to the Cavalry of the Dornish.\n#weak Enables recruitment of [GetMaA('peake_pikes').GetName] as [men_at_arms|E].#!"
 
 #FLORENT
 florent_legacy_track_name: "Florent"
 florent_legacy_track_desc: "Masked in Cunning"
 florent_legacy_1_name: "Heritage of Florys the Fox"
 florent_legacy_2_name: "The Foxes House"
 florent_legacy_3_name: "The Superior Claim"
 florent_legacy_4_name: "Sly as a Fox"
 florent_legacy_5_name: "The Foxes Messengers"
 
 FLORENT_FLORYS_THE_FOX_HERITAGE_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Gardener_2').GetFirstNameNicknamed] was the legendary daughter of [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed] and the cleverest of his children. According to myth, she kept three husbands, each ignorant of the existence of the other two. Her sons became the founders of House [GetDynastyByID('dynn_Florent').GetName], House [GetDynastyByID('dynn_Ball').GetName] and House [GetDynastyByID('dynn_Peake').GetName].\n#weak Some Florents are as sly as a fox."
 FLORENT_FOXES_HOUSE_NO_BULLETTAB:0 "\nHouse Florent can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Gardener_2').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 FLORENT_SUPERIOR_CLAIM_NO_BULLETTAB:0 "\nHouse Florent boasts they have a superior claim to Highgarden than House [GetScriptedCharacterByHistoryID('Tyrell_40').GetDynastyHouseName] because of closer blood ties to House [GetScriptedCharacterByHistoryID('Gardener_1').GetDynastyHouseName], the extinct Kings of [GetTitleByKey('e_the_reach').GetBaseNameNoTier]. \n#weak We can boast a superior claim to the Reach over House Tyrell"
 FLORENT_SLY_FOX_NO_BULLETTAB:0 "\nJust like our legendary ancestor [GetScriptedCharacterByHistoryID('Gardener_2').GetFirstNameNicknamed] all members are to some degree as sly as a Fox. Whilst some are gifted more than others, our entire house boast itself with truly sly members of our House. \n#weak House Florent is masked in cunning."
 FLORENT_FOXES_MESSENGERS_NO_BULLETTAB:0 "\nDue to our century long connection to the Court of the Kings of the Reach, we have developed the supreme messengers, specialised in delivering our messages to Highgarden swiftly and efficiently. They double as an efficient retinue of [light_cavalry|E] to serve our House as loyal [men_at_arms|E]. \n#weak [light_cavalry|E] are faster than their [heavy_cavalry|E] counterparts, and thereby more effective in persuing the enemy.\n#weak Enables recruitment of [GetMaA('florent_foxes_messengers').GetName] as [men_at_arms|E].#!"
 
 #TARLY
 tarly_legacy_track_name: "Tarly"
 tarly_legacy_track_desc: "First in Battle"
 tarly_legacy_1_name: "The Hunter and the Horn"
 tarly_legacy_2_name: "The Tarly Huntsmen"
 tarly_legacy_3_name: "Kings of the Western Marches"
 tarly_legacy_4_name: "Marcher Lords"
 tarly_legacy_5_name: "Lords of Horn Hills"
 
 TARLY_HUNTER_HORN_NO_BULLETTAB:0 "\nHouse Tarly is a noble house of First Men origin from the Age of Heroes. The Tarlys claim descent from twin sons of [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], [GetScriptedCharacterByHistoryID('Tarly_8').GetFirstNameNicknamed] and [GetScriptedCharacterByHistoryID('Hunt_8').GetFirstNameNicknamed]. They built their castle atop Horn Hill and took to wife the beautiful woods witch who dwelled there, sharing her favors for a hundred years. The brothers did not age so long as they had intercourse with her whenever the moon was full. \n#weak Whilst we dont have the abilities of our pregenitors to extend our lives endlessly, we are off their Blood."
 TARLY_HUNTERS_NO_BULLETTAB:0 "\nDuring the reign of [GetScriptedCharacterByHistoryID('Targaryen_30').GetFirstNameNicknamed] [GetScriptedCharacterByHistoryID('Targaryen_30').GetDynastyHouseName], [GetScriptedCharacterByHistoryID('Tarly_22').GetFirstNameNicknamed] was among the marcher lords who participated in the Vulture Hunt. After the Vulture King's lines shattered, his army was broken and his host fled. The hunt for these fleeing rebels became known as "the Vulture Hunt". The Vulture King himself was captured alive and tied naked between two posts, where he was left to die. \n#weak Just like [GetScriptedCharacterByHistoryID('Tarly_22').GetFirstNameNicknamed] the members of our House are great Hunters, no matter the nature of the Prey. \n#weak Our [archers|E] are the most skilled Hunters of House Tarly.\n#weak Enables recruitment of [GetMaA('tarly_huntsmen').GetName] as [men_at_arms|E].#!"
 TARLY_KINGS_WESTERN_MARCHES_NO_BULLETTAB:0 "\nWhilst we havent been Kings in our own right since House [GetScriptedCharacterByHistoryID('Gardener_1').GetDynastyHouseName] of Highgarden united the Western Marches to the Reach proper, along with the Kingdom of the High Tower and the Kingdom of the Arbor, to form the Kingdom of the Reach. We were Kings in our own right in the Age of the Hundred Kingdoms, our Kingdom the Kingdom of the Western Marches extended from Horn Hill to Nightsong. \n#weak Whilst our days as Kings are long gone, the prestige of once having been Kings still has not faded. Neither has the memory of our once lost Kingdom."
 TARLY_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 TARLY_OF_THE_HORN_NO_BULLETTAB:0 "\nAccording to legend, the castle was built on Horn Hill by the brothers [GetScriptedCharacterByHistoryID('Tarly_8').GetFirstNameNicknamed] and [GetScriptedCharacterByHistoryID('Hunt_8').GetFirstNameNicknamed], twin sons of [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed]. Located on an eponymous hill, the castle lies south of Highgarden and a hundred leagues northeast of Oldtown among the thickly-wooded foothills of the Red Mountains. Horn Hill's walls are less formidable than the city walls of Oldtown. A pond lies below the castle, and the woods around Horn Hill are teeming with game. \n#weak Horn Hill has served as the Seat of our House since it was built by the pregenitors of our House."
 
 #FOSSOWAY
 fossoway_legacy_track_name: "Fossoway"
 fossoway_legacy_track_desc: "A Taste of Glory"
 fossoway_legacy_1_name: "The Cider Flows Sweet"
 fossoway_legacy_2_name: "Lords of Cider Hall"
 fossoway_legacy_3_name: "Foss the Archer"
 fossoway_legacy_4_name: "The Cockleswhent and the Mander"
 fossoway_legacy_5_name: "The Amber Wardens"
 
 FOSSOWAY_CIDER_FLOW_NO_BULLETTAB:0 "\nJust like the motto of our Cidery, the Blood of house Fossoway also runs Sweet, as Sweet as the Cider produced in our Cider Mills all around our lands. Many have even likened the way that the sons and daughters of house Fossoway behave, is mirrored in the Cider made during their parents reign. \n#weak The Trusting [personality|E] [trait|E] becomes more common."
 FOSSOWAY_CIDER_HALL_NO_BULLETTAB:0 "\nEver since the Age of Heroes, Cider Hall has been the Seat of our glorious House. Whilst Cider Hall is not the Seat of the greatest, or the strongest or the wealthiest House, we are just like our Seat formidable enough and the location of Cider Hall between the Cockleswhent and Mander has made it the ideal place to grow Apples for our Cider.  \n#weak Our Seat is named after our Apple Cider, or is Cider named after our Seat."
 FOSSOWAY_FOSS_ARCHER_NO_BULLETTAB:0 "\nHouse Fossoway can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his son [GetScriptedCharacterByHistoryID('Fossoway_8').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 FOSSOWAY_COCKLESWHENT_MANDER_NO_BULLETTAB:0 "\nPart of the Reach proper, the Mander has its source in hills near Tumbleton in the northeastern Reach near King's Landing. The river flows southwest past Bitterbridge, where it is crossed by the roseroad. After Bitterbridge, the Mander meets the Blueburn near Longtable and then the Cockleswhent near Cider Hall. \n#weak The Cockleswhent is a vassal stream of the river Mander in the Reach and just like the Cockleswhent is a vassal of the Mander, are we a vassal of Highgarden."
 FOSSOWAY_AMBER_WARDENS_NO_BULLETTAB:0 "\nWhilst our Cider may not be as valuable as Gold, or the Amber that its colour so resembles, it is still highly valuable and sought after. Thus we have established a retinue of Heavily Armoured Horsemen to protect our Cider, and also Cider Hall itself. \n#weak [heavy_cavalry|E] is king in the fertile fields of the Reach.\n#weak Enables recruitment of [GetMaA('fossoway_amber_wardens').GetName] as [men_at_arms|E].#!"
 
 #BEESBURY
 beesbury_legacy_track_name: "Beesbury"
 beesbury_legacy_track_desc: "Beware our Sting"
 beesbury_legacy_1_name: "Our Bees"
 beesbury_legacy_2_name: "Tiny wings, mighty will"
 beesbury_legacy_3_name: "Ellyn Ever Sweet"
 beesbury_legacy_4_name: "Lords of Honeyholt"
 beesbury_legacy_5_name: "The Busy Bee"
 
 BEESBURY_BEES_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Beesbury_8').GetFirstNameNicknamed], the legendary founder of House Beesbury, is said to have loved honey so much she sought out the King of the Bees in his vast mountain hive and made a pact to care for his children and his children's children for all time, becoming the first beekeeper. \n#weak Our [heavy_infantry|E] are the perfect Beekeepers.\n#weak Enables recruitment of [GetMaA('beesbury_bee_keepers').GetName] as [men_at_arms|E].#!"
 BEESBURY_TINY_WINGS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Beesbury_18').GetFirstNameNicknamed], the Bastard of Beesbury, was one of the seven Warrior's Sons to face [GetScriptedCharacterByHistoryID('Targaryen_31').GetFirstNameNicknamed] and his six champions in a trial of seven. [GetScriptedCharacterByHistoryID('Beesbury_22').GetFirstNameNicknamed] was a favorite of [GetScriptedCharacterByHistoryID('Targaryen_51').GetFirstNameNicknamed]. After he was embroiled in a scandal with the princess, [GetScriptedCharacterByHistoryID('Targaryen_35').GetFirstNameNicknamed] sentenced Braxton to mutilation. Allowed to choose a trial by combat as a knight, Braxton was slain in a duel with Jaehaerys. \n#weak Just like Braxton and Dickon, the men of our House are known to be exceptional Knights and fighters."
 BEESBURY_ELLYN_SWEET_NO_BULLETTAB:0 "\nHouse Beesbury can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his daughter [GetScriptedCharacterByHistoryID('Beesbury_8').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 BEESBURY_HONEYHOLT_NO_BULLETTAB:0 "\nEver since the Age of Heroes, Honeyholt has been the Seat of our glorious House. It not only serves as our Seat but as a constant reminder of the pact forged between our house and the King of the Bees. Surrounded by vaste Apiaries and flower fields, Honeyholt is situated perfectly along the Honeywine and its fertile lands, granting us a small yet wealthy realm. \n#weak  It is situated along the eastern bank of the Honeywine river between Brightwater Keep and Oldtown."
 BEESBURY_BUSY_BEE_NO_BULLETTAB:0 "\nJust like our Bees the members of our honourable House are busy and diligent workers. Working day and night, even working themselves to death, we are a small house but we work diligently and tirelessly, not resting until our task has been fullfilled. One Might even say that our qualities make us the perfect house to serve as Masters of Coin, for either the Lords of Highgarden, Oldtown or even the Kings of the Iron Throne. \n#weak The Diligent [personality|E] [trait|E] becomes more common."
 
 #BULWER
 bulwer_legacy_track_name: "Bulwer"
 bulwer_legacy_track_desc: "Death Before Disgrace"
 bulwer_legacy_1_name: "Blood of Bors the Breaker"
 bulwer_legacy_2_name: "Death Before Disgrace"
 bulwer_legacy_3_name: "Lords of Blackcrown"
 bulwer_legacy_4_name: "Legacy of Garth Greenhand"
 bulwer_legacy_5_name: "Blackcrown Knights"
 
 BULWER_BORS_BLOOD_NO_BULLETTAB:0 "\nAccording to legend, [GetScriptedCharacterByHistoryID('Bulwer_6').GetFirstNameNicknamed] gained the strength of twenty men by drinking only bull's blood. Some tales state Bors drank so much blood he grew a pair of shiny black horns. Whilst members of our House do not consume the blood of Bulls like the legendary founder of our House did, his blood runs thick in our veins, and many members of our House have been noted to be as strong as at least 5 men.  \n#weak The Herculean [congenital|E] [trait|E] becomes more common."
 BULWER_DEATH_DISGRACE_NO_BULLETTAB:0 "\nThe Words of our House are enscribed into the minds of every single one of the children of our mighty House, from the moment they are born they are taught the relentless drive of combat, a member of House Bulwer does not retreat, does not surrender, does not cower in fear, we stare death in its eyes and laugh at it. \n#weak DEATH BEFORE DISGRACE!"
 BULWER_BLACKCROWN_NO_BULLETTAB:0 "\nEver since the Age of Heroes, Blackcrown has been the Seat of our mighty House. Blackcrown serves as a sentinel for Oldtown, protecting the city from Raids, or warning the inhabitants of incoming Boats should we not be able to fend them off. Its cliffs are called singing cliffs for the whistle heard from the twisted towers and wind-carved stones standing above the waves. \n#weak It is located on the northern shore of Whispering Sound near Oldtown and Three Towers." 
 BULWER_GARTH_NO_BULLETTAB:0 "\nHouse Bulwer can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his son [GetScriptedCharacterByHistoryID('Bulwer_6').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 BULWER_BLACKCROWN_KNIGHTS_NO_BULLETTAB:0 "\nThe Blackcrown Knights are known for both their bravery in battle and for fighting till the last man, proudly living up to the Words of our House 'Death Before Disgrace'. \n#weak [heavy_cavalry|E] is king in the fertile fields of the Reach.\n#weak Enables recruitment of [GetMaA('bulwer_blackcrown_knights').GetName] as [men_at_arms|E].#!"
 
 #REDWYNE
 redwyne_legacy_track_name: "Redwyne"
 redwyne_legacy_track_desc: "Fruit of the Vine"
 redwyne_legacy_1_name: "Legcay of Gilbert of the Vines"
 redwyne_legacy_2_name: "Arbor Vintners"
 redwyne_legacy_3_name: "The Sommelier Guard"
 redwyne_legacy_4_name: "The Arbor Fleet"
 redwyne_legacy_5_name: "Lords of the Arbor"
 
 REDWYNE_GILBERT_VINES_NO_BULLETTAB:0 "\nHouse Redwyne can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his son [GetScriptedCharacterByHistoryID('Redwyne_11').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 REDWYNE_VINTNERS_NO_BULLETTAB:0 "\nVintners need to be able to experiment with different grape varieties, techniques, and styles, and constantly push the boundaries of winemaking. Additionally, they must possess the ability to make calculated risks, be patient while waiting for results, and trust their own judgment. Thus all children of our House are trained according to these key characteristics of Vintners. \n#weak The Inquisitive [personality|E] [trait|E] becomes more common."
 REDWYNE_SOMMELIERS_NO_BULLETTAB:0 "\nOur Famous Arbor Reds and Golds, are amongst some of the most valuable commodeties of the Seven Kingdoms, thus we must protect them and our island at all cost. Thus our Sommeliers are not only trained in the traditional arts of wine knowledge, food and wine pairings, and wine service, but also in the arts of combat, which effectively has transformed them into a deadly force. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('redwyne_sommelier_guard').GetName] as [men_at_arms|E].#!"
 REDWYNE_FLEET_NO_BULLETTAB:0 "\nOur Fleet commonly known as the Redwyne fleet, is the largest fleet in Westeros, containing two hundred warships and five times as many merchant carracks, wine cogs, trading galleys, and whalers. Our Fleet have protected Oldtown and the Reach from Ironborn Raids, the invading Andals and other threats which have come from the Sea. \n#weak The Arbor rules the Waves."
 REDWYNE_ARBOR_NO_BULLETTAB:0 "\nThe Arbor is a golden island off the southwestern-most part of Westeros. It is considered part of the Reach proper, and is separated from the mainland by the Redwyne Straits. The port town of Ryamsport is located on the island, as are the settlements of Vinetown and Starfish Harbor. Smaller islands in the vicinity of the Arbor include Stonecrab Cay, the Isle of Pigs, the Mermaid's Palace, Horseshoe Rock, and Bastard's Cradle. \n#weak The Arbor and its surrounding isles are an excellent center for shipbuilding."
 
 #GARDENER
 gardener_legacy_track_name: "Gardener"
 gardener_legacy_track_desc: "By Our Hand"
 gardener_legacy_1_name: "Legacy of Garth Greenhand"
 gardener_legacy_2_name: "House of Garth the Gardener"
 gardener_legacy_3_name: "The Golden Reign"
 gardener_legacy_4_name: "House of Highgarden"
 gardener_legacy_5_name: "Kings of the Reach"
 
 GARDENER_LEGACY_GREENHAND_NO_BULLETTAB:0 "\nAccording to some legends, Garth Greenhand was the High King who led the First Men across the Arm of Dorne. Other tales claim he predated the arrival of the First Men, making him not only the first human in Westeros but also the only human, and that he interacted with the children of the forest and giants. In some tales Garth is a god, and in a few of these, the oldest ones, he demands blood sacrifice from his worshippers to ensure a bountiful harvest. In some stories the green god dies every autumn, only to be reborn with the coming of spring. Some tales claim he had green hands, green hair or green skin overall, or antlers like a stag. \n#weak Some members of our House are blessed by 'Green Dreams' believed to come from our blood ties to Garth Greenhand. This allows them to see glimpses of the Future."
 GARDENER_GARTH_GARDENER_NO_BULLETTAB:0 "\nHouse Gardener can trace their descent from the legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], through his son [GetScriptedCharacterByHistoryID('Gardener_4').GetFirstNameNicknamed]. \n#weak To claim descent from a mythical High King of the First Men is neat, but then again, so do several other major Reach houses on both sides of the Mander."
 GARDENER_LEGENDARY_GOLDEN_REIGN_NO_BULLETTAB:0 "\nThe greatest of the Gardeners was King Garth VII Gardener, known as the Goldenhand, for his deeds both in war and in peace. Ascending to the Oakenseat at age twelve, Garth ruled for eighty-one years, of which less than ten were spent at war. As a boy he defeated an invasion of Dornishmen by [GetScriptedCharacterByHistoryID('Fowler_9').GetCharacterViewNameNicknamed], then drove the ironborn from the Misty Islands and fortified them as the Shield Islands with men from the Reach. [GetScriptedCharacterByHistoryID('Gardener_32').GetCharacterViewNameNicknamed]divided an alliance between the King of the Rock and Storm King, defeating both in the Battle of Three Armies, and he dictated the boundaries of their three kingdoms in the aftermath. \n#weak Whilst the days of the Golden Reign are long past us, its legacy still carries on to this day."
 GARDENER_HIGHGARDEN_NO_BULLETTAB:0 "\nHighgarden is located on a broad verdant hill overlooking the Mander. The castle is surrounded by three rings of white stone whose crenellated curtain walls increase in height. Between the outer and middle walls is a famous briar labyrinth which serves to entertain as well as slow invaders. The oldest towers, squat and square, date from the Age of Heroes. Newer towers are tall and slender, round fortifications dating from after the coming of the Andals. \n#weakAccording to legend, the Oakenseat was a living throne carved unto an oak planted by Garth Greenhand himself."
 GARDENER_REACH_KNIGHTS_NO_BULLETTAB:0 "\nWe are the old and famed Kings of the Reach. Beginning with the mythical first [GetScriptedCharacterByHistoryID('Gardener_4').GetFirstNameNicknamed], we have ruled, through war and peace and the assimilation with the Andals through the generations, until the last Gardener king, [GetScriptedCharacterByHistoryID('Gardener_95').GetFirstNameNicknamed], and his kin were killed at the Field of Fire in Aegon's Conquest. Despite this should we call our old Banners to aid once more Hundreds of Knights will flock to our Banners. Our glorious House has even created the Order of the Green Hand, a knightly order many Houses of the Reach proclaim to be a part of until today. \n#weak [heavy_cavalry|E] is king in the fertile fields of the Reach.\n#weak Enables recruitment of [GetMaA('gardener_knights_of_the_reach').GetName] as [men_at_arms|E].#!"
 
 #TYRELL
 tyrell_legacy_track_name: "Tyrell"
 tyrell_legacy_track_desc: "Growing Strong"
 tyrell_legacy_1_name: "Our claim to Highgarden"
 tyrell_legacy_2_name: "Warden of the South"
 tyrell_legacy_3_name: "Lords of Highgarden"
 tyrell_legacy_4_name: "Legacy as High Stewards"
 tyrell_legacy_5_name: "Lord Paramounts of the Mander"
 
 TYRELL_CLAIM_HIGHGARDEN_NO_BULLETTAB:0 "\nRelying on the able counsel of Ser [GetScriptedCharacterByHistoryID('Tyrell_46').GetCharacterViewNameNicknamed], and later Osmund's son Ser [GetScriptedCharacterByHistoryID('Tyrell_47').GetCharacterViewNameNicknamed], and finally Robert's son [GetScriptedCharacterByHistoryID('Tyrell_48').GetCharacterViewNameNicknamed], King Mern ruled well, rebuilding Highgarden and doing much and more to restore the power of the Reach and House Gardener. [GetScriptedCharacterByHistoryID('Gardener_58').GetCharacterViewNameNicknamed] was so pleased with them that he gave Ser Robert the hand of his youngest daughter [GetScriptedCharacterByHistoryID('Gardener_60').GetCharacterViewNameNicknamed] in marriage, thereby allowing the following generations of Tyrells to claim decent from Garth Greenhand. That was the first marriage between the two houses, and nine more unions followed in the passing centuries. \n#weak It is through these marriages that we substantiate our claim to Highgarden."
 TYRELL_WARDEN_SOUTH_NO_BULLETTAB:0 "\nThe Warden of the South is tasked with defending the southern regions of the Seven Kingdoms from invaders. When the title was created during Aegon's Conquest, for instance, the southern realm of Dorne had not yet submitted to House Targaryen. \n#weak Warden of the South is a title traditionally held by our House, on behalf of the Iron Throne. The warden has been responsible for the defense of the southern lands of the Seven Kingdoms since Aegon's Conquest."
 TYRELL_HIGHGARDEN_NO_BULLETTAB:0 "\nHighgarden had been the seat of House Gardener for thousands of years. During Aegon's Conquest, [GetScriptedCharacterByHistoryID('Gardener_95').GetCharacterViewNameNicknamed] faced Aegon's army during the Field of Fire. There, he died with all his sons. [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed]marched his army to Highgarden, where [GetScriptedCharacterByHistoryID('Tyrell_62').GetCharacterViewNameNicknamed], the High Steward, opened the gates of the castle at Aegon's approach, pledging the loyalty of his family to House Targaryen. For this, Aegon named Harlan the Lord of Highgarden, Warden of the South, and Lord Paramount of the Reach, despite the fact that other houses in the Reach had closer blood ties to House Gardener. \n#weak It is the authority of the Targaryen Kings that has placed us upon the Oakenseat of Highgarden."
 TYRELL_REACH_STEWARDS_NO_BULLETTAB:0 "\nOur legacy is that as stewards to House Gardener. Ser [GetScriptedCharacterByHistoryID('Tyrell_40').GetCharacterViewNameNicknamed], the founder of our mighty house, was an Andal knight and adventurer who showed such prowess at arms that he was named the champion and sworn shield of [GetScriptedCharacterByHistoryID('Gardener_43').GetCharacterViewNameNicknamed], the last of the Three Sage Kings. Ser Alester's eldest son [GetScriptedCharacterByHistoryID('Tyrell_41').GetCharacterViewNameNicknamed] also became a notable knight, but died in a tourney. Alester's second son, [GetScriptedCharacterByHistoryID('Tyrell_42').GetCharacterViewNameNicknamed], was of a more bookish bent and never achieved knighthood, choosing instead to serve as a royal steward. He and his son [GetScriptedCharacterByHistoryID('Tyrell_43').GetCharacterViewNameNicknamed] performed their duties so well, the Gardeners made the office of High Steward hereditary. \n#weak The Diligent [personality|E] [trait|E] becomes more common."
 TYRELL_GOLDEN_ROSE_KNIGHTS_NO_BULLETTAB:0 "\nFollowing the defeat and death of [GetScriptedCharacterByHistoryID('Gardener_95').GetCharacterViewNameNicknamed] and his other kin at the Field of Fire during Aegon's Conquest, [GetScriptedCharacterByHistoryID('Tyrell_62').GetCharacterViewNameNicknamed], hereditary high steward of the Reach, surrendered Highgarden to [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed]. As a reward, Harlan was granted the castle along with dominion of the Reach as Lord Paramount of the Mander. Our position as Lord Paramounts of the Mander allows us to Raise large hosts to our Banner and our House can call up hundreds of Knights sworn to Highgarden, many of which are sworn to our House thereby being Knights of the Golden Rose. \n#weak [heavy_cavalry|E] is king in the fertile fields of the Reach.\n#weak Enables recruitment of [GetMaA('tyrell_knights_of_the_golden_rose').GetName] as [men_at_arms|E].#!"
 
 #HIGHTOWER
 hightower_legacy_track_name: "Hightower"
 hightower_legacy_track_desc: "We Light the Way"
 hightower_legacy_1_name: "The Legendary King Uthor of the High Tower"
 hightower_legacy_2_name: "Patrons of the Citadel"
 hightower_legacy_3_name: "Patrons of the Faith of the Seven"
 hightower_legacy_4_name: "The Hightower of Oldtown"
 hightower_legacy_5_name: "Mythical Heritage"
 
 HIGHTOWER_UTHOR_HIGHTOWER_NO_BULLETTAB:0 "\nAccording to legend, [GetScriptedCharacterByHistoryID('Hightower_18').GetCharacterViewNameNicknamed] married [GetScriptedCharacterByHistoryID('Gardener_5').GetCharacterViewNameNicknamed], a daughter of [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed], before she could be claimed by Argoth Stone-Skin, who had won Maris's hand in the first tourney ever held in Westeros. Uthor is credited with commissioning [GetScriptedCharacterByHistoryID('Gardener_3').GetCharacterViewNameNicknamed] or his son [GetScriptedCharacterByHistoryID('Stark_12').GetCharacterViewNameNicknamed] to rebuild the Hightower, turning it from a tall timber tower and a beacon to a structure of stone that rose hundreds feet above the Whispering Sound. \n#weakSome Hightowers are said to have dabbled in alchemy and necromancy."
 HIGHTOWER_CITADEL_NO_BULLETTAB:0 "\nThe origin of the Citadel is disputed, but House Hightower is generally considered to have played an integral role in its foundation. Most accounts on the Citadel's origins credit its foundation to Prince [GetScriptedCharacterByHistoryID('Hightower_20').GetCharacterViewNameNicknamed], the second son of [GetScriptedCharacterByHistoryID('Hightower_18').GetCharacterViewNameNicknamed]. The curious Peremore invited numerous scholars, including wise men, teachers, priests, healers, singers, wizards, alchemists, and sorcerers, to Oldtown. After Peremore's death, his brother, [GetScriptedCharacterByHistoryID('Hightower_19').GetCharacterViewNameNicknamed], granted land alongside the Honeywine to "Peremore's pets", who developed the tract into the maesters' Citadel. \n#weakHouse Hightower continues to be a strong patron of learning and our title as Protector of the Citadel illustrates this."
 HIGHTOWER_FOTS_NO_BULLETTAB:0 "\nThe Faith was brought to Westeros with the coming of the Andals thousands of years ago, and the Faith largely supplanted the local worship of the old gods. Some of the Andal warriors had the seven-pointed star of the Faith carved into their flesh to show their devotion. Although the Andals came late to the Reach, the Hightowers were among the first Westerosi lords to welcome the Andals, considering war bad for trade. [GetScriptedCharacterByHistoryID('Hightower_38').GetCharacterViewNameNicknamed] was the first to accept the Faith. To honor the Seven, he constructed the first sept in Oldtown, and six more elsewhere in his realm. Following his premature death, Septon [GetScriptedCharacterByHistoryID('Most_Devout_1').GetCharacterViewNameNicknamed] became regent for Damon's newborn son, [GetScriptedCharacterByHistoryID('Hightower_39').GetCharacterViewNameNicknamed]. When Robeson eventually died, Triston had the Starry Sept raised in his honor. Oldtown eventually became the center of the Faith, and the Starry Sept home to the High Septon. \n#weak Ever since the coming of the Andals, we House Hightower have been Patrons of the Faith of the Seven."
 HIGHTOWER_TOWER_GUARD_NO_BULLETTAB:0 "\nThe Hightower is a massive stepped tower with a beacon on top to guide ships into port. The color of the beacon's fire is changeable, as green flame can be used to call House Hightower's banners. The labyrinthine square fortress of unadorned black stone at the castle's foundation contains gloomy halls, vaults, and chambers. The Hightower contains a high hall. The top of the tower contains the apartments of the Lord of the Hightower. Deep vaults are located underground. The Hightower is the tallest structure in the Seven Kingdoms, even higher than the seven-hundred-foot Wall, and it is the tallest tower in the known world. The people of Oldtown can tell the time of day by the tower's shadow, and some claim that the Wall can be seen from its top. \n#weak Our [heavy_infantry|E] are the backbone of Oldtowns Guard.\n#weak Enables recruitment of [GetMaA('hightower_the_tower_guard').GetName] as [men_at_arms|E].#!"
 HIGHTOWER_PROUD_HOUSE_NO_BULLETTAB:0 "\nOur House is ancient, existing since the dawn of days when we were petty-kings. While most scholars believe we descend from the First Men, some Maesters posit we descend from the seafarers and traders that settled at the top of the Whispering Sound in an earlier time, men who came to Westeros before the First Men and seem to have founded the original incarnation of Oldtown. Whatever the truth, we resided in the ancient black stone fortress of Battle Isle at the mouth of the Honeywine before the 'Hightower' of stone was built. \n#weak Some members of our House are born extremely proud. \n#weak The Arrogant & Ambitious [personality|E] [trait|E] become more common."
 
 #HUNT
 hunt_legacy_track_name: "Hunt"
 hunt_legacy_track_desc: "No Easy Quarry"
 hunt_legacy_1_name: "Marcher Lords"
 hunt_legacy_2_name: "The Hunt Huntsmen"
 hunt_legacy_3_name: "House of Harlon the Hunter"
 hunt_legacy_4_name: "Prolific Deer Hunters"
 hunt_legacy_5_name: "Knightly House"
 
 HUNT_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 HUNT_HUNTSMEN_NO_BULLETTAB:0 ""\nDuring the reign of [GetScriptedCharacterByHistoryID('Targaryen_30').GetFirstNameNicknamed] [GetScriptedCharacterByHistoryID('Targaryen_30').GetDynastyHouseName], [GetScriptedCharacterByHistoryID('Hunt_23').GetFirstNameNicknamed] was among the marcher lords who participated in the Vulture Hunt. After the Vulture King's lines shattered, his army was broken and his host fled. The hunt for these fleeing rebels became known as "the Vulture Hunt". The Vulture King himself was captured alive and tied naked between two posts, where he was left to die. \n#weak Just like [GetScriptedCharacterByHistoryID('Hunt_23').GetFirstNameNicknamed] the members of our House are great Hunters, no matter the nature of the Prey. \n#weak Our [archers|E] are the most skilled Hunters of House Hunt.\n#weak Enables recruitment of [GetMaA('hunt_huntsmen').GetName] as [men_at_arms|E].#!"
 HUNT_HARLON_THE_HUNTER_NO_BULLETTAB:0 "\nHouse Hunt is a noble house of First Men origin from the Age of Heroes. The Hunts claim descent from the Legendary [GetScriptedCharacterByHistoryID('Gardener_1').GetCharacterViewNameNicknamed] through his son [GetScriptedCharacterByHistoryID('Hunt_8').GetFirstNameNicknamed]. We see ourselves as a lesser brother House of House Tarly, as we both claim decent from Harlon, we have served House Tarly since the Age of Heroes loyaly. Together with his brother [GetScriptedCharacterByHistoryID('Tarly_8').GetFirstNameNicknamed] he built the castle atop Horn Hill and took to wife the beautiful woods witch who dwelled there, sharing her favors for a hundred years. The brothers did not age so long as they had intercourse with her whenever the moon was full. \n#weak Whilst we dont have the abilities of our pregenitors to extend our lives endlessly, we are off their Blood."
 HUNT_DEER_HUNTERS_NO_BULLETTAB:0 "\nOur blazon shows a brown deer, bound and slung on a pole, a symbol that was chosen as our Coat of Arms in the Age of Heroes for our unmatched ability to track and hunt any and all Deers. Our House prides itself in being the best house at hunting deer, with some of the members of our House even boasting the legendary feat of having slayn a White Hart, a legendary and magical animal which only apears once every few decades. \n#weakSilent stalk, sudden strike."
 HUNT_KNIGHTS_NO_BULLETTAB:0 "\nHouse Hunt is not just a brother House to House Tarly, we have been its loyal Bannermen for Centuries, serving loyaly as Knights of House Tarly, more often than not bolstering the formidable Archery lines of House Tarly or assisting them as Knights. This has over generations shaped our House to be an effective and deadly militarised House. \n#weakWe are not a great House, nor are we a big House, but we pride ourselves in having many competent warriors amongst our ranks every generation."
 
 #BARATHEON
 baratheon_legacy_track_name: "Baratheon"
 baratheon_legacy_track_desc: "Ours is the Fury"
 baratheon_legacy_1_name: "Legacy of Orys Baratheon"
 baratheon_legacy_2_name: "Lord Paramounts of the Stormlands"
 baratheon_legacy_3_name: "Close ties to House Targaryen"
 baratheon_legacy_4_name: "Lords of Storm's End"
 baratheon_legacy_5_name: "Decendants of the Storm Kings"
 
 BARATHEON_ORYS_BARATHEON_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed], rumored bastard of [GetScriptedCharacterByHistoryID('Targaryen_26').GetCharacterViewNameNicknamed] and half-brother to [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed], rose from uncertain birth to legendary stature. Aegon's fiercest commander and only true friend, Orys led the charge in the Conquest, defeating Argilac the Arrogant in single combat during the Last Storm. He honored his fallen foe by marrying [GetScriptedCharacterByHistoryID('Durrandon_87').GetCharacterViewNameNicknamed]’s daughter, [GetScriptedCharacterByHistoryID('Durrandon_88').GetCharacterViewNameNicknamed], adopting the Durrandon sigil, words, and legacy; founding House Baratheon. Named Hand of the King, Orys helped shape the new realm but suffered cruelly in the First Dornish War, captured and maimed by House Wyl. Though he lost his sword hand, he never lost his fury. Resigning as Hand, he brooded in Storm’s End, awaiting the chance for justice. That chance came during the Vulture Hunt, where he crushed the Dornish, captured [GetScriptedCharacterByHistoryID('Wyl_22').GetCharacterViewNameNicknamed], and exacted a brutal vengeance. \n#weak The Fickle [personality|E] [trait|E] and the Robust [congenital|E] [trait|E] become more common."
 BARATHEON_LORD_PARAMOUNT_NO_BULLETTAB:0 "\nHouse Baratheon is the youngest of the Great Houses of Westeros. It was created when [GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed], one of [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] generals, his closest companion, and his rumored bastard half-brother, took [GetScriptedCharacterByHistoryID('Durrandon_88').GetCharacterViewNameNicknamed], the only daughter of [GetScriptedCharacterByHistoryID('Durrandon_87').GetCharacterViewNameNicknamed], the last Storm King, to wife. Orys took the sigil and words of House Durrandon for his own and became the first Lord of Storm's End. Through the female line, House Baratheon descents from [GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed], who founded the kingdom of the Storm Kings during the Age of Heroes.\n#weak [heavy_cavalry|E] is adequate in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('baratheon_knights_of_the_stormlands').GetName] as [men_at_arms|E].#!"
 BARATHEON_TARGARYEN_NO_BULLETTAB:0 "\nHouse Baratheon has a long history of intermarriage with House Targaryen, even claiming direct male line decent of the mighty Valyrian House. Many fabled members of House Baratheon can boast about having married Targaryens such as, [GetScriptedCharacterByHistoryID('Baratheon_33').GetCharacterViewNameNicknamed] and [GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed] being a rumoured Targaryen Bastard, we have efficently tied our bloodline to that of the Targaryens and in return they have also married Targaryen women into our mighty House. \n#weak No House is closer to House Targaryen than we are."
 BARATHEON_STORMS_END_NO_BULLETTAB:0 "\nOne of the strongest castles in the realm, Storm's End was once the ancestral seat of the Storm Kings of House Durrandon extending back many thousands of years. The castle is said to be protected by spells woven into its very walls that prevent magic from affecting it or passing through it.\n#weak The mighty fortress called Storm's End has stood for centuries, facing the terrible weather of Shipbreaker Bay with little wear to show for it."
 BARATHEON_DURRANDON_NO_BULLETTAB:0 "\nThe line of the Storm Kings dates back to the Age of Heroes when their kingdom was founded by [GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed], a legendary hero. The First Men warred with Andals when the newcomers invaded the stormlands, but the two peoples eventually made peace and intermarried. The Storm Kings at times ruled much of the eastern half of Westeros, an area reaching from Cape Wrath to the Bay of Crabs. Their dominion was protected from Dorne and the Kingdom of the Reach by the Dornish Marches, and they conquered the riverlands from House Teague.\n#weak Through the female line, House Baratheon descents from King Durran Godsgrief."
 
 #DURRANDON
 durrandon_legacy_track_name: "Durrandon"
 durrandon_legacy_track_desc: "Ours is the Fury"
 durrandon_legacy_1_name: "Bloodline of Elenei the daughter of gods"
 durrandon_legacy_2_name: "Storm's End the Castle defying the gods"
 durrandon_legacy_3_name: "Legacy of Durran Godsgrief"
 durrandon_legacy_4_name: "Stormy like their weather"
 durrandon_legacy_5_name: "Storm Kings"
 
 DURRANDON_GODS_NO_BULLETTAB:0 "\nAccording to legend, in the Age of Heroes, the first Storm King, [GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed], won the love of fair [GetScriptedCharacterByHistoryID('Durrandon_rs_1').GetCharacterViewNameNicknamed]. She gave her maidenhead to him, committing herself to a mortal life. Her divine parents, the Sea god and godess of Wind, forbade their love, but Durran and Elenei wed despite them. The gods' wrath was terrible to behold, destroying Durran's keep on his wedding night, killing all his family and guests. Elenei protected Durran from the storm, however. Enraged, Durran declared war on the gods, who replied by hammering his kingdom with massive storms. Each time Durran built a castle to face the sea, the gods destroyed it. \n#weak The Stubborn [personality|E] [trait|E] and the Robust [congenital|E] [trait|E] become more common."
 DURRANDON_STORMS_END_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed] persisted in building larger and more powerful fortifications, until finally the seventh castle, Storm's End, stayed in place at Durran's Point and resisted the storms of Shipbreaker Bay. Some believe this is because the children of the forest took a hand in its construction; others believe that a young boy, who grew up to be [GetScriptedCharacterByHistoryID('Stark_12').GetCharacterViewNameNicknamed], advised Durran on its construction. The truth of the matter is unknown.\n#weak Storm's End has been called Durran's Defiance."
 DURRANDON_DURRAN_GODSGRIEF_NO_BULLETTAB:0 "\nDurran supposedly ruled for a thousand years. Archmaester Glaive, however, proposed that the "King of a Thousand Years" was in fact a succession of monarchs all bearing the same name. The Storm Kings of old from House Durrandon named their firstborn son and heir after [GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed], complicating the research of maesters. \n#weak Members of House Durrandon, name their firstborn sons after the legendary Durran Godsgrief."
 DURRANDON_STORMLANDER_BLOOD_NO_BULLETTAB:0 "\nThe stormlands are thinly populated compared to most of the Seven Kingdoms, and their people have a reputation for being stormy like their weather. The province is known for its fierce warriors and sailors, and for moss-covered cottages among its rainy woods and green hills. Many smallfolk in the stormlands claim descent from a promiscuous Storm King, [GetScriptedCharacterByHistoryID('Durrandon_37').GetCharacterViewNameNicknamed]. \n#weak The Blood of the Storm Kings runs thick, in us and our people."
 DURRANDON_STORM_KINGS_NO_BULLETTAB:0 "\nThe line of the Storm Kings dates back to the Age of Heroes when their kingdom was founded by [GetScriptedCharacterByHistoryID('Durrandon_1').GetCharacterViewNameNicknamed], a legendary hero. The First Men warred with Andals when the newcomers invaded the stormlands, but the two peoples eventually made peace and intermarried. The Storm Kings at times ruled much of the eastern half of Westeros, an area reaching from Cape Wrath to the Bay of Crabs. Their dominion was protected from Dorne and the Kingdom of the Reach by the Dornish Marches, and they conquered the riverlands from House Teague.\n#weak [heavy_cavalry|E] is adequate in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('durrandon_knights_of_the_storm_kings').GetName] as [men_at_arms|E].#!"
 
 #CARON
 caron_legacy_track_name: "Caron"
 caron_legacy_track_desc: "No Song So Sweet"
 caron_legacy_1_name: "House of Warriors and Singers"
 caron_legacy_2_name: "Marcher Lords"
 caron_legacy_3_name: "Heirs of Ellyn Caron"
 caron_legacy_4_name: "Lord of the Marches"
 caron_legacy_5_name: "Lords of Nightsong"
 
 CARON_WARRIORS_AND_SINGERS_NO_BULLETTAB:0 "\nOur mighty House dates back to the Age of Heroes, and we are a House known for creating warriors and singers. Our illustrious nightingale sigil has been in a thousand battles. Nightsong has been sworn to Storm's End since time immemorial, but some claim that the Kingdom of the Reach once included western marches from Horn Hill to Nightsong. \n#weak The Brave [personality|E] [trait|E] and the Poet [trait|E] become more common."
 CARON_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 CARON_ELLYN_NO_BULLETTAB:0 "\nWhen [GetScriptedCharacterByHistoryID('Lowborn_Dorne_1').GetCharacterViewNameNicknamed] raided the Dornish Marches in the Second Dornish War, he led half of his host against Nightsong and Horn Hill. The outlaw "king" was unable to capture Nightsong and abandoned the siege, marching his army west. However, Lady [GetScriptedCharacterByHistoryID('Caron_19').GetCharacterViewNameNicknamed] sallied forth behind him and joined her strength with a strong force led by [GetScriptedCharacterByHistoryID('Dondarrion_12').GetCharacterViewNameNicknamed]. Meanwhile, [GetScriptedCharacterByHistoryID('Tarly_22').GetCharacterViewNameNicknamed] joined the battle athwart the Dornish line of march. Although the Vulture King's army was twice the size of his three foes combined, his host shattered when surrounded by armored knights.\n#weak [spearmen|E] are boundless in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('caron_claws_of_the_nightingale').GetName] as [men_at_arms|E].#!"
 CARON_LORD_MARCHES_NO_BULLETTAB:0 "\nOur ancient House stands proud among the stormlands' marcher lords, its roots entwined with the Age of Heroes. From the high halls of Nightsong echo tales of valor and verse. Though others may contend for primacy, we bear the storied title of 'Lords of the Marches' earned by blood, not granted by rule. The nightingale sings still, unbroken through countless wars and storm-swept ages. \n#weak Whilst House Swann contends our claim, we are the oldest of the Marcher Lords."
 CARON_NIGHTSONG_NO_BULLETTAB:0 "\nWe have held Nightsong for many centuries and the castle guarded the western border of the domain of the Storm Kings of House Durrandon, but also that the Kingdom of the Reach once included the western marches from Horn Hill to Nightsong. Records indicate the castle has been besieged at least thirty-seven times in the last millenium. \n#weak Just like our famous Singing Towers we have protected the western border of the Stormlands for Centuries and will for centuries to come."
 
 #SELMY
 selmy_legacy_track_name: "Selmy"
 selmy_legacy_track_desc: "Be Brave, Be Bold"
 selmy_legacy_1_name: "Sentinels of the Fertile Fields"
 selmy_legacy_2_name: "Marcher Lords"
 selmy_legacy_3_name: "House of Knights"
 selmy_legacy_4_name: "Lords of Harvest Hall"
 selmy_legacy_5_name: "Marcher Shieldmen"
 
 SELMY_FERTILE_FIELDS_NO_BULLETTAB:0 "\nHouse Selmy stands as the vigilant sentinel of the fertile fields of the Stormlands, ever watchful over the golden grain that feeds the realm. From the windswept plains of Harvest Hall, our line has tilled, sown, and stood guard since our House has stood. We are a House forged in toil and tempered by honor; known not for indulgence, but for duty, discipline, and an unshakable work ethic. \n#weak The Diligent [personality|E] [trait|E] becomes more common."
 SELMY_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 SELMY_KNIGHTS_NO_BULLETTAB:0 "\nHouse Selmy has ever been a cradle of chivalry, where the forge of discipline and the fire of honor shape knights of uncommon caliber. From the training yards of Harvest Hall ride warriors who do not seek glory, but earn it; tempered in battle, guided by duty, and measured by the weight of their oaths. \n#weak Our children are raised under the words of our House, 'Be Brave, Be Bold'.\n#weak The Brave [personality|E] [trait|E] becomes more common. \n \n#weak Rarely a prodegy is born to our House, a Knight greater than the rest."
 SELMY_HARVEST_HALL_NO_BULLETTAB:0 "\nHarvest Hall rises from the rich Stormlands soil not only as a keeper of the realm’s bounty, but as a bulwark against the storms of war. As the seat of a proud Marcher House, it is built for more than comfort. Its walls are thick, its gates strong, and its halls echo with the discipline of those sworn to guard the borderlands. For generations, Harvest Hall has stood firm against raiders, rebels, and rival kings alike. \n#weak Against any foe, House Selmy Stands Strong."
 SELMY_MARCHER_SHIELDMEN_NO_BULLETTAB:0 "\nThe Selmy Marcher Shieldmen are not mere soldiers, they are the anvil upon which many Dornish charges have broken. Forged in generations of border conflict, these disciplined warriors are trained to fight in tight ranks, their shields interlocked like the teeth of a great beast. Light enough to move with speed, yet unyielding in formation, they are well-suited to meet the swift raiders and spear-dancers of Dorne. \n#weak Our [heavy_infantry|E] are trained to fight in Dorne.\n#weak Enables recruitment of [GetMaA('oakheart_oak_shields').GetName] as [men_at_arms|E].#!"
 
 #DONDARRION
 dondarrion_legacy_track_name: "Dondarrion"
 dondarrion_legacy_track_desc: "Strike Twice, Strike True"
 dondarrion_legacy_1_name: "House of the Purple Lightings"
 dondarrion_legacy_2_name: "Marcher Lords"
 dondarrion_legacy_3_name: "Lords of Blackhaven"
 dondarrion_legacy_4_name: "Heirs of Harmon Dondarrion"
 dondarrion_legacy_5_name: "Heritage of the Last Storm"
 
 DONDARRION_PURPLE_LIGHTNINGS_NO_BULLETTAB:0 "\nThe Dondarrion line was founded when a messenger from the Storm King was ambushed by two Dornishmen while riding on a stormy night. An arrow killed his horse and his sword broke when he fell. When he thought he was doomed, a bright purple lightning bolt struck the Dornishmen, killing both. The man was thus able to deliver his crucial message on time. For this, the Storm King raised him to lordship, and he became the first Dondarrion. \n#weak The Eccentric [personality|E] [trait|E] becomes more common."
 DONDARRION_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 DONDARRION_BLACKHAVEN_NO_BULLETTAB:0 "\nBlackhaven is the seat of House Dondarrion in the southwestern stormlands. Part of the Dornish Marches, it is located in the northern Red Mountains near the Dornish border, north of the Wyl and south of the Cockleswhent. Blackhaven has black basalt walls and a dry moat said to be bottomless. It is small and modest compared to the great castles of the Seven Kingdoms. \n#weak The fiercest fighters in the stormlands, and perhaps in all of Westeros, are undoubtedly the men of the marches, who are said to be born with sword in hand and oft boast of learning to fight even before they learn to walk."
 DONDARRION_HARMON_NO_BULLETTAB:0 "\nWhen [GetScriptedCharacterByHistoryID('Lowborn_Dorne_1').GetCharacterViewNameNicknamed] raided the Dornish Marches in the Second Dornish War, [GetScriptedCharacterByHistoryID('Dondarrion_12').GetCharacterViewNameNicknamed] discounted the rabble of the Vulture King, yet the rebel was able to burn Blackhaven, however, and personally mutilate Harmon. However, Lady [GetScriptedCharacterByHistoryID('Caron_19').GetCharacterViewNameNicknamed] sallied forth behind him and joined her strength with a strong force led by [GetScriptedCharacterByHistoryID('Dondarrion_12').GetCharacterViewNameNicknamed]. Meanwhile, [GetScriptedCharacterByHistoryID('Tarly_22').GetCharacterViewNameNicknamed] joined the battle athwart the Dornish line of march. Although the Vulture King's army was twice the size of his three foes combined, his host shattered when surrounded by armored knights.\n#weak [light_cavalry|E|E] are boundless in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('dondarrion_royal_messengers').GetName] as [men_at_arms|E].#!"
 DONDARRION_LAST_STORM_NO_BULLETTAB:0 "\nDuring the Last Storm, [GetScriptedCharacterByHistoryID('Targaryen_29').GetCharacterViewNameNicknamed] spotted [GetScriptedCharacterByHistoryID('Durrandon_87').GetCharacterViewNameNicknamed] army from atop her dragon, Meraxes, while [GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed] fortified the hills to the south. Despite a raging storm blowing against the Targaryen host, Argilac launched an assault, relying on his superior numbers and cavalry. His horsemen struggled on muddy slopes, but his infantry seized two hills. In a pivotal moment, Argilac’s fourth charge broke through the Targaryen center but was halted by Rhaenys, grounded by the storm. She unleashed dragonfire, killing [GetScriptedCharacterByHistoryID('Morrigen_12').GetCharacterViewNameNicknamed] and the Bastard of Blackhaven [GetScriptedCharacterByHistoryID('Dondarrion_13').GetCharacterViewNameNicknamed], commanders of the Durrandon vanguard. \n#weak House Dondarrion stands Proud and Bold."
 
 #SWANN
 swann_legacy_track_name: "Swann"
 swann_legacy_track_desc: "On White Feathered Wings"
 swann_legacy_1_name: "Oldest of the Marcher Lords"
 swann_legacy_2_name: "Marcher Lords"
 swann_legacy_3_name: "Swann Knights"
 swann_legacy_4_name: "Rulers of the Slayne"
 swann_legacy_5_name: "Lords of Stonehelm"
 
 SWANN_OLDEST_NO_BULLETTAB:0 "\nWe are a noble and old house, proud, powerful and many members of our House have been refered to as cautious. We have governed our lands for as long as any can remember. From Stonehelm we control the Slayne, a major river route inland to the stormlands, gaining us much wealth and power. Whilst the Carons may claim to be the oldest Marcher Lords, we truly are the oldest. \n#weak The Paranoid [personality|E] [trait|E] becomes more common."
 SWANN_MARCHER_LORDS_NO_BULLETTAB:0 "\nThe Marcher lords have proudly defended the realms of the [GetTitleByKey('k_the_stormlands').GetBaseNameNoTier] and [GetTitleByKey('k_the_reach').GetBaseNameNoTier] against incursions from [GetTitleByKey('k_dorne').GetBaseNameNoTier]. Many ballads and tales praise the valor and skill at arms of the Marcher lords and their men. As one of the pirmary Marcher Lords of the Reach we form the main shield of the Reach against Dorne and have been since the Age of Heroes. \n#weak We as Marcher lords are duly proud of our history as key defenders of the realm."
 SWANN_KNIGHTS_NO_BULLETTAB:0 "\nWe are renowned for our valor and martial tradition and among our ranks are the legendary Swann Knights, elite warriors celebrated throughout the Stormlands and beyond. Clad in white and black, these knights uphold the honor of our house with unmatched skill and loyalty. Known for their chivalry and unyielding courage in battle, the Swann Knights are considered the greatest champions our House. Their name alone commands respect, and their presence on the battlefield often turns the tide. \n#weak [heavy_cavalry|E] is adequate in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('swann_swann_knights').GetName] as [men_at_arms|E].#!"
 SWANN_SLAYNE_NO_BULLETTAB:0 "\nIn the Battle by the Bloody Pool, [GetScriptedCharacterByHistoryID('Durrandon_8').GetCharacterViewNameNicknamed] is said to have dammed the Slayne with Dornish corpses. During the coming of the Andals, [GetScriptedCharacterByHistoryID('Durrandon_53').GetCharacterViewNameNicknamed] allied with three Dornish kings and defeated the Andal warlord Drox the Corpse-Maker on the river. \n#weak Known for its rapids, pools, and waterfalls, the Slayne flows south from the northeastern Red Mountains to the Sea of Dorne."
 SWANN_STONEHELM_NO_BULLETTAB:0 "\nStonehelm, the ancient seat of our House, rises proudly on the storm-lashed coast of the Stormlands. Perched atop rugged cliffs, the castle is distinguished by its striking black and white towers, symbols of our house’s enduring legacy and dual nature, honor and strength. The towers watch over the turbulent seas like silent sentinels, their stark contrast a reflection of the harsh beauty of the land they protect. \n#weak The castle is situated in the Red Watch region of the eastern Dornish Marches, on Cape Wrath along the coast of the Sea of Dorne."
 
 #TARTH
 tarth_legacy_track_name: "Tarth"
 tarth_legacy_track_desc: "From the Dawn"
 tarth_legacy_1_name: "The Evenstar"
 tarth_legacy_2_name: "First Men and Andals"
 tarth_legacy_3_name: "Lords of Evenfall"
 tarth_legacy_4_name: "House of the Sun and Moon"
 tarth_legacy_5_name: "The Sapphire Isle"
 
 TARTH_EVENSTAR_NO_BULLETTAB:0 "\nThe ancestors of our House were once kings, and the head of our house is known as the Evenstar, which is a title held ever since the dawn of days. The island of Tarth came under the dominion of Storm Kings of House Durrandon when [GetScriptedCharacterByHistoryID('Durrandon_12').GetCharacterViewNameNicknamed] married the daughter of Tarth's king, [GetScriptedCharacterByHistoryID('Tarth_7').GetCharacterViewNameNicknamed].\n#weak The Authoritative [personality|E] [trait|E] becomes more common."
 TARTH_MEN_ANDALS_NO_BULLETTAB:0 "\nTarth was the first region of the stormlands conquered during the coming of the Andals, but peace between the Andals and First Men was eventually achieved when the Storm Kings and their bannermen intermarried with the Andals. Our House boasts Andal ancestry and have ties with Houses Durrandon, Baratheon, and Targaryen. \n#weak The Blood of First Men and Andals flows thick."
 TARTH_EVENFALL_NO_BULLETTAB:0 "\nEvenfall Hall, ancestral seat of our glorious House, rises from the eastern cliffs of Tarth. Surrounded by sapphire seas and dense, emerald forests, the castle commands a strategic coastal position, its high walls and towers standing sentinel over the narrow straits. Built of pale stone that glows gold at sunset, it reflects the island's beauty and strength. \n#weak Everfall Hall has been rebuilt a few times, its current marvelous state was constructed after the arrival of the Andals."
 TARTH_SUN_MOON_NO_BULLETTAB:0 "\nFor our House, the Sun and Moon hold deep symbolic meaning. The Sun, tied to the Old Gods and First Men, represents the enduring light of nature, ancestral wisdom, and the strength drawn from Tarth’s ancient forests and stone. The Moon, revered by Andals through the Faith of the Seven, symbolizes guidance, reflection, and divine order. \n#weak [heavy_cavalry|E] is king on the Island of Tarth.\n#weak Enables recruitment of [GetMaA('tarth_knights_of_the_sun_and_moon').GetName] as [men_at_arms|E].#!"
 TARTH_SAPPHIRE_ISLE_NO_BULLETTAB:0 "\nThe island is said to be beautiful, having lakes, waterfalls, soaring mountains, high meadows, and shadowed vales. Tarth is called the Sapphire Isle for the striking blue seas in which it sits. A spine of mountains with hidden valleys runs down the center of Tarth. \n#weak The Islands Marble has been used to construct some of the greatest castles of Westeros."
 
 #ESTERMONT
 estermont_legacy_track_name: "Estermont"
 estermont_legacy_track_desc: "Slow and Steady"
 estermont_legacy_1_name: "House of the Turtle"
 estermont_legacy_2_name: "Doubtful Ancestry"
 estermont_legacy_3_name: "The Estermont Isle"
 estermont_legacy_4_name: "Lords of Greenstone"
 estermont_legacy_5_name: "Shields of the Sea"
 
 ESTERMONT_TURTLE_NO_BULLETTAB:0 "\nMany varieties of turtles can be found along the Rhoyne, such as the Old Men of the River, but also large turtles and small ones, flatbacks and red-ears, softshells and bonesnappers, brown turtles, green turtles, black turtles, clawed turtles and horned turtles, turtles whose ridged and patterned shells were covered with whorls of gold and jade and cream. Just like the turtles of the Rhoyne members of House Estermont are said to be incredibly patient and long lived. \n#weak The Patient [personality|E] [trait|E] becomes more common."
 ESTERMONT_ANCESTRY_NO_BULLETTAB:0 "\nThe ancestry of House Estermont remains shrouded in uncertainty, as it is yet unconfirmed whether they descend from the First Men or the Andals. Their island seat, Greenstone, lies off the coast of Storm’s End, placing them in a region deeply affected by the Andal invasion. During the coming of the Andals, many noble houses in the Stormlands, including House Durrandon and their bannermen, intermarried with the newcomers, blending bloodlines. \n#weak Whilst our Heritage is lost to history we stand Proud."
 ESTERMONT_ISLE_NO_BULLETTAB:0 "\nSmall and mountainous, Estermont is a damp, windswept island located in the storm-lashed waters off the southeastern coast of Westeros, near Storm’s End. Surrounded by rough seas and frequent rains, the island endures harsh weather typical of the Stormlands. Its rocky terrain and limited arable land make it poor and sparsely populated, with few natural resources to sustain wealth. \n#weak Estermont and the islands to its south were added to the realm of the Storm Kings of House Durrandon during the reign of Erich the Sailmaker."
 ESTERMONT_GREENSTONE_NO_BULLETTAB:0 "\nGreenstone, the seat of House Estermont, is a modest castle perched on the rugged island of Estermont in the Stormlands. Built of weathered greenish stone that gives it its name, the keep overlooks the churning seas and jagged coastline. Constant winds and driving rain batter its walls, a testament to the island’s harsh climate. \n#weak Our Seat may not be grand, or wealthy but it is ours."
 ESTERMONT_SHIELDS_NO_BULLETTAB:0 "\nThe Shields of the Sea are a renowned retinue sworn to House Estermont, named after the turtle sigil of their house and inspired by the natural defenses of sea turtles. Clad in heavy armor and wielding large, curved shields shaped like turtle shells, they form nearly impenetrable shield walls in battle. Trained to hold the line against overwhelming odds, these disciplined warriors embody endurance and resilience, mirroring both their island home and the creature they honor. \n#weak Our [heavy_infantry|E] are perfectly suited to defend our valued home.\n#weak Enables recruitment of [GetMaA('estermont_shields_of_the_sea').GetName] as [men_at_arms|E].#!"
 
 #CONNINGTON
 connington_legacy_track_name: "Connington"
 connington_legacy_track_desc: "To New Heights"
 connington_legacy_1_name: "Powerful Stormlander House"
 connington_legacy_2_name: "Renowened Warriors"
 connington_legacy_3_name: "Griffin Knights"
 connington_legacy_4_name: "Wealthy Stormlanders?"
 connington_legacy_5_name: "Lords of Griffin's Roost"
 
 CONNINGTON_STORMLANDER_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Connington_20').GetCharacterViewNameNicknamed] was a guest at the Golden Wedding. The young [GetScriptedCharacterByHistoryID('Connington_27').GetCharacterViewNameNicknamed]  became a companion of Princess [GetScriptedCharacterByHistoryID('Targaryen_51').GetCharacterViewNameNicknamed]  during his stay at court. After being involved in a sexual scandal, Roy was condemned to a ten-year exile from Westeros by Saera's father, [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed] . Roy died shortly before the end of his sentence, however. \n#weak The Brave [personality|E] [trait|E] becomes more common."
 CONNINGTON_WARRIORS_NO_BULLETTAB:0 "\nDuring the First Dornish War, [GetScriptedCharacterByHistoryID('Connington_15').GetCharacterViewNameNicknamed] was killed by Dornish assassins while hunting. The fourth son of the ruling Lord Connington [GetScriptedCharacterByHistoryID('Connington_19').GetCharacterViewNameNicknamed] joined Prince [GetScriptedCharacterByHistoryID('Targaryen_33').GetCharacterViewNameNicknamed] forces in his campaign against his uncle [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] and fought for him in the Battle Beneath the Gods Eye. \n#weak Just like Steffon Connington many members of our House are great Warriors."
 CONNINGTON_GRIFFIN_KNIGHTS_NO_BULLETTAB:0 "\nThe Griffin Knights are an elite cavalry force sworn to House Connington of Griffin’s Roost, famed for their valor and fierce loyalty. Clad in polished armor bearing the red griffin sigil, they ride swift destriers into battle, striking with precision and fury. Trained in both lance and sword, they uphold the chivalric traditions of the Stormlands while serving as the Lord Connington’s personal guard. Their name and honor evoke the proud, soaring might of the mythical creature they represent. \n#weak [heavy_cavalry|E] is adequate in the mountains of the Stormlands.\n#weak Enables recruitment of [GetMaA('connington_griffin_knights').GetName] as [men_at_arms|E].#!"
 CONNINGTON_WEALTHY_NO_BULLETTAB:0 "\nHouse Connington of Griffin’s Roost is one of the wealthier noble houses in the Stormlands, holding fertile lands and a strategic coastal seat near Shipbreaker Bay. Their wealth comes from trade, agriculture, and their well-defended position along key coastal routes. With a proud martial tradition and a stronghold of considerable size and comfort, the Conningtons command both respect and resources. \n#weak Our sigil symbolizes not only strenght in battle but also ambition and glory."
 CONNINGTON_GRIFFINS_ROOST_NO_BULLETTAB:0 "\nSmall but strong, Griffin's Roost is located on a lofty crag jutting out from the shores of Cape Wrath. The castle lies surrounded by red stone cliffs on three sides, which descend into the stormy waters of Shipbreaker Bay. The land-facing approach is a long natural ridge called the griffin's throat. The entrance to the griffin's throat is guarded on one end by a gatehouse, and by the castle's main gate and two round towers on the other end. \n#weak The great hall contains the carved and gilded Griffin Seat where fifty generations of Conningtons have ruled."
 
 #MERTYNS
 mertyns_legacy_track_name: "Mertyns"
 mertyns_legacy_track_desc: "We Wait in Darkness"
 mertyns_legacy_1_name: "Sworn enemies of Dorne"
 mertyns_legacy_2_name: "House of the Owl"
 mertyns_legacy_3_name: "Notable Diplomats"
 mertyns_legacy_4_name: "Lords of the Mistwood"
 mertyns_legacy_5_name: "Owl Warriors"
 
 MERTYNS_DORNE_NO_BULLETTAB:0 "\nDuring the First Dornish War, [GetScriptedCharacterByHistoryID('Mertyns_14').GetCharacterViewNameNicknamed] and his entire household met a tragic end when Dornish assassins infiltrated their keep. Disguised as traders, the assassins presented a cask of fine Dornish wine as a gift. Unbeknownst to their hosts, it had been laced with a deadly poison. That night, Lord Mertyns, his family, and many of his retainers perished, marking one of the war’s most chilling acts of assassination. \n#weak The Vengeful [personality|E] [trait|E] becomes more common."
 MERTYNS_OWL_NO_BULLETTAB:0 "\nOur House is known as the House of the Owl, a nod to our sigil and our ancient seat nestled within dense, shadowy forests of the Stormlands. We are well known for our wisdom, patience, and keen insight, and we have long been valued as counsellors and watchers in the realm. \n#weak Whilst the Owl is Wise and Patient it is also a great hunter."
 MERTYNS_DIPLOMATS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Mertyns_16').GetCharacterViewNameNicknamed] traveled to King's Landing for the wedding of Queen [GetScriptedCharacterByHistoryID('Velaryon_24').GetCharacterViewNameNicknamed] to [GetScriptedCharacterByHistoryID('Baratheon_20').GetCharacterViewNameNicknamed], where he spoke to the young [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed] and approved of his good-humored nature. \n#weak just like Jon many members of our House are great diplomats and know how to spot great rulers bright and early."
 MERTYNS_MISTWOOD_NO_BULLETTAB:0 "\nThe Mistwood, a deep and ancient forest in the heart of the Stormlands, where towering trees blot out the sun and mists cling to the ground year-round. The woods are thick with moss, shadow, and the cries of unseen beasts, giving the land an eerie, timeless quality. Hidden within this twilight realm stands Mistwood Keep, a quiet stronghold of stone and ivy, from which our House watches over our mysterious and primeval domain. \n#weak Not many dare venture into the Mistwood unguided, those who do rarely return."
 MERTYNS_OWL_WARRIORS_NO_BULLETTAB:0 "\nOur House commands the Owl Warriors, named for their silent movements and deadly precision. Trained within the dense, fog-laden depths of the Mistwood, they excel in ambushes, reconnaissance, and swift forest warfare. Cloaked in mottled greens and browns, they blend seamlessly into the woods, striking from shadow before vanishing like ghosts. Masters of bow, knife, and woodland survival, the Owl Warriors embody the cunning and quiet fury of their sigil’s namesake. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('mertyns_owl_warriors').GetName] as [men_at_arms|E].#!"
 
 #GRANDISON
 grandison_legacy_track_name: "Grandison"
 grandison_legacy_track_desc: "Rouse Me Not"
 grandison_legacy_1_name: "The Sleeping Lion"
 grandison_legacy_2_name: "Lion Cubs"
 grandison_legacy_3_name: "Lords of Grandview"
 grandison_legacy_4_name: "House of Scholars"
 grandison_legacy_5_name: "The Lions Teeth"
 
 GRANDISON_SLEEPING_NO_BULLETTAB:0 "\nOur House is known as the House of the Sleeping Lion, a name drawn from our sigil and the quiet strength we embody. Though not the most outspoken or ostentatious of Stormland houses, we are steady, proud, and formidable when roused. Our seat overlooks fertile lands and rolling hills, granting us both wealth and strategic value. \n#weak One Should not underestimate the Sleeping Lion."
 GRANDISON_CUBS_NO_BULLETTAB:0 "\nThe children of our House are raised in the image of our sigil 'the sleeping lion' taught patience, restraint, and the strength of silence. From an early age, they learn that true power lies in control, but that fury, when unleashed, must be decisive and unstoppable. Trained in courtly grace and martial discipline alike, due to their behaviour they are known as the Sleeping Lion’s Cubs. \n#weak The Patient and Wrathful [personality|E] [trait|E]'s become more common."
 GRANDISON_GRANDVIEW_NO_BULLETTAB:0 "\nGrandview, the ancestral seat of our House, sits atop a broad green hill overlooking golden fields and sun-dappled valleys in the western Stormlands. True to its name, the castle commands sweeping views of the surrounding countryside, rich with crops and dotted with small villages. Built of pale stone with tall, square towers and stately halls, Grandview exudes quiet strength and noble serenity. \n#weak What ever granted our Ancestors these lands, we have been truly blessed."
 GRANDISON_SCHOLARS_NO_BULLETTAB:0 "\nMembers of our House are known for favoring the book over the sword, valuing wisdom, learning, and strategy above brute strength. While trained in arms as all noble children are, many Grandisons pursue the study of history, law, and statecraft, believing that the sharpest minds win the longest wars. \n#weak The pen is mightier than the sword."
 GRANDISON_LIONS_TEETH_NO_BULLETTAB:0 "\nThe Lion’s Teeth are a specialized unit of elite crossbowmen sworn to our House, trained to strike with deadly precision from behind Grandview’s high walls or in the field. Armed with finely crafted crossbows and clad in golden half-plate, they represent the hidden ferocity of the sleeping lion sigil. Disciplined, silent, and deadly at range, the Lion’s Teeth are often the first to strike and the last to be seen. \n#weak Our [archers|E] will crush our enemies swiftly and unseen.\n#weak Enables recruitment of [GetMaA('grandison_lions_teeth').GetName] as [men_at_arms|E].#!"
 
 #DAYNE
 dayne_legacy_2_name: "Swords of the Morning"
 dayne_legacy_3_name: "Kings of the Torrentine"
 dayne_legacy_4_name: "The Sword of the Evening"
 dayne_legacy_5_name: "Lords of Starfall"
 
 DAYNE_SWORDS_OF_THE_MORNING_NO_BULLETTAB:0 "\nThe Sword of the Morning is a title of our House bestowed on the knight who bears our ancestral greatsword Dawn. Only a knight of our House who is deemed worthy can carry it. For this reason, the Swords of the Morning are all famous throughout the Seven Kingdoms. If there is no Dayne knight considered worthy, the title lies dormant. \n#weak The Brave [personality|E] [trait|E] becomes more common. \n#weak Some rare members of our House are born Worthy of Dawn."
 DAYNE_TORRENTINE_KINGS_NO_BULLETTAB:0 "\nOur House is one of the most ancient houses in the Seven Kingdoms, dating back ten thousand years to the dawn of days. The first Dayne is said to have raised Starfall on an island at the mouth of the Torrentine, having tracked a falling star there and found a stone of magical powers. His descendants became Kings of the Torrentine and Lords of Starfall. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes."
 DAYNE_SWORD_OF_THE_EVENING_NO_BULLETTAB:0 "\nThe last Dayne King, [GetScriptedCharacterByHistoryID('Dayne_17').GetCharacterViewNameNicknamed], was defeated in Nymeria's War and sent to the Wall. Afterwards the Daynes supported Nymeria against [GetScriptedCharacterByHistoryID('Yronwood_16').GetCharacterViewNameNicknamed]. Nymeria's third husband was Ser [GetScriptedCharacterByHistoryID('Dayne_18').GetCharacterViewNameNicknamed]. \n#weak Our ancestral sword made from the fallen star."
 DAYNE_STARFALL_NO_BULLETTAB:0 "\nStarfall is located in the western Red Mountains on an island in the Torentine where it pours into the Summer Sea. The castle includes a tower called the Palestone Sword. \n#weakAccording to legend, Starfall was built where the first Dayne found a magic stone after he followed the path of a shooting star."
 
 #BLACKMONT
 blackmont_legacy_track_name: "Blackmont"
 blackmont_legacy_track_desc: "What Was Taken Will Return"
 blackmont_legacy_1_name: "Vulture Kings?"
 blackmont_legacy_2_name: "Kings of Blackmont"
 blackmont_legacy_3_name: "The Vultures Chicks"
 blackmont_legacy_4_name: "House of the Vulture"
 blackmont_legacy_5_name: "Source of the Torrentine"
 
 BLACKMONT_VULTURE_KINGS_NO_BULLETTAB:0 "\nVulture King is the title claimed by a number of outlaws who rose against the Iron Throne, using the Red Mountains as their base. The Vulture King is half-mad, and his followers are a rabble, undisciplined and unwashed. Some claim that the Vulture King may have been a Blackmont, we neither confirm nor deny this notion. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('blackmont_red_mountain_guard').GetName] as [men_at_arms|E].#!"
 BLACKMONT_KINGS_NO_BULLETTAB:0 "\nWe were kings once, before Nymeria's war burned through Dorne. House Blackmont ruled the mountains with iron will and hawk-sharp eyes. Though centuries passed, we never forgot. We never yielded. The blood of kings still runs in our veins, and one day, we shall rise to claim what is ours. \n#weak Once Kings always Kings."
 BLACKMONT_CHILDREN_NO_BULLETTAB:0 "\nWe Blackmonts forget nothing. Every slight, every wound, we carry it like a blade beneath the cloak. Vengeance is our birthright. Some whisper we steal children in the dark, that our halls echo with their cries. Let them talk. Fear is a weapon, and we wield it well in the mountains. \n#weak The Vengeful [personality|E] [trait|E] becomes more common."
 BLACKMONT_SKINCHANGERS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Blackmont_10').GetCharacterViewNameNicknamed] was the last king of our House. He worshipped a dark god and was said to have the power to transform himself into a vulture of enormous size. Whilst the ultimately suffered defeat at the hands of Nymeria he was still a mighty King. \n#weak Some claim that the members of our house still pray to this dark god and retain the ability to change into a Vulture."
 BLACKMONT_TORRENTINE_NO_BULLETTAB:0 "\nThe Torrentine River, is one of the mightiest Rivers in Dorne, and the seat of our House Blackmont Castle is located close to its source. It is formed by the confluence of two rivers near Blackmont. It is a fast river which passes through a series of rapids, waterfalls, canyons, and crevasses. \n#weak Shielded to the North by the Red Moutains, the Torrentine is our only connection with the rest of Westeros."
 
 #FOWLER
 fowler_legacy_track_name: "Fowler"
 fowler_legacy_track_desc: "Let Me Soar"
 fowler_legacy_1_name: "Lords of the Wide Way"
 fowler_legacy_2_name: "The Hawk eats the Black Adder"
 fowler_legacy_3_name: "House of the Blue Hawk"
 fowler_legacy_4_name: "Kings of Stone and Sky"
 fowler_legacy_5_name: "Lords of Skyreach"
 
 FOWLER_WIDE_WAY_NO_BULLETTAB:0 "\nThe Prince's Pass was originally the Wide Way, the shortest and easiest route between the Reach and Dorne. The Dornish side of the Prince's Pass is guarded from the castle Skyreach, the seat of our House, which holds the title Warden of the Prince's Pass. The Prince's Pass descends from the mountains into the deep sands of Dorne. \n#weak When we were Kings we were also known as the Lords of the Wide Way."
 FOWLER_HAWK_ADDER_NO_BULLETTAB:0 "\nFollowing the defeat of [GetScriptedCharacterByHistoryID('Fowler_11').GetCharacterViewNameNicknamed], who was then exiled to the Night's Watch, we sided with the Martells against the Yronwoods during Nymeria's War a thousand years ago. Since then we have feuded with the Yronwoods. \n#weak The Vengeful [personality|E] [trait|E] becomes more common."
 FOWLER_BLUE_HAWK_NO_BULLETTAB:0 "\nWe of House Fowler, the House of the Hawk, are born to the cliffs and skies. The hawk's eyes guide our scouts. Its talons inspire our blades. Swift and precise, we excel in skirmishing warfare, striking fast, vanishing faster. In every ambush, our foes learn the hawk does not miss. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('fowler_hawk_talon_blades').GetName] as [men_at_arms|E].#!"
 FOWLER_STONE_SKY_NO_BULLETTAB:0 "\nWe of House Fowler were once the Kings of Stone and Sky, ruling the peaks and canyons with unchallenged might. The mountains echoed our name, and the skies bore our banners. Though crowns pass, our blood remembers. \n#weak We remain hawks, watchful, proud, and ready to rise on the wind once more."
 FOWLER_SKYREACH_NO_BULLETTAB:0 "\nSkyreach is carved into the stone which overlooks the Prince's Pass, the shortest and easiest route through the Red Mountains from Dorne to the Reach. The castle is known for its lofty perch and soaring towers. \n#weak It is located at the southern end of the Prince's Pass, south of Kingsgrave and near a river that flows east to Yronwood."
 
 #MANWOODY
 manwoody_legacy_track_name: "Manwoody"
 manwoody_legacy_track_desc: "The Death of Kings"
 manwoody_legacy_1_name: "Kings of the Red Mountains"
 manwoody_legacy_2_name: "Lords of Kingsgrave"
 manwoody_legacy_3_name: "The Slain Kings Curse"
 manwoody_legacy_4_name: "Terror of the Marcher Lords"
 manwoody_legacy_5_name: "House of the Princes Pass"
 
 MANWOODY_RED_MOUNTAINS_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Manwoody_9').GetCharacterViewNameNicknamed] claimed dominion over the Red Mountains of Dorne when the Rhoynar arrived in Dorne. The Rhoynish warrior queen Nymeria and her husband, Prince [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed], defeated King Albin during Nymeria's War. He was subsequently sent to the Wall in golden fetters, together with five other defeated Dornish kings. \n#weak Ever since Albins defeat we havent been Kings of the Red Mountains."
 MANWOODY_KINGSGRAVE_NO_BULLETTAB:0 "\nWe of House Manwoody are the Lords of Kingsgrave, where the bones of kings lie buried beneath the sands. Our stronghold rises where desert meets stone, guarding the pass through the Dornish mountains. Here, blood remembers, and every traveler must reckon with the silence of ancient death beneath their feet. \n#weak The Patient [personality|E] [trait|E] becomes more common."
 MANWOODY_CURSE_NO_BULLETTAB:0 "\nWe of House Manwoody bear a curse as old as Kingsgrave itself. They whisper that our founder slew a king and buried him beneath our halls, and that his spirit lingers still. Madness haunts our bloodline; some among us speak with voices not their own, as if the dead king stirs. \n#weak Madness runs in our House, but is seemingly erratic, and dooms anyone it picks from birth."
 MANWOODY_TERROR_NO_BULLETTAB:0 "\nWe of House Manwoody are the terror of the Marches, our banners darkening the horizon like a coming storm. For centuries, we’ve waged relentless skirmishes against the marcher lords, striking swift and cruel from shadowed passes. To them, our name means fire at night, blood in the sand, and no mercy. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('manwoody_red_jackals').GetName] as [men_at_arms|E].#!"
 MANWOODY_PRINCES_PASS_NO_BULLETTAB:0 "\nWe of House Manwoody guard the shadowed bends of the Prince’s Pass, our stronghold carved into stone and legacy. Ours is the blood that holds the gate to Dorne. Through war and whisper, we have shaped the fate of kingdoms. \n#weak No army crosses the mountains without feeling the weight of our watch."
 
 #WYL
 wyl_legacy_track_name: "Wyl"
 wyl_legacy_track_desc: "Black Heart, True Purpose"
 wyl_legacy_1_name: "Legacy of Wyl of Wyl"
 wyl_legacy_2_name: "Allegiance to the Vulture Kings"
 wyl_legacy_3_name: "Lords of Wyl"
 wyl_legacy_4_name: "House of the Black Adder"
 wyl_legacy_5_name: "Legacy of Wylla Wyl"
 
 WYL_WYL_OF_WYL_NO_BULLETTAB:0 "\nDuring the First Dornish War, the Wyl of Wyl ambushed and defeated the forces of [GetScriptedCharacterByHistoryID('Baratheon_14').GetCharacterViewNameNicknamed] as they attempted to assault the Boneway. The most infamous act of the First Dornish War was committed by [GetScriptedCharacterByHistoryID('Wyl_21').GetCharacterViewNameNicknamed], when he showed up at the wedding of Ser [GetScriptedCharacterByHistoryID('Cafferen_13').GetCharacterViewNameNicknamed] and [GetScriptedCharacterByHistoryID('Oakheart_19').GetCharacterViewNameNicknamed], castrating the groom, having the bride be gang-raped by his men and sold into slavery, and slaying Lord Oakheart and most of the guests. \n#weak The Deceitful [personality|E] [trait|E] becomes more common."
 WYL_VULTURE_KINGS_NO_BULLETTAB:0 "\nWe of House Wyl remember our oath to the Vulture King, carved in blood and mountain stone. When others bent the knee, we stood defiant beside him. His cause was ours, Dorne unbroken, wild, and free. Though his bones are dust, his fire still burns in our hearts and hidden passes. \n#weak Orys in revenge for the Wyl of Wyl chopping of his hand, chopped off Walter's sword hand, then his other hand, followed by both feet."
 WYL_WYL_NO_BULLETTAB:0 "\nWe of House Wyl rule from the craggy fastness of Wyl, a fortress carved into the very bones of the mountains. For centuries, we’ve dug tunnels beneath our halls, secret paths, hidden vaults, and ambush ways. The stone remembers us, and within it, we vanish, strike, and endure like the hills. \n#weak Our [heavy_infantry|E] are trained to fend of any invaders.\n#weak Enables recruitment of [GetMaA('wyl_black_adders').GetName] as [men_at_arms|E].#!"
 WYL_ADDER_NO_BULLETTAB:0 "\nWe are the House of the Black Adder, silent and deadly as the serpent’s strike. Patience and cunning shape our way, waiting for the perfect moment to lash out. In shadows and silence, we thrive. Our enemies unaware until it’s too late, caught in the venom of our hidden wrath. \n#weak The Patient [personality|E] [trait|E] becomes more common."
 WYL_WYLLA_NO_BULLETTAB:0 "\nWe of House Wyl remember [GetScriptedCharacterByHistoryID('Wyl_14').GetCharacterViewNameNicknamed], the warrior-maid who stood unyielding beside [GetScriptedCharacterByHistoryID('Yronwood_8').GetCharacterViewNameNicknamed] at the Bloody Pool. Though turned back, her spear sang defiance, and her name lives in stone and song. Her legacy endures, fierce, proud, and unbowed, guiding our daughters to fight as boldly as any son ever did. \n#weak Some of our Daughters are born as natural warriors."
 
 #YRONWOOD
 yronwood_legacy_track_name: "Yronwood"
 yronwood_legacy_track_desc: "We Guard the Way"
 yronwood_legacy_1_name: "Scurge of the Stormlands"
 yronwood_legacy_2_name: "Legacy of Yorick V Yronwood"
 yronwood_legacy_3_name: "The Bloodroyals"
 yronwood_legacy_4_name: "Lords of Yronwood"
 yronwood_legacy_5_name: "High Kings of Dorne"
 
 YRONWOOD_STORMLANDS_NO_BULLETTAB:0 "\nWe of House Yronwood are the scourge of the Stormlands, as [GetScriptedCharacterByHistoryID('Yronwood_12').GetCharacterViewNameNicknamed] was before us. Time and again, we rode hard across the marches, steel flashing through rain and thunder. Ours is a legacy of relentless incursion, of breaking their lines and burning their holds. \n#weak The storm remembers when we come."
 YRONWOOD_YORICK_NO_BULLETTAB:0 "\nFor nine years, we warred against the Martells and their supporters; Our bannermen included the Jordaynes and the Wyls, as well as the Blackmonts and Qorgyles. In the Third Battle of the Boneway. [GetScriptedCharacterByHistoryID('Yronwood_16').GetCharacterViewNameNicknamed] himself slew [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed] and Princess [GetScriptedCharacterByHistoryID('Nymeros_1').GetCharacterViewNameNicknamed] assumed command of the Martell armies. Two years of battle followed, though ultimately Yorick V was forced to submit and bend the knee to Nymeria, and the Yronwoods became bannermen of House Martell. \n#weak Our House doesnt falter, or stumble."
 YRONWOOD_BLOODROYALS_NO_BULLETTAB:0 "\nThe Bloodroyal is an ancient title traditionally held by the head of our House. Prior to Nymeria's War, we were rulers of an independent kingdom in Dorne, the most infamous of our royal titles was the title of Bloodroyal. When we bent the knee to House Martell, we were allowed to keep the title of the Bloodroyal. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('yronwood_knights_of_the_wells').GetName] as [men_at_arms|E].#!"
 YRONWOOD_LORDS_NO_BULLETTAB:0 "\nYronwood is near the mouth of a river whose source is to the west near Skyreach in the foothills of the Red Mountains. The formidable castle is at the southern end of the Boneway as a guardian against intruders. The land protected by the castle is fertile and forested, with deposits of iron, tin, and silver. Yronwood has clean and sweet mountain air, and the high meadows north of the castle have crisp air and cool nights. \n#weak We Guard the Way."
 YRONWOOD_HIGH_KINGS_NO_BULLETTAB:0 "\nWe of House Yronwood once ruled as High Kings of Dorne, our banners flying from the Red Mountains to the Greenblood’s source. From the Wyl lands to the northern sands, all bent the knee. Though crowns fade, our pride does not for the blood of kings still flows in Yronwood veins. \n#weak The Arrogant [personality|E] [trait|E] becomes more common."
 
 #QORGYLE
 qorgyle_legacy_track_name: "Qorgyle"
 qorgyle_legacy_track_desc: "This Blood Will Burn"
 qorgyle_legacy_1_name: "The Scorpions Stinger"
 qorgyle_legacy_2_name: "Lords of Sandstone"
 qorgyle_legacy_3_name: "Andal Adventurers"
 qorgyle_legacy_4_name: "Defiant House"
 qorgyle_legacy_5_name: "Loyal Bannermen"
 
 QORGYLE_SCORPIONS_NO_BULLETTAB:0 "\nWhen [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] attempted to conquer Dorne in the First Dornish War, House Qorgyle never submitted to House Targaryen and Qorgyle spearmen cut down Lord Harlan Tyrell's foragers whenever they ventured to far west. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('qorgyle_scorpions_stinger').GetName] as [men_at_arms|E].#!"
 QORGYLE_SANDSTONE_NO_BULLETTAB:0 "\nWe of House Qorgyle rule from Sandstone, where red rock and desert wind shape both stone and soul. Our halls rise from the dunes, sun-scorched and silent, yet strong. Here, the sand hides secrets, and scorpions sleep beneath every stone. In this harsh land, we endure. \n#weak Sharp, patient, and always watching."
 QORGYLE_ANDALS_NO_BULLETTAB:0 "\nWe of House Qorgyle descend from Andal adventurers who rode into the deep dunes, seeking more than conquest, seeking mystery. In the uncharted sands of Dorne, they carved out Sandstone and made the desert ours. \n#weak The blood of bold wanderers runs in us still, restless as the wind, and just as unyielding."
 QORGYLE_DEFIANT_NO_BULLETTAB:0 "\nWe of House Qorgyle are born of defiance. We rode with King Yorick against Nymeria, and when the dragons came, we did not kneel. Sandstone stands unbowed, shaped by sun and rebellion. Ours is a legacy of resistance quiet, enduring, and sharp as the scorpions that share our unforgiving desert home. \n#weak The Stubborn [personality|E] [trait|E] becomes more common."
 QORGYLE_LOYAL_NO_BULLETTAB:0 "\nWe of House Qorgyle are loyal, not lightly but for life. When we bend the knee, it is with purpose and pride. Through war, sand, and storm, we have stood by our liege lords unyielding and true. \n#weak In the shifting desert, loyalty is rare, but ours runs deep as sandstone roots."
 
 #ULLER
 uller_legacy_track_name: "Uller"
 uller_legacy_track_desc: "Deserts of Fire"
 uller_legacy_1_name: "House of the Brimstone"
 uller_legacy_2_name: "Dragonslayers"
 uller_legacy_3_name: "The Mad Lords"
 uller_legacy_4_name: "1st Prince Consort of Dorne"
 uller_legacy_5_name: "Lords of Hellholt"
 
 ULLER_BRIMSTONE_NO_BULLETTAB:0 "\nWe of House Uller are the Lords of the Brimstone, where the river runs hot and foul with sulfur, steaming like the wrath of gods. From Hellholt we watch, shaped by fire and stench, our tempers as fierce as the waters we rule. \n#weak In Brimstone’s shadow, even madness takes root."
 ULLER_DRAGONSLAYERS_NO_BULLETTAB:0 "\n In 10 AC at Hellholt, an iron bolt from a scorpion went through [GetScriptedCharacterByHistoryID('dragon_meraxes').GetCharacterViewNameNicknamed] eye, and the dragon and [GetScriptedCharacterByHistoryID('Targaryen_29').GetCharacterViewNameNicknamed] fell from the sky. In Meraxes's death throes, she destroyed the castle's highest tower and part of the curtain wall. It is not certain whether Rhaenys outlived Meraxes. There are those who say that Rhaenys lost her seat and fell to her death, while others claim that she was crushed to death beneath Meraxes in the castle yard. \n#weak We have Slain a Dragon, few can claim to have accomplished that."
 ULLER_MAD_LORDS_NO_BULLETTAB:0 "\nWe of House Uller are fire beneath the sand, impulsive, unpredictable, and feared for it. The saying goes: 'Half of the Ullers are half-mad, and the other half are worse.' Let them whisper. Madness is just freedom unchained, and in Hellholt, we rule by passion, vengeance, and the flame in our blood. \n#weak The Fickle [personality|E] [trait|E] becomes more common. Whilst some members of our House are born Mad."
 ULLER_CONSORT_NO_BULLETTAB:0 "\nDuring Nymeria's War, [GetScriptedCharacterByHistoryID('Uller_12').GetCharacterViewNameNicknamed] supported Princess [GetScriptedCharacterByHistoryID('Nymeros_1').GetCharacterViewNameNicknamed]  and her husband [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed]  against [GetScriptedCharacterByHistoryID('Yronwood_16').GetCharacterViewNameNicknamed]  and his bannermen. At some point after the death of Lord Martell at the Third Battle of the Boneway, Lord Uller married Nymeria and served her as a counselor and consort since Nymeria remained the unquestioned ruler of Dorne, their marriage remained childless. \n#weak Whilst we are not heirs of Nymeria, we are forever loyal to house Martell."
 ULLER_HELLHOLT_NO_BULLETTAB:0 "\nWe of House Uller dwell in Hellholt, named for flame and vengeance. Long ago, a Lord Uller feasted his foes then sealed the doors and burned them alive. That fire never died. It lives in our walls, our blood, our name. At Hellholt, wrath is remembered, and mercy is a stranger. \n#weak Our [archers|E] are even rumoured to be able to kill Dragons.\n#weak Enables recruitment of [GetMaA('uller_brimstone_dragonhunters').GetName] as [men_at_arms|E].#!"
 
 #DRYLAND
 dryland_legacy_track_name: "Dryland"
 dryland_legacy_track_desc: "Fire From Below"
 dryland_legacy_1_name: "House of the Lightbringer"
 dryland_legacy_2_name: "'Discoverers' of Westeros"
 dryland_legacy_3_name: "Lords of Hellgate Hall"
 dryland_legacy_4_name: "Rhoynar Heralds"
 dryland_legacy_5_name: "Kings of the Brimstone"
 
 DRYLAND_LIGHTBRINGER_NO_BULLETTAB:0 "\nWe of House Dryland, the House of the Lightbringer, bear a legacy both proud and strange. Every fourth son we name Lucifer, torchbearer of our line. From the burning sands to the Shifting Sea, our light cuts through shadow guiding our own, blinding our foes, and blazing with unyielding Dornish fire. \n#weak The Arrogant [personality|E] [trait|E] becomes more common."
 DRYLAND_DISCOVERERS_NO_BULLETTAB:0 "\nWe of House Dryland were the first Rhoynar to find Dorne, before Valyrian fire drove our kin west. We claimed these sun-scorched lands and took our name from them, Dryland. Ours is the blood of pioneers first to land, first to rule, and forever bound to the desert we made home. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('dryland_brimstone_devils').GetName] as [men_at_arms|E].#!"
 DRYLAND_HELLGATE_HALL_NO_BULLETTAB:0 "\nWe of House Dryland rule from Hellgate Hall, where the Brimstone River steams and hisses like a living beast. The air smells of fire and stone, and the walls drink the heat. Here, at the edge of flame and desert, we guard our legacy with the river’s own burning temper. \n#weak The gates of hell are open night and day"
 DRYLAND_HERALDS_NO_BULLETTAB:0 "\nWe of House Dryland are the Rhoynar Heralds, voices of the first fleet that found Dorne’s shores. Our words once carried the will of Nymeria’s people, binding oaths and summoning hosts. Even now, our banners speak before our swords. \n#weak A herald’s call can herald both peace and war."
 DRYLAND_KINGS_NO_BULLETTAB:0 "\nWe of House Dryland once ruled as Kings of the Brimstone, our crowns wreathed in steam and fire. Before Nymeria’s sails darkened the sea, we were sovereign. But her coming ended our reign our last king, [GetScriptedCharacterByHistoryID('Dryland_1').GetCharacterViewNameNicknamed], was stripped of crown, forced to take the black, and banished to the Wall. \n#weak Our line will be restored."
 
 #ALLYRION
 allyrion_legacy_track_name: "Allyrion"
 allyrion_legacy_track_desc: "No Foe May Pass"
 allyrion_legacy_1_name: "House of the Greenblood"
 allyrion_legacy_2_name: "Guards of the Waterways"
 allyrion_legacy_3_name: "Lords of Godsgrace"
 allyrion_legacy_4_name: "Kings of the Greenblood"
 allyrion_legacy_5_name: "Andal Adventurers"
 
 ALLYRION_GREENBLOOD_NO_BULLETTAB:0 "\nThe Greenblood, formed by the confluence of the Vaith and the Scourge near Godsgrace, flows east to the Summer Sea. The orphans of the Greenblood live on painted rafts along the river. Farms and orchards are located along the Greenblood for hundreds of leagues. Landscape near the river can include devilgrass, olive groves, and lemon orchards watered by old canals. \n#weak It takes its name from its murky green waters which are slow-moving and shallow."
 ALLYRION_WATERWAYS_NO_BULLETTAB:0 "\nWe of House Allyrion are the Guards of the Waterways, keepers of the Greenblood’s lifeblood. From our seat at Godsgrace, we watch the river’s course, shielding Dorne’s heart from foe and famine alike. Where water flows, so does our duty, steady, enduring, and as vital as the current we guard. \n#weak The Diligent [personality|E] [trait|E] becomes more common."
 ALLYRION_GODSGRACE_NO_BULLETTAB:0 "\nWe of House Allyrion dwell in Godsgrace, where the Greenblood bends and blesses the desert. Our castle rises from fertile banks, a haven of water and stone amid the sands. From these halls we guard river and road alike, our strength flowing as surely as the current that sustains Dorne. \n#weak Godsgrace is the seat of House Allyrion in Dorne. It is found on the northern shore of the Greenblood, near the confluence of the Vaith and the Scourge."
 ALLYRION_KINGS_NO_BULLETTAB:0 "\nWe of House Allyrion once ruled as Kings of the Greenblood, our crowns gleaming where river met sand. From Godsgrace we held dominion, our banners flowing with the current’s strength. Before Nymeria’s war, our word was law upon the waters, our reign carried by the river that gave us life. \n#weak \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('allyrion_greenblood_knights').GetName] as [men_at_arms|E].#!"
 ALLYRION_ANDAL_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Most Andals focused on the nearer lands on the narrow sea, rather than the Dornish sands."
 
 #VAITH
 vaith_legacy_track_name: "Vaith"
 vaith_legacy_track_desc: "Steel in Sand"
 vaith_legacy_1_name: "Lords of Vaith"
 vaith_legacy_2_name: "Andal Adventurers"
 vaith_legacy_3_name: "Namsakes of the Vaith"
 vaith_legacy_4_name: "Lords of the Red Dunes"
 vaith_legacy_5_name: "House of the Panther"
 
 VAITH_LORDS_NO_BULLETTAB:0 "\nWe of House Vaith hold Castle Vaith, where river and desert meet in uneasy truce. Our halls rise from the banks, stone reflecting sun and water alike. From here we watch the shifting sands and flowing stream, guardians of the passage where life and barrenness wrestle beneath Dorne’s burning sky. \n#weak Vaith is the seat of House Vaith in Dorne. It lies on the river Vaith. There is a town beneath its walls. West of Vaith are the deep sands of Dorne."
 VAITH_ANDAL_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Most Andals focused on the nearer lands on the narrow sea, rather than the Dornish sands."
 VAITH_NAMESAKE_NO_BULLETTAB:0 "\nThe Vaith is a river in southern Dorne and is one of the principal Dornish waterways. The Vaith meets the Scourge near Godsgrace in the eastern mountains to form the Greenblood. The castle Vaith, seat of House Vaith, is located along the river. \n#weak The castle and river are both named after our illustrious House."
 VAITH_DUNES_NO_BULLETTAB:0 "\nWe of House Vaith are the Lords of the Red Dunes, where the sands glow like embers beneath the sun. The desert is our fortress, harsh, endless, and loyal only to us. From its shifting hills we strike and vanish, masters of survival, our strength born from the burning heart of Dorne. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('vaith_red_dune_sabers').GetName] as [men_at_arms|E].#!"
 VAITH_PANTHER_NO_BULLETTAB:0 "\nWe of House Vaith are the House of the Black Panther, swift, silent, and fierce. Like the beast, we stalk the dunes with patience, striking only when the kill is certain. Our banner bears its shadow, our blood its fury predators of the desert, feared and unforgotten beneath the blazing sun. \n#weak The Brave [personality|E] [trait|E] becomes more common."
 
 #JORDAYNE
 jordayne_legacy_track_name: "Jordayne"
 jordayne_legacy_track_desc: "Let It Be Written"
 jordayne_legacy_1_name: "The Pen is mightier than the Sword"
 jordayne_legacy_2_name: "Kings of the Tor"
 jordayne_legacy_3_name: "Andal Adventurers"
 jordayne_legacy_4_name: "Stewards of the Tor"
 jordayne_legacy_5_name: "Lords of the Tor"
 
 JORDAYNE_PEN_NO_BULLETTAB:0 "\nWe of House Jordayne know well that the pen is mightier than the sword. From the halls of the Tor, words have won us what steel could not, alliances, peace, and power. Ink flows where blood need not, yet our quills cut as deep as any blade drawn in anger. \n#weak Some Jordaynes are Born Poets."
 JORDAYNE_KINGS_NO_BULLETTAB:0 "\nWe of House Jordayne once reigned as Kings of the Tor, our banners flying high above the western sands. From our seat we commanded coast and desert alike, ruling with ink and iron. Before Nymeria’s war, our word was sovereign, our crown born of wisdom, our strength carved into stone. \n#weak Our [heavy_infantry|E] are built to resist even the mightiest push.\n#weak Enables recruitment of [GetMaA('jordayne_shield_lords').GetName] as [men_at_arms|E].#!"
 JORDAYNE_ANDAL_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Most Andals focused on the nearer lands on the narrow sea, rather than the Dornish sands."
 JORDAYNE_STEWARDS_NO_BULLETTAB:0 "\nWe of House Jordayne, once Kings of the Tor, were humbled after Nymeria’s war. No longer sovereign, we became stewards of the Tor, keepers rather than rulers. Yet duty endures where crowns do not. Our hands still guide its halls, our words still shape its fate, quiet but steadfast. \n#weak Stewards is as much a punishment as a reward."
 JORDAYNE_LORDS_NO_BULLETTAB:0 "\nWe of House Jordayne dwell in the Tor, a fortress of stone rising proud above the western sands. Its towers watch both desert and sea, a beacon of wisdom and strength. Within its walls, lore and lineage endure, our seat stands eternal, where words weigh as heavily as steel. \n#weak The Tor is the seat of House Jordayne in Dorne. It is located on the southern shore of the Sea of Dorne, north of the Scourge."
 
 #TOLAND
 toland_legacy_track_name: "Toland"
 toland_legacy_track_desc: "The Dragon is Dead"
 toland_legacy_1_name: "House who fooled the Dragons"
 toland_legacy_2_name: "As Illusive as a Ghost"
 toland_legacy_3_name: "Lords of Ghost Hill"
 toland_legacy_4_name: "House of the Broken Arm"
 toland_legacy_5_name: "Spears of the Ghosts"
 
 TOLAND_DRAGONS_NO_BULLETTAB:0 "\nLord Toland sent out his champion to face Aegon. After Aegon slew the man, he learned that the man was the Tolands' mad fool, and that Lord Toland himself had escaped. In later days, the Tolands would take a new banner, showing a dragon biting its own tail, with the colors green in gold in memory of the motley of their brave fool. \n#weak The Brave [personality|E] [trait|E] becomes more common."
 TOLAND_GHOST_NO_BULLETTAB:0 "\nWe of House Toland are as elusive as a ghost, our banners once pale and fleeting like spirits on the wind. We fooled Aegon the Conqueror, vanishing where he expected attack. Since then, our dragon sigil soars, but our ways remain shadowed, cunning, and ever beyond the reach of men. \n#weak Just like we escaped the Dragons Wroth, we will escape all Danger."
 TOLAND_GHOST_HILL_NO_BULLETTAB:0 "\nLocated atop a hill, Ghost Hill has chalk-white walls that shine against the deep blue of the Sea of Dorne. There are square towers at the corners of the castle, which has a great central keep.  There is a village with dusty lanes situated at the bottom of the hill. \n#weak Ghost Hill is the seat of House Toland in Dorne. It lies on the southern shore of the Sea of Dorne, near the Broken Arm."
 TOLAND_BROKEN_NO_BULLETTAB:0 "\nThe Broken Arm, also known as the Broken Arm of Dorne, is a region in eastern Dorne where the Dornish peninsula juts into the narrow sea. East of the jagged coastline are the islands of the Stepstones. According to legend, a land bridge called the Arm of Dorne once connected Westeros and Essos. \n#weak The Broken Arm and the Stepstones were created when the Arm of Dorne was shattered by the Breaking, the usage of the hammer of the waters by the children of the forest."
 TOLAND_SPEARS_NO_BULLETTAB:0 "\nWe of House Toland command the Spears of the Ghosts, elite spearmen honed in shadow and surprise. Silent, swift, and deadly, they strike where foes least expect. Like their house, they vanish as quickly as they appear, leaving only the memory of steel and the terror of a ghostly assault. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('toland_spears_ghosts').GetName] as [men_at_arms|E].#!"
 
 #GARGALEN
 gargalen_legacy_track_name: "Gargalen"
 gargalen_legacy_track_desc: "Standing Tall"
 gargalen_legacy_1_name: "The Cockatrice that slew the Serpent"
 gargalen_legacy_2_name: "The White Gold"
 gargalen_legacy_3_name: "Lords of Salt Shore"
 gargalen_legacy_4_name: "House of the Summer Sea"
 gargalen_legacy_5_name: "Knights of the Cockatrice"
 
 GARGALEN_SERPENT_NO_BULLETTAB:0 "\nWe of House Gargalen bear the Cockatrice upon our banner, the beast that slew the Serpent. Its claws and beak speak of cunning triumph, a warning to foes. Whether it recalls the Wyls or some older tale, all know our house embodies the lethal strike of a predator none can tame. \n#weak The Callous [personality|E] [trait|E] becomes more common."
 GARGALEN_WHITE_NO_BULLETTAB:0 "\nWe of House Gargalen are rich in white gold, the salt that flows from our shores. It fills our coffers and flavors our power, a treasure born of the sea. Merchants and lords alike pay heed, for in salt as in blood, our wealth preserves and commands respect. \n#weak Our White Gold is used in various Dishes across the Seven Kingdoms and for preserving food in all the realms."
 GARGALEN_SALT_NO_BULLETTAB:0 "\nWe of House Gargalen dwell in Castle Salt Shore, perched where sea winds bite and waves crash like hammers on stone. From these walls, white gold flows and guards our legacy. The castle watches both harbor and horizon, a sentinel of salt, wealth, and the enduring power of our house. \n#weak Salt Shore is the seat of House Gargalen in Dorne. It lies on the southern coast along the Summer Sea."
 GARGALEN_SUMMER_NO_BULLETTAB:0 "\nDornish rivers flowing into the Summer Sea include the Torentine, the Brimstone, and the Greenblood. Sharks and kraken are common in the seas south of Dorne. During autumn, fierce storms arise in the warm Summer Sea and head north to the narrow sea and the stormlands. \n#weak The Summer Sea is a body of water located south of Westeros and Essos. The southern sea has deep blue waters and is warm from the sun."
 GARGALEN_COCKATRICE_NO_BULLETTAB:0 "\nWe of House Gargalen command the Knights of the Cockatrice, proud members of the Order that bears our sigil. Clad in steel and guided by the beast’s cunning, they ride far and wide, striking with precision. Across Dorne, their name alone inspires awe, fear, and respect, a legacy of lethal honor. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('gargalen_cockatrice_knights').GetName] as [men_at_arms|E].#!"
 
 #MARTELL
 martell_legacy_track_name: "Martell"
 martell_legacy_track_desc: "Unbowed, Unbent, Unbroken"
 martell_legacy_1_name: "Heritage of Morgan Martell"
 martell_legacy_2_name: "Andal Origins Rhoynish Traditions"
 martell_legacy_3_name: "Princes of Dorne"
 martell_legacy_4_name: "Queen Nymeria’s Legacy"
 martell_legacy_5_name: "The Yellow Toad of Dorne"
 
 MARTELL_MORGAN_NO_BULLETTAB:0 "\nOur house was founded by [GetScriptedCharacterByHistoryID('Martell_21').GetCharacterViewNameNicknamed], an Andal adventurer who settled between the mouth of the Greenblood and the Broken Arm during the coming of the Andals to Dorne. Morgan led the defeat of the local First Men, including Houses Wade and Shell, establishing his rule over a strip of land fifty leagues long and ten leagues wide. \n#weak The Eccentric [personality|E] [trait|E] becomes more common."
 MARTELL_TRADITIONS_NO_BULLETTAB:0 "\nThe union of their peoples saw the Martells abandon many of their older Andal customs in favor of those of the Rhoynar. [GetScriptedCharacterByHistoryID('Nymeros_1').GetCharacterViewNameNicknamed] named [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed] Prince of Dorne instead of king, and their lands and title passed down to their eldest child, their daughter, regardless of Nymeria marrying again after Mors's death and giving birth to a male child. \n#weak The Spear Tower and the Tower of the Sun, the towers of Sunspear's Old Palace, were built in the Rhoynish fashion."
 MARTELL_DORNE_NO_BULLETTAB:0 "\nFor thousands of years Dorne was a patchwork of petty First Men and Andal kingdoms which included the Kings of the Torrentine, the Kings of Stone and Sky, and the different houses laying claim to the title of High Kings of Dorne. Sailing on ten thousand ships, Princess [GetScriptedCharacterByHistoryID('Nymeros_1').GetCharacterViewNameNicknamed] led the Rhoynar to southeastern Dorne. Nymeria married [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed] of the Sandship, forming House Nymeros Martell, and the Rhoynar intermarried with the bannermen of Mors. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('martell_dornish_vipers').GetName] as [men_at_arms|E].#!"
 MARTELL_NYMERIA_NO_BULLETTAB:0 "\nAt the time of the Rhoynish Wars, the Martells were one of the lesser ruling families of Dorne. At the time of the arrival of the Rhoynish warrior queen Nymeria, around 700 BC, the lands of the Martells were dwarfed by those of House Yronwood. [GetScriptedCharacterByHistoryID('Martell_23').GetCharacterViewNameNicknamed], the Lord of the Sandship, saw an opportunity in the arrival of the Rhoynar, and took [GetScriptedCharacterByHistoryID('Nymeros_1').GetCharacterViewNameNicknamed] to wife. Combining their strength, the two managed to unite all of Dorne under their rule in Nymeria's War. \n#weak Many members of our House are more beautiful than the Black Lotus."
 MARTELL_TOAD_NO_BULLETTAB:0 "\nDuring this First Dornish War, instead of remaining at Sunspear, [GetScriptedCharacterByHistoryID('Martell_53').GetCharacterViewNameNicknamed], along with all the other Dornish lords, fled their castles, simply yielding them up. It did not take long for the Targaryen forces to reach Sunspear, find it empty, and declare themselves the victors. The Dornishmen had not surrendered, however. They swarmed from the shadow city and retook the castle, and once [GetScriptedCharacterByHistoryID('Rosby_10').GetCharacterViewNameNicknamed] was bound hand and foot, he was dragged to the top of the Spear Tower. \n#weak Princess Meria herself threw him from the window in the Defenestration of Sunspear."
 
 #SANTAGAR
 santagar_legacy_track_name: "Santagar"
 santagar_legacy_track_desc: "In Plain Sight"
 santagar_legacy_1_name: "Knights of Spottswood"
 santagar_legacy_2_name: "House of the Leopard"
 santagar_legacy_3_name: "Masters of the Sand Steeds"
 santagar_legacy_4_name: "Andal Adventurers"
 santagar_legacy_5_name: "Golden Axes of Spottswood"
 
 SANTAGAR_SPOTTSWOOD_NO_BULLETTAB:0 "\nWe of House Santagar rule from Castle Spottswood, where hills meet desert and stone rises from sand. Our walls watch the passes and the sun-scorched plains, guarding both people and legacy. From these ramparts, our banners fly, a symbol of vigilance, strength, and the enduring pride of House Santagar. \n#weak Spottswood is the seat of House Santagar in Dorne. It appears to be in eastern Dorne, near the Planky Town, Lemonwood, Stinkwater, and the shadow city of Sunspear."
 SANTAGAR_LEOPARD_NO_BULLETTAB:0 "\nWe of House Santagar are the House of the Spotted Leopard, fierce, cunning, and swift. Like the beast, we strike with precision, vanish into the hills, and leave our mark unseen until it is too late. Our banner warns all: underestimating the leopard invites swift and deadly consequence. \n#weak The Patient [personality|E] [trait|E] becomes more common."
 SANTAGAR_STEEDS_NO_BULLETTAB:0 "\nWe of House Santagar are masters of the Sand Steeds, swift and enduring horses born of Dorne’s harsh deserts. From Spottswood, we raise and train them, riding like wind over dunes. Our bond with these creatures is unmatched, their speed and stamina making us deadly in war and unmatched in endurance. \n#weak They are smaller than normal warhorses and cannot bear the weight of the armor a warhorse usually wears. Dornishmen claim the mounts are able to run for a day and night and another day, and never tire."
 SANTAGAR_ANDAL_NO_BULLETTAB:0 "\nThe Andals, the first new people of Westeros since the Pact, came from the hills of Andalos in western Essos. They were tall and fair-haired warriors who carried steel weapons and the seven-pointed star of their gods painted on their bodies. Their religion, the Faith of the Seven, teaches that Hugor of the Hill and his Andals were promised kingdoms in a foreign land by the Seven, which led to the Andals sailing to Westeros. \n#weak Most Andals focused on the nearer lands on the narrow sea, rather than the Dornish sands."
 SANTAGAR_AXES_NO_BULLETTAB:0 "\nWe of House Santagar command the Golden Axes of Spottswood, mighty mounted cavalry feared across Dorne. Clad in leather, astride powerful steeds, they cleave through all opposition with massive golden axes. Their charge is unstoppable, their presence overwhelming, symbols of our house’s strength, discipline, and unmatched mastery of battlefield fury. \n#weak [light_cavalry|E|E] are boundless in the Dunes of Dorne.\n#weak Enables recruitment of [GetMaA('santagar_golden_axes').GetName] as [men_at_arms|E].#!"
 
 #DALT
 dalt_legacy_track_name: "Dalt"
 dalt_legacy_track_desc: "The Finest Fruit"
 dalt_legacy_1_name: "The Greenbloods Mouth"
 dalt_legacy_2_name: "Citrus Farmers of Dorne"
 dalt_legacy_3_name: "Knights of Lemonwood"
 dalt_legacy_4_name: "Loyalty is a Bitter Fruit to Swallow"
 dalt_legacy_5_name: "House of the Summer Sea"
 
 DALT_MOUTH_NO_BULLETTAB:0 "\nThe Greenblood, formed by the confluence of the Vaith and the Scourge near Godsgrace, flows east to the Summer Sea. The orphans of the Greenblood live on painted rafts along the river. Farms and orchards are located along the Greenblood for hundreds of leagues. Landscape near the river can include devilgrass, olive groves, and lemon orchards watered by old canals. \n#weak It takes its name from its murky green waters which are slow-moving and shallow."
 DALT_CITRUS_NO_BULLETTAB:0 "\nWe of House Dalt are the masters of citrus in all Dorne, tending orchards where only lemons grow. Sun and sand shape our fruit, bright and sharp, as precise as our house. From our groves, the land yields gold in flavor and trade, a legacy of patience and skill. \n#weak No ones fruit compares to ours."
 DALT_KNIGHTS_NO_BULLETTAB:0 "\nWe of House Dalt rule from Castle Lemonwood, nestled among orchards heavy with golden fruit. Its walls rise from sunlit hills, fragrant with lemon blossoms. From this seat, we guard our groves, our trade, and our legacy, where every stone and tree reflects the enduring wealth and pride of our house. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('dalt_lemonwood_knights').GetName] as [men_at_arms|E].#!"
 DALT_LOYALTY_NO_BULLETTAB:0 "\nWe of House Dalt are fiercely loyal, bound by oath and honor. From childhood, we are taught that 'Loyalty is a bitter fruit to swallow,' a truth etched into our hearts. Yet we bear it gladly, for devotion guides our hands, sharpens our minds, and defines the legacy of our house. \n#weak Loyalty runs in the Veins of our House."
 DALT_SUMMER_NO_BULLETTAB:0 "\nDornish rivers flowing into the Summer Sea include the Torentine, the Brimstone, and the Greenblood. Sharks and kraken are common in the seas south of Dorne. During autumn, fierce storms arise in the warm Summer Sea and head north to the narrow sea and the stormlands. \n#weak The Summer Sea is a body of water located south of Westeros and Essos. The southern sea has deep blue waters and is warm from the sun."
 
 #BELAERYS
 belaerys_legacy_track_name: "Belaerys"
 belaerys_legacy_track_desc: "The Call of the Land without End"
 belaerys_legacy_1_name: "Dragon Roads"
 belaerys_legacy_2_name: "The Legacy of Jaenara Belaerys"
 belaerys_legacy_3_name: "Valyrian Dragonlords"
 belaerys_legacy_4_name: "Riders of Terrax"
 belaerys_legacy_5_name: "Valyrian Scouts"
 
 BELAERYS_DRAGON_ROADS_NO_BULLETTAB:0 "\nValyrian roads, also called dragon roads, are broad stone highways built when the Valyrian Freehold dominated Essos. They are straight and usually run from one economic center to another, allowing swift transport of goods. Valyrian roads ran across much of the Valyrian peninsula, connecting the cities of Valyria, Tyria, and Oros with outlying settlements.\n#weak To make the roads, the dragonlords of Valyria used dragonfire to fuse stone, like the Black Walls of Volantis."
 BELAERYS_JAENARA_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Belaerys_1').GetCharacterViewNameNicknamed] flew her dragon, [GetScriptedCharacterByHistoryID('dragon_terrax').GetCharacterViewNameNicknamed], farther south in Sothoryos than anyone had gone before. She returned to the Valyrian Freehold after three years, having found only endless jungle, deserts, and mountains. Jaenara declared that Sothoryos was as large as Essos and 'a land without end' \n#weak The Ambitious [personality|E] [trait|E] becomes more common."
 BELAERYS_VALYRIAN_DRAGONLORDS_NO_BULLETTAB:0 "\nDragonlords were the dragon-riding most powerful nobles of the Valyrian Freehold. Strong in sorcery, the dragonlords of old are said to have used binding spells and horns to control their dragons, and they used dragonflame to reshape stone into decorative shapes.Some scholars have written that the dragonlords considered themselves more powerful than gods. \n#weak The dragonlords of the old Freehold were strong in sorcery, and lesser men defied them at their peril."
 BELAERYS_TERRAX_NO_BULLETTAB:0 "\nWe of House Belaerys trace our fire to the ancestral dragon [GetScriptedCharacterByHistoryID('dragon_terrax').GetCharacterViewNameNicknamed], first and greatest of our line. Its wings crowned us dragonlords, its flame forged our dominion. In reverence, we name our most magnificent dragons [GetScriptedCharacterByHistoryID('dragon_terrax').GetCharacterViewNameNicknamed], honoring the living legacy that binds blood, sky, and fire forever in glory. \n#weak Dragons are fire made flesh, and fire is power"
 BELAERYS_SCOUTS_NO_BULLETTAB:0 "\nWe of House Belaerys are Valyrian dragonriders, and our Valyrian Scouts are the lifeblood of our reach. Swift messengers and keen-eyed pathfinders, they thrive upon the Dragon Roads, carrying word and will across the Freehold’s veins. Where others see distance, we see flight, fire, and flawless command of the ancient ways. \n#weak [light_cavalry|E|E] are ideal for swiftly crossing the Dragon Roads of Valyria.\n#weak Enables recruitment of [GetMaA('belaerys_valyrian_scouts').GetName] as [men_at_arms|E].#!"
 
 #VAREZYS
 varezys_legacy_track_name: "Varezys"
 varezys_legacy_track_desc: "The Fourteen Flames Bow to Us"
 varezys_legacy_1_name: "Valyrian Steel Legionaires"
 varezys_legacy_2_name: "Valyrian Dragonlords"
 varezys_legacy_3_name: "The First Emperor of Valyria"
 varezys_legacy_4_name: "Dragon Roads"
 varezys_legacy_5_name: "A House of the Dark Arts"
 
 VAREZYS_VALYRIAN_LEGIONAIRES_NO_BULLETTAB:0 "\nWe of House Varezys are Valyrian dragonriders, served by the Valyrian Steel Legionaries, sworn in blood and fire. Clad in gleaming steel, they stood loyal to House Varezys and to Emperor Aurion, first Emperor of Valyria. Unbreaking, disciplined, and fearless, they were the iron will beneath the dragon’s shadow. \n#weak Our [heavy_infantry|E] are second only to our Dragons.\n#weak Enables recruitment of [GetMaA('varezys_valyrian_legionaires').GetName] as [men_at_arms|E].#!"
 VAREZYS_VALYRIAN_DRAGONLORDS_NO_BULLETTAB:0 "\nDragonlords were the dragon-riding most powerful nobles of the Valyrian Freehold. Strong in sorcery, the dragonlords of old are said to have used binding spells and horns to control their dragons, and they used dragonflame to reshape stone into decorative shapes.Some scholars have written that the dragonlords considered themselves more powerful than gods. \n#weak The dragonlords of the old Freehold were strong in sorcery, and lesser men defied them at their peril."
 VAREZYS_EMPEROR_OF_VALYRIA_NO_BULLETTAB:0 "\n[GetScriptedCharacterByHistoryID('Varezys_1').GetCharacterViewNameNicknamed] was one of the few dragonlords who survived the Doom of Valyria. According to histories of Qohor, he raised forces from Qohorik colonists and declared himself first Emperor of Valyria. Atop his dragon, he flew south to lay claim to what remained of Valyria and reestablish the Freehold along with his thirty thousand men. Neither Emperor Aurion nor his host were ever seen again. \n#weak The Ambitious and Arrogant [personality|E] [trait|E] becomes more common."
 VAREZYS_DRAGON_ROADS_NO_BULLETTAB:0 "\nValyrian roads, also called dragon roads, are broad stone highways built when the Valyrian Freehold dominated Essos. They are straight and usually run from one economic center to another, allowing swift transport of goods. Valyrian roads ran across much of the Valyrian peninsula, connecting the cities of Valyria, Tyria, and Oros with outlying settlements. \n#weak To make the roads, the dragonlords of Valyria used dragonfire to fuse stone, like the Black Walls of Volantis."
 VAREZYS_DARK_ARTS_NO_BULLETTAB:0 "\nAll Valyrian magic was rooted in blood and fire. It is often said that the old wizards of Valyria did not cut and chisel stone, but worked it with fire and magic as one might work clay. The people of Valyria were strong in magic, and they used their powerful wizards and their dragons in conjunction with their armies to conquer most of western Essos. Dragons were controlled by whips, dragon horns, and sorcery. \n#weak Despite all Dragonlords being capable of the Black Arts our House is entrinsically tied to them, its woven into our very existence."
 
