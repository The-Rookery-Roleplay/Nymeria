 celtigar_legacy_4_name: "Fabulous Treasures of House Celtigar"
 celtigar_legacy_5_name: "Pioneers of Blackwater Bay"
 
 CELTIGAR_LORDS_FREEHOLDER_NO_BULLETTAB:0 "\nThe lords freeholder, or simply freeholders, were the nobility of the Valyrian Freehold. Any individual who owned land and was not born into slavery was considered a freeholder. The lords freeholder sometimes elected archons from their own number, to help lead Valyria for a limited time. While the freeholding families were officially of equal status, it was not entirely unheard of for Valyria to be swayed by one family alone. The freeholders benefited greatly from the mining of gold and silver by slaves beneath the Fourteen Flames. All freeholders were in concept equal, but in practice the wealthiest and most prestigious families had the most power. \n#weak At its apex Valyria was the greatest city in the known world, the center of civilization. Within its shining walls, twoscore rival houses vied for power and glory in court and council, rising and falling in an endless, subtle, oft savage struggle for dominance."
 CELTIGAR_CRACKLAW_POINT_NO_BULLETTAB:0 "\nWe claim dominion over Crackclaw Point, but the inhabitants do not acknowledge our claim. When they surrendered peacefully to [GetScriptedCharacterByHistoryID('Targaryen_28').GetCharacterViewNameNicknamed] during [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] Conquest, the people of Crackclaw were freed from pledging fealty to anyone but the Iron Throne. We occasionally send men there to collect taxes. If Lord Celtigar sends enough collectors, a few come back to him. \n#weak Some may call our Dream foolish, but one day we shall rule Crackclaw Point."
 CELTIGAR_TARGARYEN_NO_BULLETTAB:0 "\nHouse Celtigar of Claw Isle rules Claw Isle, an island in the narrow sea off the coast of Crackclaw Point. The Celtigars are historically sworn to Dragonstone within the crownlands. House Celtigar is an ancient and proud house, with the blood of old Valyria in its veins. [GetScriptedCharacterByHistoryID('Celtigar_15').GetCharacterViewNameNicknamed] served as master of coin to [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed]. \n#weak We will never break our allegiance to House Targaryen"
 CELTIGAR_TREASURES_NO_BULLETTAB:0 "\nOur castle is rumored to hold fabulous treasures that bear witness to our wealth. Among our property there are Myrish carpets, Volantene glass, gold and silver plate, jeweled cups, magnificent hawks, a trained sea eagle, an axe of Valyrian steel, chests of rubies, a horn said to summon krakens from under the sea, and many fine wines. \n#weak The Greedy [personality|E] [trait|E] becomes more common."
 CELTIGAR_BLACKWATER_BAY_NO_BULLETTAB:0 "\nWe of House Celtigar field the Pioneers of Blackwater Bay, swift skirmishers sworn to our banner. Like our forebears who first charted these waters, they scout, raid, and harry the foe. Agile on shore and tide, they embody our legacy as pathfinders, ever forward, ever probing, where land meets sea. \n#weak [skirmishers|E] are ideal for countering enemy [light_cavalry|E].\n#weak Enables recruitment of [GetMaA('celtigar_blackwater_bay_pioneers').GetName] as [men_at_arms|E].#!"
 
