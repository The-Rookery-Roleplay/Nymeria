 mataeryon_legacy_track_name: "Mataeryon"
 mataeryon_legacy_track_desc: "Pythax's Flame"
 mataeryon_legacy_1_name: "Riders of Phytax"
 mataeryon_legacy_2_name: "Children of the Fourteen"
 mataeryon_legacy_3_name: "Dragon Roads"
 mataeryon_legacy_4_name: "The Dragons Horns"
 mataeryon_legacy_5_name: "Valyrian Dragonlords"
 
 MATAERYON_PHYTAX_NO_BULLETTAB:0 "\nWe of House Mataeryon trace our fire to the ancestral dragon [GetScriptedCharacterByHistoryID('dragon_pythax').GetCharacterViewNameNicknamed], first and greatest of our line. Its wings crowned us dragonlords, its flame forged our dominion. In reverence, we name our most magnificent dragons [GetScriptedCharacterByHistoryID('dragon_pythax').GetCharacterViewNameNicknamed], honoring the living legacy that binds blood, sky, and fire forever in glory. \n#weak Dragons are fire made flesh, and fire is power"
 MATAERYON_CHILDREN_FOURTEEN_NO_BULLETTAB:0 "\nThe Fourteen Flames is an immense chain of volcanoes extending across the now-shattered Valyrian peninsula. There were deep mines beneath the Fourteen Flames, and their fires lit the Valyrian Freehold's nights of old. The Valyrians were originally a sheepherding folk of the Valyrian peninsula. When they discovered dragons lairing in the Fourteen Flames, however, their rise to power began. The Valyrians believed that dragons were the children of the volcanoes. \n#weak The Zealous [personality|E] [trait|E] becomes more common."
 MATAERYON_DRAGON_ROADS_NO_BULLETTAB:0 "\nValyrian roads, also called dragon roads, are broad stone highways built when the Valyrian Freehold dominated Essos. They are straight and usually run from one economic center to another, allowing swift transport of goods. Valyrian roads ran across much of the Valyrian peninsula, connecting the cities of Valyria, Tyria, and Oros with outlying settlements. \n#weak To make the roads, the dragonlords of Valyria used dragonfire to fuse stone, like the Black Walls of Volantis."
 MATAERYON_DRAGONS_HORNS_NO_BULLETTAB:0 "\nWe of House Mataeryon are Valyrian dragonriders, guarded by the Dragon’s Horns. These spearmen wield lances tipped with carved dragon horn, symbols of our might and mastery. In tight ranks they stand unyielding, the first to meet the foe beneath beating wings, their spears a forest of fire-hardened resolve. \n#weak [spearmen|E] serve loyaly to repel any cavalry charge.\n#weak Enables recruitment of [GetMaA('mataeryon_dragons_horns').GetName] as [men_at_arms|E].#!"
 MATAERYON_VALYRIAN_DRAGONLORDS_NO_BULLETTAB:0 "\nDragonlords were the dragon-riding most powerful nobles of the Valyrian Freehold. Strong in sorcery, the dragonlords of old are said to have used binding spells and horns to control their dragons, and they used dragonflame to reshape stone into decorative shapes.Some scholars have written that the dragonlords considered themselves more powerful than gods. \n#weak The dragonlords of the old Freehold were strong in sorcery, and lesser men defied them at their peril."
 
 #TARGARYEN
 targaryen_legacy_track_name: "Targaryen"
 targaryen_legacy_track_desc: "Fire and Blood"
 targaryen_legacy_1_name: "Closer to Dragons than Men"
 targaryen_legacy_2_name: "Legacy of Daenys the Dreamer"
 targaryen_legacy_3_name: "Conquest, Tyranny, & Conciliation"
 targaryen_legacy_4_name: "Valyrian Knights"
 targaryen_legacy_5_name: "Balerion, Meraxes, & Vhagar"
 
 TARGARYEN_DRAGONS_MEN_NO_BULLETTAB:0 "\nAs one of the forty dragonlord families of Valyria, the Targaryens were closer to dragons than other men. House Targaryen was one of the forty ancient noble houses known as dragonlords who ruled the Valyrian Freehold, a great empire spanning much of Essos. The Targaryens were not one of the most powerful houses, however. \n#weak The dragonlords of the old Freehold were strong in sorcery, and lesser men defied them at their peril."
 TARGARYEN_DAENYS_THE_DREAMER_NO_BULLETTAB:0 "\nThe family resided in Valyria until [GetScriptedCharacterByHistoryID('Targaryen_15').GetCharacterViewNameNicknamed], the daughter of [GetScriptedCharacterByHistoryID('Targaryen_13').GetCharacterViewNameNicknamed], had visions of a cataclysm that would come over Valyria. Aenar sold his estates in Valyria and moved his wives, children, other relatives, slaves, wealth, and five dragons (including [GetScriptedCharacterByHistoryID('dragon_balerion').GetCharacterViewNameNicknamed]) to Dragonstone, an island at the entrance of Blackwater Bay and the westernmost outpost of Valyrian influence. \n#weak Some members of our House are blessed by 'Dragon Dreams' a trait unique to our Bloodline. This allows them to see glimpses of the Future."
 TARGARYEN_CONQUEST_TYRRANY_CONCILIATION_NO_BULLETTAB:0 "\n [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed], aspired to unite the Seven Kingdoms of Westeros under one ruler. Slightly more than a hundred years after the Doom of Valyria, in 2 BC, he began his invasion, in which he was aided by his two sister-wives, [GetScriptedCharacterByHistoryID('Targaryen_29').GetCharacterViewNameNicknamed] and [GetScriptedCharacterByHistoryID('Targaryen_28').GetCharacterViewNameNicknamed]. [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewName], the First of His Name, came to the throne after the sudden death of his brother,[GetScriptedCharacterByHistoryID('Targaryen_30').GetCharacterViewNameNicknamed], in the year 42 AC. He is better remembered as [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed], and it was a well-earned sobriquet, for no crueler king ever sat the Iron Throne. His reign began with blood and ended in blood as well. [GetScriptedCharacterByHistoryID('Targaryen_31').GetCharacterViewNameNicknamed] ruled for six years and sixty-six days and died without issue. He was succeeded by his nephew, [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewNameNicknamed], the youngest son of the late [GetScriptedCharacterByHistoryID('Targaryen_30').GetCharacterViewNameNicknamed]. The Faith Militant uprising only ended during [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewName] reign. [GetScriptedCharacterByHistoryID('Targaryen_35').GetCharacterViewName] agreed to pardon all those of the Faith who would set their swords aside, though he also deprived the Faith of the right to hold trials. \n#weak When a Targaryen is born the Gods flip a Coin."
 TARGARYEN_VALYRIAN_WARRIORS_NO_BULLETTAB:0 "\nWe of House Targaryen command the Valyrian Knights, sworn heavy cavalry clad in finest Westerosi steel. They ride beneath the dragon banner, disciplined and relentless. At times, Valyrian steel gleams in their hands, relics of old fire and blood. Where they charge, kingdoms break, for dragonlords do not ride alone. \n#weak Our [heavy_cavalry|E] are perfectly suited to overrun our foes.\n#weak Enables recruitment of [GetMaA('targaryen_valyrian_knights').GetName] as [men_at_arms|E].#!"
 TARGARYEN_BALERION_MERAXES_VHAGAR_NO_BULLETTAB:0 "\n [GetScriptedCharacterByHistoryID('dragon_balerion').GetCharacterViewNameNicknamed], was a dragon of House Targaryen. He was ridden by [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] during the Conquest, alongside his sister Queen [GetScriptedCharacterByHistoryID('Targaryen_28').GetCharacterViewNameNicknamed] [GetScriptedCharacterByHistoryID('dragon_vhagar').GetCharacterViewNameNicknamed], and his sister Queen [GetScriptedCharacterByHistoryID('Targaryen_29').GetCharacterViewNameNicknamed] [GetScriptedCharacterByHistoryID('dragon_meraxes').GetCharacterViewNameNicknamed]. \n#weak The Three Majestic Dragons of our House, named after three of the fourteen Gods of the Valyrian Pantheon, represent not only our Strength, but also our Legacy and Future."
 
 #VELARYON
 velaryon_legacy_2_name: "Masters of Ships"
 velaryon_legacy_3_name: "Close ties to House Targaryen"
 velaryon_legacy_4_name: "The Gifts of the Merling King"
 velaryon_legacy_5_name: "Lords Freeholder"
 
 VELARYON_MASTER_OF_SHIPS_NO_BULLETTAB:0 "\nFor the first century after the Conquest, the position of master of ships was seen as almost hereditary within House Velaryon since so many from the family were named to the office. The Velaryon fleet also came to make up the bulk of the royal fleet. In 10 AC [GetScriptedCharacterByHistoryID('Velaryon_15').GetCharacterViewNameNicknamed] became the first Lord Commander of the Kingsguard. His elder brother, [GetScriptedCharacterByHistoryID('Velaryon_13').GetCharacterViewNameNicknamed] became master of ships for [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed]. Lord Aethan thus succeeded his father as lord admiral, and in turn was succeeded by his own son,  [GetScriptedCharacterByHistoryID('Velaryon_20').GetCharacterViewNameNicknamed]. \n#weak The sea is our element, not the sky."
 VELARYON_TARGARYEN_NO_BULLETTAB:0 "\nThe close relations between Houses Velaryon and Targaryen resulted in multiple marriages between the families, both before and after the Wars of Conquest. From one such marriage was born [GetScriptedCharacterByHistoryID('Velaryon_12').GetCharacterViewNameNicknamed]. She married [GetScriptedCharacterByHistoryID('Targaryen_26').GetCharacterViewNameNicknamed], the Lord of Dragonstone, with whom she had three children: [GetScriptedCharacterByHistoryID('Targaryen_28').GetCharacterViewNameNicknamed], [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed], and [GetScriptedCharacterByHistoryID('Targaryen_29').GetCharacterViewNameNicknamed]. House Velaryon allied with the Targaryens at the start of [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewName] Conquest, and the Velaryon fleet transported [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewNameNicknamed] men across Blackwater Bay for [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewName] Landing. [GetScriptedCharacterByHistoryID('Velaryon_11').GetCharacterViewNameNicknamed] was made master of ships by [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewName] after the mouth of the Blackwater Rush had been secured. [GetScriptedCharacterByHistoryID('Velaryon_11').GetCharacterViewName] died fighting for [GetScriptedCharacterByHistoryID('Targaryen_27').GetCharacterViewName] in the battle in the waters off Gulltown, however. \n#weak We are forever loyal to house Targaryen."
 VELARYON_MERLING_KING_NO_BULLETTAB:0 "\nHouse Velaryon is an ancient and proud family, with the blood of old Valyria in in their veins. According to their family histories, the Velaryons have a storied Valyrian lineage and came to Westeros before House Targaryen, settling on the island of Driftmark in the Gullet. The castle of Driftmark housed their ancient high seat, the Driftwood Throne, which according to legend had been given to them by the Merling King to conclude a pact. \n#weak The God of the Narrow Sea supports us."
 VELARYON_LORDS_FREEHOLDER_NO_BULLETTAB:0 "\nThe lords freeholder, or simply freeholders, were the nobility of the Valyrian Freehold. Any individual who owned land and was not born into slavery was considered a freeholder. The lords freeholder sometimes elected archons from their own number, to help lead Valyria for a limited time. While the freeholding families were officially of equal status, it was not entirely unheard of for Valyria to be swayed by one family alone. The freeholders benefited greatly from the mining of gold and silver by slaves beneath the Fourteen Flames. All freeholders were in concept equal, but in practice the wealthiest and most prestigious families had the most power. \n#weak At its apex Valyria was the greatest city in the known world, the center of civilization. Within its shining walls, twoscore rival houses vied for power and glory in court and council, rising and falling in an endless, subtle, oft savage struggle for dominance."
 
 #CELTIGAR
